name: Daily YouTube Trends → Sheets

on:
  schedule:
    # 매일 22:00 UTC = 다음날 07:00 KST
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm init -y && npm install googleapis@latest --no-save
      - run: node scripts/youtube-trends-to-sheets.js
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          ITDA_SHEET_ID: ${{ secrets.ITDA_SHEET_ID }}
          ITDA_SHEET_TAB: 수집로그
