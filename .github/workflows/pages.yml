name: Sync main → gh-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "gh-pages-sync"
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push main to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 서버 전용·내부 폴더는 공개 사이트에 올리지 않는다.
          # 1) 내부 문서·마이그레이션·스크립트가 공개될 이유가 없고
          # 2) 일부 파일(테스트 스텁, auth 트리거 SQL 등)은 GitHub Pages의
          #    배포 콘텐츠 검사에 걸려 배포 전체가 실패한다 (2026-07-05 확인)
          git rm -rq --ignore-unmatch scripts/ supabase/ docs/ .claude/ CLAUDE.md deploy.sh
          git commit -m "deploy: strip server-only and internal files" || true
          git push origin HEAD:gh-pages --force
