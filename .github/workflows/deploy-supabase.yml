name: Deploy Supabase

# ── 배포 철학 (2026-07-08 개편) ─────────────────────────────────
# 창업자는 PR에서 "Merge 버튼"만 누른다. main에 머지되면:
#   · supabase/functions/** 변경분 → 바뀐 함수만 자동 배포
#   · supabase/migrations/**  추가분 → 새 SQL 파일만 자동 적용(psql)
# 과거처럼 Actions 탭에서 branch/target 고르는 수동 실행은
# 비상용(workflow_dispatch)으로만 남긴다.
#
# 필요한 GitHub Secrets:
#   SUPABASE_ACCESS_TOKEN  (함수 배포)
#   SUPABASE_PROJECT_REF   (함수 배포)
#   SUPABASE_DB_URL        (마이그레이션 자동 적용 — Supabase 대시보드
#                           Connect → Session pooler URI. 미설정이면
#                           새 마이그레이션이 있는 머지에서 잡이 실패해
#                           창업자에게 알린다. SQL Editor 수동 적용 후
#                           re-run 하거나 시크릿을 넣으면 된다.)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
  workflow_dispatch:
    inputs:
      target:
        description: '비상용 수동 배포 대상'
        type: choice
        default: functions
        options:
          - functions        # 모든 함수 재배포 (delete-account 제외)
          - migrations-new   # 직전 커밋에서 추가된 마이그레이션만 psql 적용
          - function-secrets

env:
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 변경분 diff 계산용

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # ── 변경분 계산 ────────────────────────────────────────────
      # push: 이번 머지(before..sha)에서 바뀐 함수 디렉토리 + 추가된 마이그레이션.
      # dispatch: target에 따라 전체 함수 또는 HEAD^..HEAD 마이그레이션.
      - name: Detect changes
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            # 첫 푸시/이력 없음 가드
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
              BEFORE="$(git rev-parse HEAD^ 2>/dev/null || echo HEAD)"
            fi
            RANGE="$BEFORE..${{ github.sha }}"
          else
            RANGE="HEAD^..HEAD"
          fi
          echo "range=$RANGE"

          # 바뀐 함수 이름 목록 (delete-account 는 실데이터 삭제 로직 — 자동 배포 제외)
          FUNCS=$(git diff --name-only $RANGE -- supabase/functions/ \
                  | awk -F/ '{print $3}' | sort -u | grep -v '^$' | grep -v '^delete-account$' || true)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.target }}" = "functions" ]; then
            FUNCS=$(ls supabase/functions | grep -v '^delete-account$')
          fi
          echo "funcs<<EOF" >> "$GITHUB_OUTPUT"; echo "$FUNCS" >> "$GITHUB_OUTPUT"; echo "EOF" >> "$GITHUB_OUTPUT"

          # 이번에 "추가된" 마이그레이션만 (과거 SQL Editor 수동 적용분과 충돌하지 않도록
          # supabase db push 대신 신규 파일 psql 실행 방식을 쓴다)
          MIGS=$(git diff --name-only --diff-filter=A $RANGE -- 'supabase/migrations/*.sql' | sort || true)
          echo "migs<<EOF" >> "$GITHUB_OUTPUT"; echo "$MIGS" >> "$GITHUB_OUTPUT"; echo "EOF" >> "$GITHUB_OUTPUT"

          echo "== 배포할 함수 =="; echo "$FUNCS"
          echo "== 적용할 마이그레이션 =="; echo "$MIGS"

      # ── 새 마이그레이션 자동 적용 ─────────────────────────────
      - name: Apply new migrations (psql)
        if: ${{ (github.event_name == 'push' || inputs.target == 'migrations-new') && steps.diff.outputs.migs != '' }}
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::새 마이그레이션이 있지만 SUPABASE_DB_URL 시크릿이 없습니다."
            echo "::error::대시보드 Connect → Session pooler URI를 시크릿으로 추가하거나, SQL Editor로 아래 파일을 수동 적용 후 이 잡을 re-run 하세요:"
            echo "${{ steps.diff.outputs.migs }}"
            exit 1
          fi
          echo "${{ steps.diff.outputs.migs }}" | while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "== applying $f =="
            psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      # ── 바뀐 함수만 배포 ───────────────────────────────────────
      # verify_jwt: 비회원(anon)이 직접 호출하는 함수는 --no-verify-jwt 로 배포해야 한다.
      # 라이브에서 확인된 anon 함수 목록 (여기에 새 anon 함수가 생기면 추가할 것):
      - name: Deploy changed functions
        if: ${{ steps.diff.outputs.funcs != '' && (github.event_name == 'push' || inputs.target == 'functions') }}
        run: |
          NO_JWT="ltc-search mutda-checkin-notify push-notify kakao-signin"
          echo "${{ steps.diff.outputs.funcs }}" | while IFS= read -r fn; do
            [ -z "$fn" ] && continue
            [ -f "supabase/functions/$fn/index.ts" ] || { echo "skip $fn (index.ts 없음/삭제됨)"; continue; }
            FLAGS=""
            case " $NO_JWT " in *" $fn "*) FLAGS="--no-verify-jwt";; esac
            echo "== deploying $fn $FLAGS =="
            supabase functions deploy "$fn" --project-ref "$PROJECT_REF" $FLAGS
          done

      # ── Edge Function 시크릿 설정 (비상용 수동 전용) ───────────
      - name: Set function secrets
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'function-secrets' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: |
          ARGS=""
          [ -n "$ANTHROPIC_API_KEY" ] && ARGS="$ARGS ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY"
          [ -n "$DATA_GO_KR_KEY" ] && ARGS="$ARGS DATA_GO_KR_KEY=$DATA_GO_KR_KEY"
          [ -n "$SPOTIFY_CLIENT_ID" ] && ARGS="$ARGS SPOTIFY_CLIENT_ID=$SPOTIFY_CLIENT_ID"
          [ -n "$SPOTIFY_CLIENT_SECRET" ] && ARGS="$ARGS SPOTIFY_CLIENT_SECRET=$SPOTIFY_CLIENT_SECRET"
          if [ -n "$ARGS" ]; then
            supabase secrets set $ARGS --project-ref "$PROJECT_REF"
          else
            echo "설정할 시크릿이 없습니다. 건너뜀."
          fi
