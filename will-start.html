<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>한 줄로 시작 · 잇다</title>
  <meta name="description" content="잇다 — 한 줄로 시작해, 마음과 유언을 천천히 정리해요.">
  <link rel="stylesheet" href="./auth-styles.css">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
  <meta name="theme-color" content="#2F6B4F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="잇다">
  <meta property="og:title" content="잇다 · 한 줄로 시작">
  <meta property="og:description" content="내일 다시 못 깨어난다면, 가장 후회할 일은?">
  <style>
    .ws-shell {
      max-width: 640px;
      margin: 0 auto;
      padding: 32px 20px 80px;
      flex: 1;
      width: 100%;
    }
    @media (min-width: 640px) {
      .ws-shell { padding: 56px 32px 120px; }
    }
    .ws-eyebrow {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--ink-muted);
      margin-bottom: 10px;
    }
    .ws-question {
      font-family: var(--font-serif);
      font-size: 24px;
      font-weight: 800;
      line-height: 1.5;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 10px;
    }
    @media (min-width: 640px) {
      .ws-question { font-size: 28px; }
    }
    .ws-hint {
      font-size: 13.5px;
      color: var(--ink-muted);
      line-height: 1.65;
      margin-bottom: 22px;
    }
    .ws-textarea {
      width: 100%;
      min-height: 160px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 15px;
      line-height: 1.7;
      color: var(--ink);
      background: var(--bg);
      resize: vertical;
      box-sizing: border-box;
    }
    .ws-textarea:focus { outline: none; border-color: var(--primary); }
    .ws-foot {
      margin-top: 22px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .ws-submit {
      padding: 14px 22px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .ws-submit:hover { background: var(--primary-hover); }
    .ws-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .ws-skip {
      padding: 11px 16px;
      background: transparent;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      color: var(--ink-muted);
      cursor: pointer;
      align-self: center;
      text-decoration: none;
    }
    .ws-skip:hover { color: var(--primary); border-color: var(--primary-soft); }
    .ws-note {
      margin-top: 18px;
      padding: 12px 14px;
      background: var(--bg-alt);
      border-radius: var(--radius-sm);
      font-size: 12.5px;
      color: var(--ink-soft);
      line-height: 1.6;
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="./index.html" class="logo"><span class="logo-mark">●</span> 잇다</a>
  </div>
</nav>

<main class="ws-shell" id="main-content">
  <div class="ws-eyebrow">잇다 · 나를 위해</div>
  <div class="ws-question">내일 다시 못 깨어난다면,<br>가장 후회할 일은?</div>
  <div class="ws-hint">한 줄이라도 괜찮아요. 떠오르는 그대로 적어보세요.</div>
  <textarea class="ws-textarea" id="ws-answer" placeholder="짧게 한 줄이라도 괜찮아요." maxlength="2000"></textarea>
  <div class="ws-foot">
    <button type="button" class="ws-submit" id="ws-submit">답을 저장하고 이어서 잇다 만나기</button>
    <a href="./index.html" class="ws-skip">잠시 둘러보기만</a>
  </div>
  <div class="ws-note" id="ws-note">
    답은 본인 계정에 안전하게 저장돼요. 가입 후 같은 답으로 이어서 보실 수 있어요.
  </div>
</main>

<footer class="auth-footer">
  © 2026 라이프헤리티지 · 잇다
</footer>

<script type="module">
  import { supabase } from './auth.js';

  const LS_KEY = 'itda:will_pending_answer';
  const ENTRY_PATH_KEY = 'itda:entry_path';

  // 진입 즉시 entry_path 기록 (index.html 카드를 우회해 직접 진입한 경우 안전망)
  try { localStorage.setItem(ENTRY_PATH_KEY, 'will'); } catch (_) {}

  const textarea = document.getElementById('ws-answer');
  const submitBtn = document.getElementById('ws-submit');
  const noteEl = document.getElementById('ws-note');

  // 기존 임시 답 복원
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const pending = JSON.parse(raw);
      if (pending?.content) textarea.value = pending.content;
    }
  } catch (_) {}

  // 이미 로그인된 사용자 진입 — 바로 reflection 시리즈로 안내
  const { data: { session } } = await supabase.auth.getSession();
  const currentUser = session?.user ?? null;
  if (currentUser) {
    submitBtn.textContent = '답 저장하고 시리즈 이어가기';
    noteEl.textContent = '이미 로그인되어 있어요. 답이 오늘 잇고와 라이프 시리즈에 저장됩니다.';
  }

  submitBtn.addEventListener('click', async () => {
    const text = (textarea.value || '').trim();
    if (!text) { alert('한 줄이라도 적어주세요.'); return; }

    submitBtn.disabled = true;
    submitBtn.textContent = '잠시만요…';

    if (currentUser) {
      // 즉시 정식 저장 — series_key='not_waking_tomorrow' step 1
      try {
        const { data: q } = await supabase
          .from('daily_questions')
          .select('id')
          .eq('series_key', 'not_waking_tomorrow')
          .eq('series_step', 1)
          .maybeSingle();
        if (q?.id) {
          await supabase.from('daily_answers').upsert({
            user_id: currentUser.id,
            question_id: q.id,
            content: text,
            visibility: 'private',
          }, { onConflict: 'user_id,question_id' });
        }
      } catch (e) {
        console.warn('[will-start] 정식 저장 실패', e);
      }
      // reflection 시리즈 step 2로 이동 (step 1 답 저장 후)
      window.location.href = './reflection.html';
      return;
    }

    // 비로그인: localStorage에 답 임시 저장 → signup으로
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({
        content: text,
        saved_at: new Date().toISOString(),
      }));
      localStorage.setItem(ENTRY_PATH_KEY, 'will');
    } catch (_) {}

    const back = './will-start.html';
    const signupUrl = `./signup.html?next=${encodeURIComponent(back)}&path=will`;
    window.location.href = signupUrl;
  });
</script>

</body>
</html>
