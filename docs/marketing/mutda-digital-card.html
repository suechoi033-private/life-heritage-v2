  :root {
    --ink: #21261E; --ink-soft: #3E4A43; --ink-muted: #6B756E;
    --primary: #2F6B4F; --primary-deep: #25563F; --soft: #E7F1EC;
    --serif: 'Nanum Myeongjo', 'Noto Serif KR', serif;
    --sans: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--sans); }
  .dcard {
    width: 540px; height: 960px; background: var(--primary-deep); color: #fff;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 72px 56px 64px;
  }
  .brand { font-family: var(--serif); font-weight: 800; font-size: 64px; }
  .tagline { font-family: var(--serif); font-size: 21px; line-height: 1.75;
             color: #DCEAE2; margin-top: 26px; }
  .mid { background: #fff; border-radius: 20px; padding: 34px 32px;
         color: var(--ink); display: flex; align-items: center; gap: 26px; }
  .mid svg { width: 148px; height: 148px; color: var(--ink); flex: 0 0 auto; }
  .mid .info .name { font-family: var(--serif); font-weight: 700; font-size: 30px;
                     letter-spacing: .16em; }
  .mid .info .contact { font-size: 15.5px; color: var(--ink-soft); margin-top: 12px; line-height: 1.75; }
  .mid .info .hint { font-size: 13.5px; white-space: nowrap; color: var(--primary-deep); margin-top: 14px;
                     background: var(--soft); border-radius: 8px; padding: 7px 10px; display: inline-block; }
  .foot { text-align: center; font-size: 14px; color: #9DBFB0; letter-spacing: .04em; }
</style>
