<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="940" viewBox="0 0 1180 940" font-family="'Nanum Myeongjo','Apple SD Gothic Neo',serif">
  <defs>
    <style>
      .ink{fill:#2B2B2B}.soft{fill:#6B6B6B}.muted{fill:#9A9A9A}.prim{fill:#2F6B4F}
      .h{font-weight:800}.b{font-weight:700}
    </style>
  </defs>
  <rect x="0" y="0" width="1180" height="940" fill="#F1EEE8"/>

  <!-- ===== Caption ===== -->
  <text x="60" y="52" class="ink h" font-size="30">잇다 · 디지털 보관함 × 생전기록 — 목업</text>
  <text x="60" y="82" class="soft" font-size="17">왼쪽 = 26명에게 보여줄 "MVP 한 조각"  ·  오른쪽 = ① 허브 동선(흩어진 카드 → 봉투)</text>

  <!-- ================= LEFT PHONE : MVP 한 조각 ================= -->
  <g>
    <rect x="60" y="110" width="430" height="790" rx="34" fill="#FFFFFF" stroke="#E2DED6" stroke-width="2"/>
    <!-- top bar -->
    <text x="92" y="158" class="prim b" font-size="13" letter-spacing="2">● 잇다</text>
    <text x="458" y="158" class="muted" font-size="18" text-anchor="end">✏️</text>
    <line x1="60" y1="176" x2="490" y2="176" stroke="#EFece6" stroke-width="1"/>

    <text x="92" y="210" class="muted b" font-size="12" letter-spacing="2">나의 삶 정리</text>
    <text x="92" y="240" class="ink h" font-size="25">디지털 자산 노트</text>
    <text x="92" y="266" class="soft" font-size="13.5">통장·보험이 어디 있는지, 남는 사람이 두 달을 헤매지 않도록.</text>

    <!-- category card -->
    <rect x="84" y="288" width="382" height="486" rx="18" fill="#FFFFFF" stroke="#E6E1D8" stroke-width="1.5"/>
    <text x="108" y="328" font-size="20">🏦</text>
    <text x="140" y="330" class="ink b" font-size="18">은행 · 통장</text>
    <text x="108" y="356" class="muted" font-size="12.5">거래하는 은행, 주거래 통장이 어디에 있는지.</text>

    <!-- 정보 칸 -->
    <text x="108" y="390" class="soft b" font-size="12.5">어디에 있는지 (실제 비번 X · 위치만)</text>
    <rect x="108" y="400" width="334" height="66" rx="10" fill="#F7F5F0" stroke="#E6E1D8" stroke-width="1"/>
    <text x="122" y="426" class="ink" font-size="13.5">신한은행 주거래.</text>
    <text x="122" y="448" class="ink" font-size="13.5">통장은 안방 서랍 둘째 칸.</text>

    <!-- 마음 트리거 prompt -->
    <rect x="108" y="486" width="334" height="92" rx="10" fill="#F1F5F2"/>
    <rect x="108" y="486" width="4" height="92" rx="2" fill="#2F6B4F"/>
    <text x="124" y="512" class="prim b" font-size="13">이 계좌는 무엇을 위해 만든 거였나요?</text>
    <text x="124" y="534" class="soft" font-size="12.5">목적이 있었나요?</text>
    <text x="124" y="556" class="muted" font-size="12">(예: 아이 학비, 아내와의 한 달 살기, 손주 여행)</text>

    <!-- 마음 칸 -->
    <text x="108" y="602" class="soft b" font-size="12.5">마음 한 줄</text>
    <rect x="108" y="612" width="334" height="62" rx="10" fill="#FFFFFF" stroke="#CFE0D5" stroke-width="1.5"/>
    <text x="122" y="638" class="ink" font-size="13.5">막내 대학 등록금. 꼭 보태주고</text>
    <text x="122" y="660" class="ink" font-size="13.5">싶어서 따로 모은 통장이다.</text>

    <text x="108" y="710" class="muted" font-size="12">🎙 말로 적기 · 건너뛰기 가능 (마음은 의무가 아니에요)</text>
    <line x1="108" y1="730" x2="442" y2="730" stroke="#EFece6" stroke-width="1"/>
    <text x="108" y="754" class="muted" font-size="11.5">🏠 홈   🌱 라이프   🪺 케어링   🌳 커뮤니티   🌿 마이</text>

    <!-- annotation -->
    <text x="60" y="855" class="prim b" font-size="14">↑ 이 한 칸이 "MVP 한 조각"</text>
    <text x="60" y="878" class="soft" font-size="12.5">DB·AI·암호화·8카테고리·전달 전부 빼고, 한 카테고리에서</text>
    <text x="60" y="896" class="soft" font-size="12.5">"정보 적은 사람이 그 아래 마음도 적는가" 단 하나만 본다.</text>
  </g>

  <!-- ================= RIGHT : 허브 동선 ================= -->
  <g>
    <text x="560" y="150" class="ink h" font-size="22">① 허브 동선 — 흩어진 6개 카드를 하나로</text>
    <text x="560" y="176" class="soft" font-size="13.5">"나의 삶 정리"가 카드 나열이 아니라 한 흐름이 된다.</text>

    <!-- STAGE 1 : 모은다 -->
    <text x="560" y="222" class="muted b" font-size="13" letter-spacing="1">1. 흩어진 것을 모은다 · 정보</text>
    <rect x="560" y="234" width="270" height="58" rx="12" fill="#FFFFFF" stroke="#E2DED6" stroke-width="1.5"/>
    <text x="582" y="262" font-size="17">🗂️</text>
    <text x="612" y="260" class="ink b" font-size="14.5">디지털 자산 노트</text>
    <text x="612" y="280" class="muted" font-size="11.5">통장·보험·계정 — 어디 있는지</text>
    <rect x="846" y="234" width="270" height="58" rx="12" fill="#FFFFFF" stroke="#E2DED6" stroke-width="1.5"/>
    <text x="868" y="262" font-size="17">📄</text>
    <text x="898" y="260" class="ink b" font-size="14.5">사전연명의향서·체크</text>
    <text x="898" y="280" class="muted" font-size="11.5">미리 정해두는 의료·절차</text>

    <text x="838" y="320" class="prim" font-size="20" text-anchor="middle">↓</text>
    <text x="838" y="324" class="soft" font-size="12" text-anchor="middle" dx="46">정보를 적으면 마음이 따라온다</text>

    <!-- STAGE 2 : 마음을 얹는다 -->
    <text x="560" y="360" class="muted b" font-size="13" letter-spacing="1">2. 정보 옆에 마음을 한 줄씩 · 마음</text>
    <rect x="560" y="372" width="556" height="92" rx="14" fill="#F1F5F2" stroke="#CFE0D5" stroke-width="1.5"/>
    <rect x="560" y="372" width="5" height="92" rx="2" fill="#2F6B4F"/>
    <text x="584" y="402" class="prim b" font-size="14.5">각 항목·메시지마다 "마음 한 줄"</text>
    <text x="584" y="426" class="soft" font-size="12.5">"이 계좌는 무엇을 위해?" · "이 보험은 누구를 생각하며?"</text>
    <text x="584" y="448" class="muted" font-size="12">가족 메시지 · 일기 · 오늘의 질문에 흩어진 마음을 같은 그릇에 모음</text>

    <text x="838" y="494" class="prim" font-size="20" text-anchor="middle">↓</text>
    <text x="838" y="498" class="soft" font-size="12" text-anchor="middle" dx="40">그래서, 누구에게 건네지나?</text>

    <!-- STAGE 3 : 건넨다 = 봉투 -->
    <text x="560" y="534" class="muted b" font-size="13" letter-spacing="1">3. 가족에게 건넨다 · 봉투(확정)</text>
    <rect x="560" y="546" width="556" height="150" rx="16" fill="#2F6B4F"/>
    <text x="584" y="582" fill="#EaF3Ec" font-size="20">✉️</text>
    <text x="616" y="584" fill="#FFFFFF" class="b" font-size="17">가족에게 건네는 봉투</text>
    <text x="584" y="614" fill="#D7E7DC" font-size="13">· 받을 사람(배우자·자녀·형제) 지정 → 작성의 "이유"가 생김</text>
    <text x="584" y="638" fill="#D7E7DC" font-size="13">· 평소엔 잠겨 있음. 정해둔 때에 열려 가족이 길을 찾음</text>
    <text x="584" y="662" fill="#D7E7DC" font-size="13">· 받은 가족이 "나도" → 다음 사람으로 (리텐션·바이럴)</text>
    <text x="584" y="685" fill="#AFCdb9" font-size="11.5">= 지금 stub인 "가족 잠금 공유" 카드가 부가기능 아닌 중심축</text>

    <!-- footnote -->
    <rect x="560" y="724" width="556" height="120" rx="14" fill="#FFFFFF" stroke="#E2DED6" stroke-width="1.5"/>
    <text x="584" y="754" class="ink b" font-size="14">왜 이 순서인가</text>
    <text x="584" y="780" class="soft" font-size="12.5">에세이의 동선 그대로: "유서는 무겁다 → 비번 목록부터(가볍게) →</text>
    <text x="584" y="800" class="soft" font-size="12.5">적다 보니 마음을 얹고 싶다 → 결국 가족에게 건넬 한 장."</text>
    <text x="584" y="824" class="prim" font-size="12.5">MVP(왼쪽)는 이 동선의 2단계 "정보→마음" 한 지점만 먼저 검증.</text>
  </g>
</svg>
