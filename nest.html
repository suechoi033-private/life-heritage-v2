<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>케어링 · 잇다</title>
  <meta name="description" content="가족 돌봄 기록과 협력">
  <link rel="stylesheet" href="./auth-styles.css">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <meta name="theme-color" content="#5C8A6F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="잇다">
  <style>
    .nest-hero {
      background: linear-gradient(135deg, #F5EFE3, #FAF6EC);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 16px;
    }
    .nest-hero-label { font-size: 11.5px; font-weight: 700; color: var(--warm); letter-spacing: 0.04em; }
    .nest-hero-title {
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 4px 0 4px;
    }
    .nest-hero-stat { font-size: 12.5px; color: var(--ink-soft); }

    .subject-card {
      background: var(--bg-alt);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 10px;
    }
    .subject-card-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .subject-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--warm-soft); color: var(--warm);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 800; flex-shrink: 0;
    }
    .subject-name { font-size: 15px; font-weight: 800; }
    .subject-relation { font-size: 12px; color: var(--ink-muted); }

    .subject-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }
    .stat-cell {
      background: #fff;
      border-radius: 10px;
      padding: 10px 6px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      border: 1px solid transparent;
      transition: border-color 0.15s, background 0.15s;
      cursor: pointer;
      display: block;
    }
    .stat-cell:hover { border-color: var(--warm); background: var(--warm-soft); }
    .stat-cell:hover .stat-num { color: var(--warm); }
    .stat-cell:hover .stat-arrow { opacity: 1; transform: translateX(2px); }
    .stat-num {
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: 800;
      color: var(--warm);
    }
    .stat-label {
      font-size: 10.5px;
      color: var(--ink-muted);
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }
    .stat-arrow {
      font-size: 11px;
      opacity: 0;
      transition: opacity 0.15s, transform 0.15s;
      color: var(--warm);
      font-weight: 800;
    }

    /* 나의 발자취 — 미니 잔디 + 대시보드 링크 */
    .footprint-wrap {
      display: block;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      margin-bottom: 8px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s;
    }
    .footprint-wrap:hover { border-color: var(--warm); }
    .footprint-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .footprint-label {
      font-size: 11px;
      font-weight: 800;
      color: var(--ink-soft);
      letter-spacing: 0.04em;
    }
    .footprint-arrow {
      font-size: 12px;
      color: var(--warm);
      font-weight: 800;
      transition: transform 0.15s;
    }
    .footprint-wrap:hover .footprint-arrow { transform: translateX(2px); }
    .mini-grass {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }
    .mg-cell {
      aspect-ratio: 1;
      border-radius: 2px;
    }
    .mg-cell.level-0 { background: #EBEDF0; }
    .mg-cell.level-1 { background: #C7E9C9; }
    .mg-cell.level-2 { background: #88D094; }
    .mg-cell.level-3 { background: #4CAE5C; }
    .mg-cell.level-4 { background: #1F7A3A; }
    .mg-cell.mg-today { outline: 2px solid #E8732A; outline-offset: -1px; border-radius: 3px; }

    .subject-action {
      display: block;
      padding: 9px 4px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: #fff;
      font-size: 12px;
      font-weight: 700;
      color: var(--ink-soft);
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .subject-action:hover { border-color: var(--primary); color: var(--primary); }
    .subject-action.sos { color: var(--danger); border-color: var(--danger-soft); }
    .subject-action.sos:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

    .add-subject-btn {
      width: 100%;
      padding: 16px;
      background: var(--bg-alt);
      border: 1.5px dashed var(--line);
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 700;
      color: var(--ink-soft);
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
      display: block;
      text-align: center;
      transition: border-color 0.15s, color 0.15s;
    }
    .add-subject-btn:hover { border-color: var(--warm); color: var(--warm); }

    .live-indicator {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10.5px;
      font-weight: 700;
      color: var(--success);
      margin-left: auto;
    }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>

<main class="page-shell" id="main-content">
  <div class="nest-hero">
    <div class="nest-hero-label">케어링</div>
    <div class="nest-hero-title" id="hero-title">가족과 함께<br>곁을 지켜요</div>
    <div class="nest-hero-stat" id="hero-stat">불러오는 중...</div>
  </div>

  <div id="subjects-list">
    <div class="empty-state"><div class="empty-icon">⏳</div></div>
  </div>
</main>

<script type="module">
  import { supabase } from './auth.js';
  import { renderNav } from './nav.js';
  import { registerPWA } from './js/pwa.js';
  import { listMyCareSubjects, getCareDashboard, subscribeCareLogs } from './js/care.js';

  await renderNav({ active: 'nest', infoIcon: true, title: '케어링' });
  registerPWA();

  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { window.location.href = './login.html'; throw new Error('로그인 필요'); }

  const subjects = await listMyCareSubjects();

  document.getElementById('hero-stat').textContent = subjects.length
    ? `${subjects.length}분을 함께 보살피고 있어요`
    : '돌볼 분을 추가해 시작해보세요';

  const listEl = document.getElementById('subjects-list');
  if (!subjects.length) {
    listEl.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🪺</div>
        <div class="empty-title">첫 돌봄을 시작해요</div>
        <div class="empty-desc">돌봄 대상을 추가하면 가족과 함께 기록·공유할 수 있어요.</div>
      </div>
      <a href="./care.html?action=add" class="add-subject-btn">＋ 돌봄 대상 추가</a>`;
    throw new Error('no subjects');
  }

  // 대상자별 카드 렌더 + 비동기 대시보드 로딩
  listEl.innerHTML = subjects.map((s) => `
    <div class="subject-card" data-id="${s.id}">
      <div class="subject-card-head">
        <div class="subject-avatar">${(s.name?.[0] || '·').toUpperCase()}</div>
        <div>
          <div class="subject-name">${escapeHtml(s.name || '돌봄 대상')}</div>
          <div class="subject-relation">${escapeHtml(s.relation || '')} · ${s.role === 'owner' ? '내가 추가' : '초대받음'}</div>
        </div>
        <span class="live-indicator"><span class="live-dot"></span>실시간</span>
      </div>
      <div class="subject-stats">
        <a class="stat-cell" href="./care.html?subject=${s.id}" aria-label="기록 보러가기">
          <div class="stat-num" data-stat="logs">·</div>
          <div class="stat-label">28일 중 기록 <span class="stat-arrow">›</span></div>
        </a>
        <a class="stat-cell" href="./care-dashboard.html?subject=${s.id}" aria-label="충실도 대시보드">
          <div class="stat-num" data-stat="completion">·</div>
          <div class="stat-label">충실도 <span class="stat-arrow">›</span></div>
        </a>
      </div>
      <a class="footprint-wrap" href="./care-dashboard.html?subject=${s.id}" aria-label="나의 발자취 — 대시보드로">
        <div class="footprint-head">
          <span class="footprint-label">나의 발자취</span>
          <span class="footprint-arrow">›</span>
        </div>
        <div class="mini-grass" data-grass="${s.id}">
          <div style="grid-column:1/-1;text-align:center;color:var(--ink-muted);font-size:11px;padding:4px 0;">불러오는 중…</div>
        </div>
      </a>
      <a class="subject-action sos" href="./care-emergency.html?subject=${s.id}">🚨 응급</a>
    </div>
  `).join('') + `<a href="./care.html?action=add" class="add-subject-btn">＋ 돌봄 대상 추가</a>`;

  // 미니 잔디 (28일 × 7열 그리드)
  function buildMiniGrass(daily) {
    const today = new Date();
    const cells = [];
    for (let i = 27; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(today.getDate() - i);
      const key = d.toISOString().slice(0, 10);
      const count = daily[key] || 0;
      const level = count === 0 ? 0 : count === 1 ? 1 : count <= 3 ? 2 : count <= 5 ? 3 : 4;
      cells.push(`<div class="mg-cell level-${level}${i === 0 ? ' mg-today' : ''}" title="${key}: ${count}건"></div>`);
    }
    return cells.join('');
  }

  // 대시보드 비동기 로딩
  function paintStats(card, dash) {
    if (!card) return;
    card.querySelector('[data-stat="logs"]').textContent       = dash.totalLogs;
    card.querySelector('[data-stat="completion"]').textContent = `${dash.completionPct}%`;
    const grassEl = card.querySelector('.mini-grass');
    if (grassEl) grassEl.innerHTML = buildMiniGrass(dash.daily || {});
  }
  for (const s of subjects) {
    getCareDashboard(s.id).then((dash) => {
      paintStats(listEl.querySelector(`.subject-card[data-id="${s.id}"]`), dash);
    }).catch((err) => {
      console.warn('[케어링] 통계 조회 실패:', s.id, err);
      const card = listEl.querySelector(`.subject-card[data-id="${s.id}"]`);
      if (card) {
        card.querySelectorAll('[data-stat]').forEach((el) => { el.textContent = '-'; });
      }
    });
  }

  // 실시간 구독 — 새 기록 들어오면 카운트 갱신
  const unsubscribers = subjects.map((s) =>
    subscribeCareLogs(s.id, () => {
      getCareDashboard(s.id)
        .then((dash) => paintStats(listEl.querySelector(`.subject-card[data-id="${s.id}"]`), dash))
        .catch((err) => console.warn('[케어링] 실시간 갱신 실패:', s.id, err));
    })
  );

  window.addEventListener('beforeunload', () => unsubscribers.forEach((un) => un()));

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }
</script>

</body>
</html>
