<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>나의 삶 · 잇다</title>
  <link rel="stylesheet" href="./auth-styles.css">
  <style>
    body { background: var(--bg); }

    /* 페이지 헤더 */
    .self-header {
      padding: 22px 0 6px;
    }
    .self-header-sub {
      font-size: 12.5px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }
    .self-header-title {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.45;
      color: var(--ink);
    }
    .self-header-desc {
      font-size: 13.5px;
      color: var(--ink-muted);
      margin-top: 6px;
      line-height: 1.7;
    }

    /* 오늘은 이걸로 시작 (첫 번째 카드 — 강조) */
    .card-highlight {
      background: var(--primary);
      border-radius: var(--radius);
      padding: 22px 22px 20px;
      color: #fff;
      cursor: pointer;
      text-decoration: none;
      display: block;
      transition: opacity 0.15s;
      position: relative;
      overflow: hidden;
    }
    .card-highlight:hover { opacity: 0.93; }
    .card-highlight::before {
      content: '';
      position: absolute;
      top: -30px;
      right: -30px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
    }
    .card-hl-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.22);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 11.5px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .card-hl-icon { font-size: 28px; margin-bottom: 8px; display: block; }
    .card-hl-title {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }
    .card-hl-status {
      font-size: 13px;
      opacity: 0.85;
      margin-bottom: 14px;
    }
    .card-hl-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.18);
      border-radius: 999px;
      padding: 7px 16px;
      font-size: 13.5px;
      font-weight: 700;
    }

    /* 일반 마무리 카드 */
    .self-cards { margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }

    .self-card {
      background: var(--bg-alt);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .self-card:hover {
      border-color: var(--primary-soft);
      box-shadow: 0 4px 16px rgba(47,107,79,0.07);
    }
    .self-card-icon {
      width: 44px;
      height: 44px;
      border-radius: 13px;
      background: var(--primary-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .self-card-body { flex: 1; min-width: 0; }
    .self-card-title {
      font-size: 14.5px;
      font-weight: 800;
      letter-spacing: -0.01em;
      margin-bottom: 3px;
    }
    .self-card-status {
      font-size: 12.5px;
      color: var(--ink-muted);
    }
    .self-card-status.done { color: var(--primary); font-weight: 600; }
    .self-card-arrow { color: var(--ink-faint); font-size: 18px; flex-shrink: 0; }

    /* 진행 바 */
    .self-progress-wrap { margin-top: 4px; }
    .self-progress-track {
      height: 3px;
      background: rgba(0,0,0,0.08);
      border-radius: 999px;
      margin-top: 6px;
      overflow: hidden;
    }
    .self-progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    /* 잠금 공유 카드 (별도 스타일) */
    .self-card-lock {
      background: var(--warm-soft);
      border-color: rgba(176,112,67,0.18);
    }
    .self-card-lock .self-card-icon { background: rgba(176,112,67,0.12); }
    .self-card-lock .self-card-title { color: var(--warm); }

    /* 안내 배너 */
    .self-notice {
      background: var(--bg-alt);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      font-size: 12.5px;
      color: var(--ink-muted);
      line-height: 1.7;
      margin-top: 20px;
      border: 1px dashed var(--line);
    }
    .self-notice strong { color: var(--ink-soft); }

    /* 비로그인 안내 */
    .login-prompt {
      text-align: center;
      padding: 48px 20px;
    }
    .login-prompt-icon { font-size: 40px; margin-bottom: 16px; }
    .login-prompt-title {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .login-prompt-desc {
      font-size: 14px;
      color: var(--ink-muted);
      line-height: 1.7;
      margin-bottom: 24px;
    }
    .btn-primary {
      display: inline-block;
      padding: 13px 28px;
      background: var(--primary);
      color: #fff;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--primary-hover); }

    /* 3단계 동선 (모은다 → 마음을 얹는다 → 건넨다) */
    .stage { margin-top: 22px; }
    .stage-head { display: flex; align-items: center; gap: 11px; margin-bottom: 12px; }
    .stage-n {
      width: 26px; height: 26px; border-radius: 999px; flex-shrink: 0;
      background: var(--primary-soft); color: var(--primary);
      font-family: var(--font-serif); font-size: 13px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }
    .stage-label {
      font-family: var(--font-serif); font-size: 16px; font-weight: 800;
      color: var(--ink); letter-spacing: -0.01em; line-height: 1.3;
    }
    .stage-sub { font-size: 12px; color: var(--ink-muted); margin-top: 1px; }
    .stage-flow { text-align: center; color: var(--primary); font-size: 17px; opacity: 0.45; margin: 12px 0 2px; }

    /* 봉투 카드 (3단계 — 중심축, 강조) */
    .self-card-envelope {
      background: var(--primary); border-radius: var(--radius);
      padding: 20px 22px; color: #fff; text-decoration: none; display: block;
      position: relative; overflow: hidden; cursor: pointer; transition: opacity 0.15s;
    }
    .self-card-envelope:hover { opacity: 0.93; }
    .self-card-envelope::before {
      content: ''; position: absolute; top: -30px; right: -30px;
      width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.07);
    }
    .env-badge {
      display: inline-block; background: rgba(255,255,255,0.2); border-radius: 999px;
      padding: 3px 11px; font-size: 11px; font-weight: 700; margin-bottom: 10px;
    }
    .env-title { font-size: 16px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.01em; }
    .env-icon { font-size: 20px; }
    .env-desc { font-size: 12.5px; opacity: 0.92; line-height: 1.7; }
  </style>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
  <meta name="theme-color" content="#2F6B4F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="잇다">
</head>
<body>

<main class="page-shell" id="self-main">
  <div style="height:40px;background:var(--bg-alt);border-radius:var(--radius-sm);animation:shimmer 1.4s infinite;"></div>
</main>

<script type="module">
import { supabase } from './auth.js';
import { renderNav } from './nav.js';

await renderNav({ active: 'self', infoIcon: true, title: '나의 삶' });

const { data: { session } } = await supabase.auth.getSession();
const user = session?.user ?? null;

const main = document.getElementById('self-main');

if (!user) {
  main.innerHTML = `
    <div class="login-prompt">
      <div class="login-prompt-icon">🕊</div>
      <div class="login-prompt-title">나의 삶을<br>기록해 볼까요?</div>
      <div class="login-prompt-desc">
        사전연명의료의향서, 디지털 자산, 가족에게 남기는 메시지 —<br>
        한 번에 다 하지 않아도 괜찮아요.
      </div>
      <a href="./signup.html?mode=self" class="btn-primary">시작하기</a>
      <div style="margin-top:12px;font-size:13.5px;color:var(--ink-muted);">
        이미 계정이 있으시면 <a href="./login.html" style="color:var(--primary);font-weight:700;">로그인</a>
      </div>
    </div>
  `;
} else {

// 카드 정의 (우선순위 순)
const CARDS = [
  {
    key: 'directive',
    icon: '🩺',
    title: '사전연명의료의향서',
    href: './info/advance-directive.html',
    getStatus: (data) => data?.directive_done
      ? `등록 완료 · ${data.directive_date || ''}`
      : '미작성 · 5분이면 충분해요',
    isDone: (data) => !!data?.directive_done,
    progress: null,
  },
  {
    key: 'directive_checklist',
    icon: '📋',
    title: '의향서 방문 준비 체크리스트',
    href: './note/directive-checklist.html',
    getStatus: (data) => {
      const total = data?.directive_checklist_total || 7;
      const done = data?.directive_checklist_done || 0;
      if (done >= total) return '준비 완료 · 방문하시면 돼요';
      return done > 0 ? `${done} / ${total} 항목 완료` : '방문 전 7가지 점검하기';
    },
    isDone: (data) => (data?.directive_checklist_done || 0) >= (data?.directive_checklist_total || 7),
    progress: (data) => {
      const total = data?.directive_checklist_total || 7;
      const done = data?.directive_checklist_done || 0;
      return Math.round((done / total) * 100);
    },
  },
  {
    key: 'digital',
    icon: '🔐',
    title: '디지털 자산 노트',
    href: './note/digital.html',
    getStatus: (data) => {
      const done = data?.digital_count || 0;
      return done > 0 ? `${done} / 8 카테고리 작성` : '아직 작성 전이에요';
    },
    isDone: (data) => (data?.digital_count || 0) >= 8,
    progress: (data) => Math.round(((data?.digital_count || 0) / 8) * 100),
  },
  {
    key: 'funeral',
    icon: '🕊',
    title: '장례 의향',
    href: '#',
    comingSoon: true,
    getStatus: (data) => data?.funeral_done ? '작성 완료' : '곧 열려요',
    isDone: (data) => !!data?.funeral_done,
    progress: null,
  },
  {
    key: 'message',
    icon: '💌',
    title: '가족에게 남기는 메시지',
    href: './note/will.html',
    getStatus: (data) => {
      const cnt = data?.message_count || 0;
      return cnt > 0 ? `초안 ${cnt}편 보관 중` : '아직 작성 전이에요';
    },
    isDone: (data) => (data?.message_count || 0) > 0,
    progress: null,
  },
  {
    key: 'lock',
    icon: '👨‍👩‍👧',
    title: '가족 잠금 공유',
    href: '#',
    comingSoon: true,
    getStatus: (data) => data?.lock_shared ? '공유 중' : '곧 열려요',
    isDone: (data) => !!data?.lock_shared,
    progress: null,
    isLock: true,
  },
];

// 사용자 데이터 — 현재는 note_entries 테이블 기반 (없으면 빈 값)
let selfData = {};
try {
  const { data } = await supabase
    .from('note_entries')
    .select('key, value')
    .eq('user_id', user.id);
  if (data) {
    data.forEach(row => { selfData[row.key] = row.value; });
  }
} catch (_) {}

// 의향서 방문 준비 체크리스트 진행률 (이 기기에 저장된 값)
try {
  const dc = JSON.parse(localStorage.getItem(`itda:directive_checklist_summary:${user.id}`) || 'null');
  if (dc) {
    selfData.directive_checklist_done = dc.done;
    selfData.directive_checklist_total = dc.total;
  }
} catch (_) {}

// 3단계 동선 — 흩어진 카드를 "모은다 → 마음을 얹는다 → 건넨다(봉투)" 흐름으로.
const STAGES = [
  { n: '1', label: '흩어진 것을 모은다', sub: '정보 — 어디에 무엇이 있는지', keys: ['digital', 'directive', 'directive_checklist'] },
  { n: '2', label: '마음을 한 줄씩 얹는다', sub: '뜻 — 물어볼 사람이 없을 때 가장 그리운 것', keys: ['message', 'funeral'] },
];
const byKey = Object.fromEntries(CARDS.map((c) => [c.key, c]));

function cardHtml(card) {
  const done = card.isDone(selfData);
  const pct = card.progress ? card.progress(selfData) : null;
  return `
    <a href="${card.href}" class="self-card"${card.comingSoon ? ' data-coming="1"' : ''}>
      <div class="self-card-icon">${card.icon}</div>
      <div class="self-card-body">
        <div class="self-card-title">${card.title}</div>
        <div class="self-card-status ${done ? 'done' : ''}">${card.getStatus(selfData)}</div>
        ${pct !== null ? `<div class="self-progress-track"><div class="self-progress-fill" style="width:${pct}%"></div></div>` : ''}
      </div>
      <span class="self-card-arrow">›</span>
    </a>`;
}

function stageHtml(stage) {
  const inner = stage.keys.map((k) => byKey[k]).filter(Boolean).map(cardHtml).join('');
  return `
    <div class="stage">
      <div class="stage-head">
        <span class="stage-n">${stage.n}</span>
        <div>
          <div class="stage-label">${stage.label}</div>
          <div class="stage-sub">${stage.sub}</div>
        </div>
      </div>
      <div class="self-cards">${inner}</div>
    </div>`;
}

const lockCard = byKey['lock'];
const envelopeHtml = `
  <div class="stage">
    <div class="stage-head">
      <span class="stage-n">3</span>
      <div>
        <div class="stage-label">가족에게 건넨다</div>
        <div class="stage-sub">봉투 — 정해둔 때에 열려, 가족이 길을 찾도록</div>
      </div>
    </div>
    <a href="${lockCard.href}" class="self-card-envelope" data-coming="1">
      <div class="env-badge">곧 열려요</div>
      <div class="env-title"><span class="env-icon">${lockCard.icon}</span> 가족에게 건네는 봉투</div>
      <div class="env-desc">받을 사람(배우자·자녀·형제)을 정해 두면, 평소엔 잠겨 있다가 정해둔 때에 열려 가족이 길을 찾습니다. 적어 둔 것이 비로소 "건네는 것"이 됩니다.</div>
    </a>
  </div>`;

let html = `
  <div class="self-header">
    <div class="self-header-sub">나의 삶 정리</div>
    <div class="self-header-title">"이따가 하지 말고 지금."</div>
    <div class="self-header-desc">흩어진 것을 모으고, 그 옆에 마음을 한 줄씩 얹어, 가족에게 건넵니다. 한 번에 다 하지 않아도 괜찮아요.</div>
  </div>

  ${stageHtml(STAGES[0])}
  <div class="stage-flow">↓</div>
  ${stageHtml(STAGES[1])}
  <div class="stage-flow">↓</div>
  ${envelopeHtml}

  <div class="self-notice">
    <strong>잇다는 안내만 합니다.</strong> 사전연명의료의향서 등록은 공식 기관(보건소·등록기관)을 통해 이루어지며, 잇다는 완료 여부만 기록합니다. 법적 효력이 있는 유언장 작성은 <a href="https://easylaw.go.kr" target="_blank" rel="noopener" style="color:var(--primary);">찾기쉬운생활법령</a>을 참고하세요.
  </div>
`;

main.innerHTML = html;

// '준비 중' 카드는 아직 페이지가 없으므로 이동시키지 않고 안내만 한다(404 방지).
main.querySelectorAll('[data-coming]').forEach((el) => {
  el.addEventListener('click', (e) => {
    e.preventDefault();
    alert('곧 열려요. 차근차근 준비하고 있어요.');
  });
});

} // end if (user)
</script>

<script src="./scroll-top.js" defer></script>
</body>
</html>
