<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>나의 삶 · 잇다</title>
  <link rel="stylesheet" href="./auth-styles.css">
  <style>
    body { background: var(--bg); }

    /* 페이지 헤더 */
    .self-header {
      padding: 22px 0 6px;
    }
    .self-header-sub {
      font-size: 12.5px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }
    .self-header-title {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.45;
      color: var(--ink);
    }
    .self-header-desc {
      font-size: 13.5px;
      color: var(--ink-muted);
      margin-top: 6px;
      line-height: 1.7;
    }

    /* 오늘은 이걸로 시작 (첫 번째 카드 — 강조) */
    .card-highlight {
      background: var(--primary);
      border-radius: var(--radius);
      padding: 22px 22px 20px;
      color: #fff;
      cursor: pointer;
      text-decoration: none;
      display: block;
      transition: opacity 0.15s;
      position: relative;
      overflow: hidden;
    }
    .card-highlight:hover { opacity: 0.93; }
    .card-highlight::before {
      content: '';
      position: absolute;
      top: -30px;
      right: -30px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
    }
    .card-hl-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.22);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 11.5px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .card-hl-icon { font-size: 28px; margin-bottom: 8px; display: block; }
    .card-hl-title {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }
    .card-hl-status {
      font-size: 13px;
      opacity: 0.85;
      margin-bottom: 14px;
    }
    .card-hl-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.18);
      border-radius: 999px;
      padding: 7px 16px;
      font-size: 13.5px;
      font-weight: 700;
    }

    /* 일반 마무리 카드 */
    .self-cards { margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }

    .self-card {
      background: var(--bg-alt);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .self-card:hover {
      border-color: var(--primary-soft);
      box-shadow: 0 4px 16px rgba(92,138,111,0.07);
    }
    .self-card-icon {
      width: 44px;
      height: 44px;
      border-radius: 13px;
      background: var(--primary-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .self-card-body { flex: 1; min-width: 0; }
    .self-card-title {
      font-size: 14.5px;
      font-weight: 800;
      letter-spacing: -0.01em;
      margin-bottom: 3px;
    }
    .self-card-status {
      font-size: 12.5px;
      color: var(--ink-muted);
    }
    .self-card-status.done { color: var(--primary); font-weight: 600; }
    .self-card-arrow { color: var(--ink-faint); font-size: 18px; flex-shrink: 0; }

    /* 진행 바 */
    .self-progress-wrap { margin-top: 4px; }
    .self-progress-track {
      height: 3px;
      background: rgba(0,0,0,0.08);
      border-radius: 999px;
      margin-top: 6px;
      overflow: hidden;
    }
    .self-progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    /* 잠금 공유 카드 (별도 스타일) */
    .self-card-lock {
      background: var(--warm-soft);
      border-color: rgba(176,112,67,0.18);
    }
    .self-card-lock .self-card-icon { background: rgba(176,112,67,0.12); }
    .self-card-lock .self-card-title { color: var(--warm); }

    /* 안내 배너 */
    .self-notice {
      background: var(--bg-alt);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      font-size: 12.5px;
      color: var(--ink-muted);
      line-height: 1.7;
      margin-top: 20px;
      border: 1px dashed var(--line);
    }
    .self-notice strong { color: var(--ink-soft); }

    /* 비로그인 안내 */
    .login-prompt {
      text-align: center;
      padding: 48px 20px;
    }
    .login-prompt-icon { font-size: 40px; margin-bottom: 16px; }
    .login-prompt-title {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .login-prompt-desc {
      font-size: 14px;
      color: var(--ink-muted);
      line-height: 1.7;
      margin-bottom: 24px;
    }
    .btn-primary {
      display: inline-block;
      padding: 13px 28px;
      background: var(--primary);
      color: #fff;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--primary-hover); }
  </style>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
  <meta name="theme-color" content="#5C8A6F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="잇다">
</head>
<body>

<main class="page-shell" id="self-main">
  <div style="height:40px;background:var(--bg-alt);border-radius:var(--radius-sm);animation:shimmer 1.4s infinite;"></div>
</main>

<script type="module">
import { supabase } from './auth.js';
import { renderNav } from './nav.js';

await renderNav({ active: 'self', infoIcon: true, title: '나의 삶' });

const { data: { session } } = await supabase.auth.getSession();
const user = session?.user ?? null;

const main = document.getElementById('self-main');

if (!user) {
  main.innerHTML = `
    <div class="login-prompt">
      <div class="login-prompt-icon">🕊</div>
      <div class="login-prompt-title">나의 삶을<br>기록해 볼까요?</div>
      <div class="login-prompt-desc">
        사전연명의료의향서, 디지털 자산, 가족에게 남기는 메시지 —<br>
        한 번에 다 하지 않아도 괜찮아요.
      </div>
      <a href="./signup.html?mode=self" class="btn-primary">시작하기</a>
      <div style="margin-top:12px;font-size:13.5px;color:var(--ink-muted);">
        이미 계정이 있으시면 <a href="./login.html" style="color:var(--primary);font-weight:700;">로그인</a>
      </div>
    </div>
  `;
} else {

// 카드 정의 (우선순위 순)
const CARDS = [
  {
    key: 'directive',
    icon: '🩺',
    title: '사전연명의료의향서',
    href: './info/advance-directive.html',
    getStatus: (data) => data?.directive_done
      ? `등록 완료 · ${data.directive_date || ''}`
      : '미작성 · 5분이면 충분해요',
    isDone: (data) => !!data?.directive_done,
    progress: null,
  },
  {
    key: 'digital',
    icon: '🔐',
    title: '디지털 자산 노트',
    href: './note/digital.html',
    getStatus: (data) => {
      const done = data?.digital_count || 0;
      return done > 0 ? `${done} / 8 카테고리 작성` : '아직 작성 전이에요';
    },
    isDone: (data) => (data?.digital_count || 0) >= 8,
    progress: (data) => Math.round(((data?.digital_count || 0) / 8) * 100),
  },
  {
    key: 'funeral',
    icon: '🕊',
    title: '장례 의향',
    href: './note/funeral.html',
    getStatus: (data) => data?.funeral_done ? '작성 완료' : '미작성',
    isDone: (data) => !!data?.funeral_done,
    progress: null,
  },
  {
    key: 'message',
    icon: '💌',
    title: '가족에게 남기는 메시지',
    href: './note/messages.html',
    getStatus: (data) => {
      const cnt = data?.message_count || 0;
      return cnt > 0 ? `초안 ${cnt}편 보관 중` : '아직 작성 전이에요';
    },
    isDone: (data) => (data?.message_count || 0) > 0,
    progress: null,
  },
  {
    key: 'lock',
    icon: '👨‍👩‍👧',
    title: '가족 잠금 공유',
    href: './note/family-lock.html',
    getStatus: (data) => data?.lock_shared ? '공유 중' : '아직 공유 안 됨',
    isDone: (data) => !!data?.lock_shared,
    progress: null,
    isLock: true,
  },
];

// 사용자 데이터 — 현재는 note_entries 테이블 기반 (없으면 빈 값)
let selfData = {};
try {
  const { data } = await supabase
    .from('note_entries')
    .select('key, value')
    .eq('user_id', user.id);
  if (data) {
    data.forEach(row => { selfData[row.key] = row.value; });
  }
} catch (_) {}

// 첫 카드(하이라이트) 선정 — 미완료 중 가장 우선순위 높은 것
let highlightIdx = 0;
for (let i = 0; i < CARDS.length; i++) {
  if (!CARDS[i].isDone(selfData)) { highlightIdx = i; break; }
}

// 모두 완료면 0번 그대로
const hlCard = CARDS[highlightIdx];
const rest = CARDS.filter((_, i) => i !== highlightIdx);

const pct = hlCard.progress ? hlCard.progress(selfData) : null;
const progressHtml = pct !== null ? `
  <div class="self-progress-wrap">
    <div class="self-progress-track">
      <div class="self-progress-fill" style="width:${pct}%;background:rgba(255,255,255,0.8);"></div>
    </div>
  </div>
` : '';

let html = `
  <div class="self-header">
    <div class="self-header-sub">나의 삶</div>
    <div class="self-header-title">"이따가 하지 말고 지금."</div>
    <div class="self-header-desc">한 번에 다 하지 않아도 괜찮아요.</div>
  </div>

  <a href="${hlCard.href}" class="card-highlight">
    <div class="card-hl-badge">✨ 오늘은 이걸로 시작</div>
    <span class="card-hl-icon">${hlCard.icon}</span>
    <div class="card-hl-title">${hlCard.title}</div>
    <div class="card-hl-status">${hlCard.getStatus(selfData)}</div>
    ${progressHtml}
    <div class="card-hl-cta">시작하기 →</div>
  </a>

  <div class="self-cards">
`;

rest.forEach(card => {
  const done = card.isDone(selfData);
  const pct = card.progress ? card.progress(selfData) : null;
  const extraClass = card.isLock ? 'self-card-lock' : '';
  html += `
    <a href="${card.href}" class="self-card ${extraClass}">
      <div class="self-card-icon">${card.icon}</div>
      <div class="self-card-body">
        <div class="self-card-title">${card.title}</div>
        <div class="self-card-status ${done ? 'done' : ''}">${card.getStatus(selfData)}</div>
        ${pct !== null ? `<div class="self-progress-track"><div class="self-progress-fill" style="width:${pct}%"></div></div>` : ''}
      </div>
      <span class="self-card-arrow">›</span>
    </a>
  `;
});

html += `</div>

  <div class="self-notice">
    <strong>잇다는 안내만 합니다.</strong> 사전연명의료의향서 등록은 공식 기관(보건소·등록기관)을 통해 이루어지며, 잇다는 완료 여부만 기록합니다. 법적 효력이 있는 유언장 작성은 <a href="https://easylaw.go.kr" target="_blank" rel="noopener" style="color:var(--primary);">찾기쉬운생활법령</a>을 참고하세요.
  </div>
`;

main.innerHTML = html;

} // end if (user)
</script>

<script src="./scroll-top.js" defer></script>
</body>
</html>
