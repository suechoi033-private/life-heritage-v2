<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 · 잇다</title>
  <meta name="description" content="잇다에 가입하여 소중한 이야기를 기록하고 함께 기억할 수 있습니다.">
  <link rel="stylesheet" href="./auth-styles.css">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
  <meta name="theme-color" content="#2F6B4F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="잇다">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="./index.html" class="logo"><span class="logo-mark">●</span> 잇다</a>
  </div>
</nav>

<main class="auth-container">
  <span class="auth-kicker">JOIN</span>
  <h1>함께 기록하는 자리에<br>초대합니다</h1>
  <p class="auth-lead">
    가입하시면 소중한 분의 이야기를 저장하고,
    가족과 조용히 나누거나 비슷한 경험의 분들과 함께 기억할 수 있습니다.
  </p>

  <a id="invite-login-banner" class="hidden" href="./login.html"
     style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 0 18px;padding:14px 16px;background:var(--primary-soft);border:1px solid var(--primary);border-radius:14px;text-decoration:none;">
    <span style="font-size:13.5px;font-weight:700;color:var(--ink-soft);line-height:1.4;">이미 잇다 계정이 있으신가요?<br><span style="color:var(--primary);font-weight:800;">로그인하면 바로 합류돼요 →</span></span>
    <span style="font-size:13px;font-weight:800;color:#fff;background:var(--primary);padding:9px 16px;border-radius:999px;white-space:nowrap;">로그인</span>
  </a>

  <div id="alert" class="hidden"></div>

  <!-- 가장 쉬운 가입: 카카오를 맨 위 큰 버튼으로 -->
  <div id="social-auth"></div>

  <form id="signup-form" class="auth-form">
    <div class="field">
      <label for="name">이름 또는 불리고 싶은 이름</label>
      <input type="text" id="name" name="name" placeholder="예: 수련" required>
    </div>

    <div class="field">
      <label for="email">이메일</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
      <span class="field-hint">이 이메일로 인증 링크가 전달됩니다.</span>
    </div>

    <div class="field">
      <label for="password">비밀번호</label>
      <input type="password" id="password" name="password" placeholder="비밀번호 6자 이상" required minlength="6" autocomplete="new-password">
      <span class="field-hint">6자 이상. 다른 서비스와 다른 비밀번호를 쓰시는 것을 권장드립니다.</span>
    </div>

    <button type="submit" class="auth-submit">가입하기</button>
  </form>

  <div class="auth-bottom">
    이미 가입하셨나요? <a href="./login.html">로그인</a>
  </div>
</main>

<footer class="auth-footer">
  © 2026 라이프헤리티지 · 잇다
</footer>
<script src="./js/feedback-link.js"></script>

<script type="module">
  import { signUp, redirectIfAuthed, friendlyError, supabase } from './auth.js';
  import { renderSocialAuthButtons } from './js/social-auth.js';
  import { captureReferral } from './js/referral.js';

  // ?ref= 유입 태그 캡처 (첫 진입이 signup 인 경우 대비)
  captureReferral();

  // ── 초대 코드 캡처 (케어링 + 친구) ────────────────────────
  const params = new URLSearchParams(location.search);
  const careInvite   = (params.get('invite') || '').toUpperCase();
  const friendInvite = (params.get('friend') || '').toUpperCase();
  // 가입 후 돌아갈 곳 (온보딩 등). 오픈 리다이렉트 방지: 사이트 내 상대경로 .html만 허용
  const rawNext = params.get('next') || '';
  const safeNext = /^\.\/[a-zA-Z0-9_\-]+\.html(\?[^#]*)?$/.test(rawNext) ? rawNext : '';

  let redirectAfterSignup = './index.html';

  // 이름 등 사용자 입력을 innerHTML에 넣기 전 escape
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // 초대받은 기존 회원용 상단 로그인 배너
  function showInviteLoginBanner(loginHref) {
    const banner = document.getElementById('invite-login-banner');
    if (banner) { banner.href = loginHref; banner.classList.remove('hidden'); }
    const loginLinks = document.querySelectorAll('a[href="./login.html"]');
    loginLinks.forEach(a => { a.href = loginHref; });
  }

  if (friendInvite) {
    localStorage.setItem('itda:pending_friend_invite', friendInvite);
    localStorage.removeItem('itda:pending_invite'); // 반대 종류 stale 정리
    redirectAfterSignup = `./invite.html?code=${encodeURIComponent(friendInvite)}`;
    const { data } = await supabase.auth.getSession();
    if (data?.session) { window.location.href = redirectAfterSignup; throw new Error('redirecting'); }
    const lead = document.querySelector('.auth-lead');
    if (lead) lead.innerHTML = `<strong style="color: var(--primary);">가족이 함께 보자고</strong> 해요. 가입하면 자동으로 연결됩니다.`;
    showInviteLoginBanner(`./login.html?friend=${friendInvite}`);
  } else if (careInvite) {
    localStorage.setItem('itda:pending_invite', careInvite);
    localStorage.removeItem('itda:pending_friend_invite'); // 반대 종류 stale 정리
    redirectAfterSignup = `./care.html?accept=${encodeURIComponent(careInvite)}`;
    const { data } = await supabase.auth.getSession();
    if (data?.session) { window.location.href = redirectAfterSignup; throw new Error('redirecting'); }
    const lead = document.querySelector('.auth-lead');
    // 기본 문구(미리보기 실패해도 유지)
    if (lead) lead.innerHTML = `<strong style="color: var(--primary);">가족 돌봄에 초대받으셨어요.</strong> 아래에 이름과 이메일만 넣으면 바로 함께하게 됩니다.`;
    // "누가 누구를" 미리보기로 안심시키기 (80대 신뢰)
    try {
      const { data: pv } = await supabase.rpc('preview_care_invite', { p_code: careInvite });
      const info = pv && pv[0];
      if (info && lead) {
        const roleTxt = info.role === 'helper' ? '돌봄을 돕는 분으로' : '가족으로';
        lead.innerHTML = `<strong style="color: var(--primary);">${esc(info.inviter_name)}</strong>님이 <strong>${esc(info.subject_name)}</strong>님 돌봄에 ${roleTxt} 초대하셨어요.<br>아래에 이름과 이메일만 넣으면 바로 함께하게 됩니다.`;
      }
    } catch (_) { /* 미리보기 실패 시 기본 문구 유지 */ }
    showInviteLoginBanner(`./login.html?invite=${careInvite}`);
  } else if (safeNext) {
    redirectAfterSignup = safeNext;
    // 답변→공유→초대 루프: invite-answer에서 온 가입은 안내 lead 부드럽게 갈음
    const fromInviteAnswer = params.get('invite_answer') === '1' || /invite-answer\.html/.test(safeNext);
    if (fromInviteAnswer) {
      const lead = document.querySelector('.auth-lead');
      if (lead) lead.innerHTML = `<strong style="color: var(--primary);">잇다 친구가 보낸 질문</strong>에 답을 적어두셨네요. 가입하시면 그 답이 그대로 저장돼요.`;
    }
    await redirectIfAuthed(safeNext);
  } else {
    await redirectIfAuthed('./index.html');
  }

  // ── 소셜 로그인 버튼 ────────────────────────
  renderSocialAuthButtons(document.getElementById('social-auth'), {
    redirectAfter: redirectAfterSignup,
    inviteCode: friendInvite || careInvite,
    dividerText: '또는 이메일로 가입',
    kakaoLabel: '카카오로 시작하기',
  });

  const form = document.getElementById('signup-form');
  const alertBox = document.getElementById('alert');
  const submitBtn = form.querySelector('.auth-submit');

  function showAlert(message, type = 'error') {
    alertBox.className = `alert alert-${type}`;
    alertBox.textContent = message;
    alertBox.classList.remove('hidden');
  }

  function hideAlert() {
    alertBox.classList.add('hidden');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert();
    submitBtn.disabled = true;
    submitBtn.textContent = '가입 중...';

    const name = form.name.value.trim();
    const email = form.email.value.trim();
    const password = form.password.value;

    const { data, error } = await signUp(email, password, name);

    if (error) {
      showAlert(friendlyError(error), 'error');
      submitBtn.disabled = false;
      submitBtn.textContent = '가입하기';
      return;
    }

    // 이미 가입된 이메일 — Supabase는 열거 방지를 위해 에러 대신
    // identities 가 빈 배열인 user 를 돌려준다. 로그인으로 안내한다.
    const alreadyRegistered =
      data?.user && Array.isArray(data.user.identities) && data.user.identities.length === 0;
    if (alreadyRegistered) {
      form.classList.add('hidden');
      showAlert(`이미 ${email} 으로 가입된 계정이 있습니다.`, 'error');
      alertBox.insertAdjacentHTML(
        'beforeend',
        '<div style="margin-top:14px; display:flex; flex-direction:column; gap:8px;">' +
          `<a href="./login.html?email=${encodeURIComponent(email)}" style="color:var(--primary);font-weight:700;text-decoration:underline;">이 이메일로 로그인하기 →</a>` +
          '<a href="./forgot.html" style="color:var(--ink-muted);text-decoration:underline;">비밀번호가 기억나지 않으세요?</a>' +
        '</div>'
      );
      submitBtn.disabled = false;
      submitBtn.textContent = '가입하기';
      return;
    }

    // 가입 직후 세션이 바로 잡혔는지 (자동 확인 환경) 확인
    const { data: sessData } = await supabase.auth.getSession();
    if (sessData?.session) {
      if (friendInvite || careInvite || safeNext) {
        window.location.href = redirectAfterSignup;
        return;
      }
      window.location.href = 'welcome.html';
      return;
    }

    // 세션 없음 → 이메일 인증 필요
    form.classList.add('hidden');
    const inviteHint = (friendInvite || careInvite)
      ? '<br>인증 후 로그인하시면 초대가 자동으로 적용됩니다.'
      : '';
    showAlert(
      `🌼 감사합니다. ${email} 으로 인증 링크를 보냈습니다. 받은 편지함을 확인하고 링크를 눌러주세요.${inviteHint}`,
      'success'
    );
    alertBox.insertAdjacentHTML(
      'beforeend',
      '<div style="margin-top:14px;"><a href="./login.html" style="color:var(--primary);font-weight:700;text-decoration:underline;">인증을 마쳤다면 여기서 로그인 →</a></div>'
    );
    submitBtn.disabled = false;
  });
</script>

</body>
</html>
