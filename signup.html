<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 · 잇다</title>
  <meta name="description" content="잇다에 가입하여 소중한 이야기를 기록하고 함께 기억할 수 있습니다.">
  <link rel="stylesheet" href="/auth-styles.css">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="logo"><span class="logo-mark">●</span> 잇다</a>
  </div>
</nav>

<main class="auth-container">
  <span class="auth-kicker">JOIN</span>
  <h1>함께 기록하는 자리에<br>초대합니다</h1>
  <p class="auth-lead">
    가입하시면 소중한 분의 이야기를 저장하고,
    가족과 조용히 나누거나 비슷한 경험의 분들과 함께 기억할 수 있습니다.
  </p>

  <div id="alert" class="hidden"></div>

  <form id="signup-form" class="auth-form">
    <div class="field">
      <label for="name">이름 또는 불리고 싶은 이름</label>
      <input type="text" id="name" name="name" placeholder="예: 수련" required>
    </div>

    <div class="field">
      <label for="email">이메일</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
      <span class="field-hint">이 이메일로 인증 링크가 전달됩니다.</span>
    </div>

    <div class="field">
      <label for="password">비밀번호</label>
      <input type="password" id="password" name="password" placeholder="비밀번호 6자 이상" required minlength="6" autocomplete="new-password">
      <span class="field-hint">6자 이상. 다른 서비스와 다른 비밀번호를 쓰시는 것을 권장드립니다.</span>
    </div>

    <button type="submit" class="auth-submit">가입하기</button>
  </form>

  <div class="auth-bottom">
    이미 가입하셨나요? <a href="/login.html">로그인</a>
  </div>
</main>

<footer class="auth-footer">
  © 2026 라이프헤리티지 · 잇다
</footer>

<script type="module">
  import { signUp, redirectIfAuthed, friendlyError, supabase } from '/auth.js';

  // ── 초대 코드 캡처 ────────────────────────
  const inviteCode = (new URLSearchParams(location.search).get('invite') || '').toUpperCase();
  if (inviteCode) {
    localStorage.setItem('itda:pending_invite', inviteCode);
    // 이미 로그인된 사용자라면 바로 care.html로 보내서 자동 수락
    const { data } = await supabase.auth.getSession();
    if (data?.session) {
      window.location.href = `/care.html?accept=${encodeURIComponent(inviteCode)}`;
      throw new Error('redirecting');
    }
    // 가입/로그인 안내 메시지에 초대 정보 표시
    const lead = document.querySelector('.auth-lead');
    if (lead) lead.innerHTML = `<strong style="color: var(--primary);">초대 코드 ${inviteCode}</strong>를 받으셨네요. 가입하시면 자동으로 합류됩니다.`;
    // 로그인 링크에 invite 유지
    const loginLinks = document.querySelectorAll('a[href="/login.html"]');
    loginLinks.forEach(a => { a.href = `/login.html?invite=${inviteCode}`; });
  } else {
    await redirectIfAuthed('/my.html');
  }

  const form = document.getElementById('signup-form');
  const alertBox = document.getElementById('alert');
  const submitBtn = form.querySelector('.auth-submit');

  function showAlert(message, type = 'error') {
    alertBox.className = `alert alert-${type}`;
    alertBox.textContent = message;
    alertBox.classList.remove('hidden');
  }

  function hideAlert() {
    alertBox.classList.add('hidden');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert();
    submitBtn.disabled = true;
    submitBtn.textContent = '가입 중...';

    const name = form.name.value.trim();
    const email = form.email.value.trim();
    const password = form.password.value;

    const { data, error } = await signUp(email, password, name);

    if (error) {
      showAlert(friendlyError(error), 'error');
      submitBtn.disabled = false;
      submitBtn.textContent = '가입하기';
      return;
    }

    // 가입 직후 세션이 바로 잡혔는지 (자동 확인 환경) 확인
    const { data: sessData } = await supabase.auth.getSession();
    if (sessData?.session) {
      // 세션 있음 → 초대 코드 있으면 바로 care.html로 (온보딩 건너뜀)
      if (inviteCode) {
        window.location.href = `/care.html?accept=${encodeURIComponent(inviteCode)}`;
        return;
      }
      // 신규 가입자 → 환영·온보딩 마법사로
      window.location.href = '/welcome.html';
      return;
    }

    // 세션 없음 → 이메일 인증 필요
    form.classList.add('hidden');
    const inviteHint = inviteCode
      ? '<br>인증 후 로그인하시면 초대 코드가 자동으로 적용됩니다.'
      : '';
    showAlert(
      `🌼 감사합니다. ${email} 으로 인증 링크를 보냈습니다. 받은 편지함을 확인하고 링크를 눌러주세요.${inviteHint}`,
      'success'
    );
    submitBtn.disabled = false;
  });
</script>

</body>
</html>
