<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>콘텐츠 · 잇다</title>
  <link rel="stylesheet" href="./auth-styles.css">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#2F6B4F">
  <!-- 마크다운 렌더링: marked(GFM) + DOMPurify(XSS sanitize). 둘 다 실패 시 본문은 escape 텍스트 폴백. -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/lib/marked.umd.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" crossorigin="anonymous"></script>
  <style>
    /* 읽기 진척도 바 — 화면 상단 고정, 본문 스크롤 비율만큼 차오름 */
    .reading-progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      width: 0%;
      background: var(--primary);
      z-index: 120;
      transition: width 0.08s linear;
      will-change: width;
    }

    /* 읽기 시간 칩 (바이라인 옆) */
    .content-readtime { display: inline-flex; align-items: center; gap: 4px; }

    /* 목차(TOC) — 모바일 우선 접이식 */
    .content-toc {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--bg-alt);
      margin: 0 0 20px;
      overflow: hidden;
    }
    .content-toc-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 12px 14px;
      background: transparent;
      border: none;
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 800;
      color: var(--ink-soft);
      cursor: pointer;
      text-align: left;
    }
    .content-toc-toggle-label { display: inline-flex; align-items: center; gap: 7px; }
    .content-toc-chevron { font-size: 11px; color: var(--ink-muted); transition: transform 0.18s ease; }
    .content-toc[data-open="true"] .content-toc-chevron { transform: rotate(180deg); }
    .content-toc-list {
      list-style: none;
      margin: 0;
      padding: 0 14px 12px;
      display: none;
    }
    .content-toc[data-open="true"] .content-toc-list { display: block; }
    .content-toc-list li { margin: 0; }
    .content-toc-link {
      display: block;
      padding: 6px 8px;
      border-radius: 8px;
      font-size: 13.5px;
      line-height: 1.45;
      color: var(--ink-soft);
      text-decoration: none;
      border-left: 2px solid transparent;
    }
    .content-toc-link:hover { background: var(--primary-soft); color: var(--primary); }
    .content-toc-link.depth-3 { padding-left: 20px; font-size: 13px; color: var(--ink-muted); }
    .content-toc-link.active { color: var(--primary); font-weight: 800; border-left-color: var(--primary); background: var(--primary-soft); }
    .content-toc-link:focus-visible { outline: 2px solid var(--primary); outline-offset: 1px; }

    /* 헤딩 앵커 — 고정 탑바(52px) 만큼 스크롤 여백 */
    .content-body h2[id], .content-body h3[id] { scroll-margin-top: 64px; }

    .content-head { padding: 6px 0 16px; border-bottom: 1px solid var(--line); margin-bottom: 18px; }
    .content-meta-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; font-size: 12px; }
    .content-cat-chip { padding: 3px 10px; background: var(--primary-soft); color: var(--primary); border-radius: 999px; font-weight: 800; }
    .content-author-chip { padding: 3px 10px; border-radius: 999px; font-weight: 700; }
    .author-official { background: var(--primary); color: #fff; }
    .author-user { background: var(--warm-soft); color: var(--warm); }
    .content-title {
      font-family: var(--font-serif);
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.4;
      margin: 12px 0 8px;
    }
    .content-meta-sub { font-size: 12px; color: var(--ink-muted); display: flex; gap: 10px; }
    .content-byline { font-size: 12px; color: var(--ink-muted); display: flex; align-items: center; flex-wrap: wrap; gap: 6px 8px; }
    .content-byline-avatar { width: 22px; height: 22px; border-radius: 999px; object-fit: cover; flex-shrink: 0; }
    .content-byline-name { font-weight: 800; color: var(--ink-soft); }
    .content-body {
      font-size: 15.5px;
      line-height: 1.85;
      word-break: break-word;
    }
    .content-body img { max-width: 100%; border-radius: var(--radius-sm); }
    /* 마크다운 렌더 결과 스타일 */
    .content-body > *:first-child { margin-top: 0; }
    .content-body p { margin: 0 0 1em; }
    .content-body h1, .content-body h2, .content-body h3, .content-body h4 {
      font-family: var(--font-serif);
      font-weight: 800;
      letter-spacing: -0.01em;
      line-height: 1.4;
      color: var(--ink);
    }
    .content-body h1 { font-size: 22px; margin: 1.6em 0 0.6em; }
    .content-body h2 { font-size: 19px; margin: 1.5em 0 0.5em; }
    .content-body h3 { font-size: 16.5px; margin: 1.4em 0 0.45em; }
    .content-body h4 { font-size: 15px; margin: 1.3em 0 0.4em; }
    .content-body strong { font-weight: 800; color: var(--ink); }
    .content-body em { font-style: italic; }
    .content-body a {
      color: var(--primary);
      text-decoration: underline;
      text-underline-offset: 2px;
      word-break: break-all;
    }
    .content-body a:hover { color: var(--primary-hover); }
    .content-body ul, .content-body ol { margin: 0 0 1em; padding-left: 1.4em; }
    .content-body li { margin: 0.3em 0; }
    .content-body li > ul, .content-body li > ol { margin: 0.3em 0; }
    .content-body blockquote {
      margin: 1.2em 0;
      padding: 8px 16px;
      border-left: 3px solid var(--primary);
      background: var(--primary-soft);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      color: var(--ink-soft);
    }
    .content-body blockquote p:last-child { margin-bottom: 0; }
    .content-body blockquote.cta-linked {
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .content-body blockquote.cta-linked:hover {
      background: var(--primary);
      border-left-color: var(--primary-hover);
    }
    .content-body blockquote.cta-linked:hover, .content-body blockquote.cta-linked:hover strong {
      color: #fff;
    }
    .content-body blockquote.cta-linked:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    .content-body hr { border: none; border-top: 1px solid var(--line); margin: 1.6em 0; }
    .content-body code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.88em;
      background: var(--bg-alt);
      padding: 1.5px 5px;
      border-radius: 5px;
    }
    .content-body pre {
      background: var(--bg-alt);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      overflow-x: auto;
      margin: 1.2em 0;
    }
    .content-body pre code { background: none; padding: 0; font-size: 13px; }
    .content-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.2em 0;
      font-size: 14px;
      display: block;
      overflow-x: auto;
    }
    .content-body th, .content-body td {
      border: 1px solid var(--line);
      padding: 8px 12px;
      text-align: left;
      vertical-align: top;
    }
    .content-body th { background: var(--bg-alt); font-weight: 800; }
    .related-q {
      background: var(--primary-soft);
      border-radius: var(--radius);
      padding: 14px 18px;
      margin: 20px 0;
    }
    .related-q-label { font-size: 11.5px; font-weight: 800; color: var(--primary); letter-spacing: 0.04em; }
    .related-q-text { font-family: var(--font-serif); font-size: 15px; line-height: 1.55; font-weight: 700; margin-top: 5px; }

    .action-row {
      display: flex;
      gap: 10px;
      margin: 24px 0 18px;
      padding: 14px 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    .action-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--bg-alt);
      border: none;
      font-size: 13px;
      font-weight: 700;
      color: var(--ink-soft);
      cursor: pointer;
      font-family: inherit;
    }
    .action-btn.active { background: var(--primary); color: #fff; }
    .action-btn.bookmark.active { background: var(--warm); }
    .action-btn-spacer { margin-left: auto; }
    .content-manage { position: relative; display: inline-flex; }
    #content-manage-btn {
      background: transparent; border: none; cursor: pointer;
      font-size: 20px; line-height: 1; color: var(--ink-soft);
      padding: 4px 6px; font-family: inherit;
    }
    .content-manage-menu {
      position: absolute; top: 120%; right: 0; z-index: 130;
      background: #fff; border: 1px solid var(--line); border-radius: 12px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.10); padding: 6px;
      min-width: 132px; display: flex; flex-direction: column;
    }
    .content-manage-menu[hidden] { display: none; }
    .content-manage-menu a, .content-manage-menu button {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; border-radius: 8px;
      background: transparent; border: none; cursor: pointer;
      font-size: 14px; font-weight: 600; color: var(--ink);
      font-family: inherit; text-decoration: none; text-align: left; width: 100%;
    }
    .content-manage-menu a:hover, .content-manage-menu button:hover { background: var(--bg-alt); }
    .content-manage-menu button.danger { color: var(--warm); }
    .action-report {
      background: transparent;
      border: none;
      color: var(--ink-faint);
      font-size: 12px;
      cursor: pointer;
      padding: 4px 6px;
    }

    /* 토론 섹션 */
    .discussion-head { font-size: 14px; font-weight: 800; margin: 20px 0 10px; }
    .discussion-thread {
      display: block;
      padding: 12px 14px;
      background: var(--bg-alt);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      text-decoration: none;
      color: inherit;
    }
    .discussion-thread:hover { border-color: var(--primary-soft); }
    .discussion-thread-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .discussion-thread-meta { font-size: 11.5px; color: var(--ink-muted); display: flex; gap: 8px; }

    /* 신고 모달 */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .modal-sheet {
      width: 100%; max-width: 480px;
      background: var(--bg);
      border-radius: 20px 20px 0 0;
      padding: 22px 20px calc(20px + env(safe-area-inset-bottom, 0px));
    }
    .modal-title { font-size: 15px; font-weight: 800; margin-bottom: 14px; }
    .reason-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .reason-opt {
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--line);
      background: #fff;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      text-align: left;
    }
    .reason-opt.active { border-color: var(--danger); background: var(--danger-soft); color: var(--danger); }
    .modal-actions { display: flex; gap: 10px; }
    .modal-actions button {
      flex: 1; padding: 12px; border-radius: var(--radius-sm); border: none;
      font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
    }
    .modal-cancel { background: var(--bg-alt); border: 1px solid var(--line); }
    .modal-submit { background: var(--danger); color: #fff; }

    /* 이야기 카드 상세 */
    .story-badge {
      display: inline-block; font-size: 11.5px; font-weight: 800;
      padding: 3px 10px; border-radius: 999px;
      background: var(--primary); color: #fff; letter-spacing: 0.02em;
    }
    .story-cover { width: 100%; border-radius: var(--radius); margin: 4px 0 16px; display: block; }
    .story-excerpt {
      font-family: var(--font-serif);
      font-size: 16.5px; line-height: 1.6; color: var(--ink-soft);
      font-style: italic; margin: 8px 0 4px;
    }
    .story-checklist {
      background: var(--primary-soft);
      border-radius: var(--radius);
      padding: 18px 20px; margin: 24px 0;
    }
    .story-checklist-head { font-size: 14.5px; font-weight: 800; color: var(--primary); margin-bottom: 12px; }
    .story-check-item { display: flex; gap: 10px; align-items: flex-start; padding: 7px 0; font-size: 14.5px; line-height: 1.55; }
    .story-check-item::before { content: '✓'; color: var(--primary); font-weight: 800; flex-shrink: 0; }
    .story-check-item a { color: var(--primary); text-decoration: underline; }
    .story-cta {
      display: block; text-align: center; text-decoration: none;
      background: var(--primary); color: #fff;
      font-size: 15px; font-weight: 800;
      padding: 15px; border-radius: var(--radius);
      margin: 20px 0;
    }
    .empathy-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 18px; border-radius: 999px;
      border: 1.5px solid var(--primary); background: #fff;
      color: var(--primary); font-size: 13.5px; font-weight: 800;
      cursor: pointer; font-family: inherit;
    }
    .empathy-btn.active { background: var(--primary); color: #fff; }
  </style>
</head>
<body>

<div class="reading-progress" id="reading-progress" role="progressbar" aria-label="읽기 진척도" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>

<main class="page-shell">
  <div id="content-body"><div class="empty-state"><div class="empty-icon">⏳</div></div></div>
</main>
<div id="modal-root"></div>

<script type="module">
  import { supabase } from './auth.js';
  import { renderNav } from './nav.js';
  import { getContent, CATEGORIES, isBookmarked, toggleBookmark, getEmpathy, toggleEmpathy, deleteContent } from './js/content.js';
  import { toggleReaction, getReactionState, reportTarget, REPORT_REASONS, createPost } from './js/community.js';
  import { getSignedUrl, getPublicUrl } from './js/media-upload.js';
  import { shareContent } from './js/share-sheet.js';

  await renderNav({ active: 'forest', infoIcon: false, title: '콘텐츠', quickWrite: false });

  const { data: { session } } = await supabase.auth.getSession();
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { window.location.href = './forest.html'; throw new Error('id 누락'); }

  const content = await getContent(id);
  if (!content) {
    document.getElementById('content-body').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🙏</div>
        <div class="empty-title">콘텐츠를 찾을 수 없어요</div>
        <div class="cta-block"><a href="./forest.html">커뮤니티로</a></div>
      </div>`;
    throw new Error('not found');
  }

  // 관련 질문 텍스트 조회 (있는 경우)
  let relatedQuestion = null;
  if (content.related_question_id) {
    const { data } = await supabase.from('daily_questions')
      .select('question_text').eq('id', content.related_question_id).maybeSingle();
    relatedQuestion = data;
  }

  // 미디어 URL 생성
  const mediaUrls = await Promise.all(content.media.map(async (m) => {
    return getPublicUrl('content-media', m.storage_path);
  }));

  const cat = CATEGORIES[content.category] || { label: content.category, icon: '·' };
  const reactionState = await getReactionState('content', id);
  const bookmarked = await isBookmarked(id);
  const isOwner = session && content.creator_id === session.user.id;
  const isStory = content.format === 'story';
  const empathy = isStory ? await getEmpathy(id) : { count: 0, mine: false };
  const checklist = Array.isArray(content.checklist) ? content.checklist : [];
  const isAdmin = session?.user?.email === 'sue.choi033@gmail.com';
  const canManage = isOwner || isAdmin;

  document.getElementById('content-body').innerHTML = `
    <div class="content-head">
      <div class="content-meta-row">
        ${isStory ? `<span class="story-badge">📖 이야기</span>` : ''}
        <span class="content-cat-chip">${cat.icon} ${cat.label}</span>
        ${content.author_type === 'official' ? `<span class="content-author-chip author-official">공식</span>` : ''}
      </div>
      <div class="content-title">${escapeHtml(content.title)}</div>
      ${isStory && content.excerpt ? `<div class="story-excerpt">"${escapeHtml(content.excerpt)}"</div>` : ''}
      <div class="content-byline">
        ${content.profiles?.avatar_url ? `<img class="content-byline-avatar" src="${content.profiles.avatar_url}" alt="">` : ''}
        ${content.profiles?.name ? `<span class="content-byline-name">${escapeHtml(content.profiles.name)}</span>` : ''}
        <span>조회 ${content.view_count ?? 0}</span>
        <span>${formatDate(content.created_at)}</span>
        <span class="content-readtime" id="content-readtime"></span>
      </div>
    </div>

    ${isStory && content.cover_image_url ? `<img class="story-cover" src="${escapeHtml(content.cover_image_url)}" alt="표지">` : ''}
    <div id="toc-mount"></div>

    ${relatedQuestion ? `
      <div class="related-q">
        <div class="related-q-label">오늘 잇고</div>
        <div class="related-q-text">"${escapeHtml(relatedQuestion.question_text)}"</div>
      </div>` : ''}

    ${mediaUrls.length ? `
      <div style="margin-bottom: 16px;">
        ${mediaUrls.map((u, i) => content.media[i].media_type === 'video'
          ? `<video src="${u}" controls style="width:100%;border-radius:12px;margin-bottom:8px;"></video>`
          : `<img src="${u}" alt="첨부" style="width:100%;border-radius:12px;margin-bottom:8px;">`
        ).join('')}
      </div>` : ''}

    <div class="content-body" id="content-body-text"></div>

    ${isStory && checklist.length ? `
      <div class="story-checklist">
        <div class="story-checklist-head">✓ 다음 사람을 위한 체크리스트</div>
        ${checklist.map((c) => `
          <div class="story-check-item">
            <span>${c.url ? `<a href="${escapeHtml(c.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(c.text || '')}</a>` : escapeHtml(c.text || '')}</span>
          </div>`).join('')}
      </div>` : ''}

    ${isStory && content.cta_url ? `
      <a class="story-cta" href="${escapeHtml(content.cta_url)}" ${/^https?:/i.test(content.cta_url) ? 'target="_blank" rel="noopener noreferrer"' : ''}>
        ${escapeHtml(content.cta_label || '바로 시작하기')} →
      </a>` : ''}

    ${isStory ? `
      <div style="text-align:center;margin:22px 0;">
        <button class="empathy-btn ${empathy.mine ? 'active' : ''}" id="btn-empathy">
          🤝 비슷한 시기를 지나는 중 <span id="empathy-count">${empathy.count}</span>
        </button>
      </div>` : ''}

    ${content.source_url ? `
      <div style="margin-top:18px;font-size:12.5px;">
        출처: <a href="${content.source_url}" target="_blank" rel="noopener">${escapeHtml(content.source_url)}</a>
      </div>` : ''}

    <div class="action-row">
      <button class="action-btn like ${reactionState.mine ? 'active' : ''}" id="btn-like">
        ❤ <span id="like-count">${reactionState.count}</span>
      </button>
      <button class="action-btn bookmark ${bookmarked ? 'active' : ''}" id="btn-bookmark">
        🔖 ${bookmarked ? '저장됨' : '저장'}
      </button>
      <button class="action-btn" id="btn-share-card" aria-label="카드뉴스로 공유">✦ 공유</button>
      <div class="action-btn-spacer"></div>
      ${canManage ? '' : `
        <button class="action-report" id="btn-report">🚩 신고</button>
      `}
    </div>

    <div class="discussion-head">이 콘텐츠에 대한 대화</div>
    ${content.discussion_posts.length ? content.discussion_posts.map((p) => `
      <a class="discussion-thread" href="./post-detail.html?id=${p.id}">
        <div class="discussion-thread-title">${escapeHtml(p.title)}</div>
        <div class="discussion-thread-meta">
          ${p.profiles?.name ? `<span>${escapeHtml(p.profiles.name)}</span>` : ''}
          <span>💬 ${p.comment_count ?? 0}</span>
          <span>❤ ${p.reaction_count ?? 0}</span>
          <span>${formatDate(p.created_at)}</span>
        </div>
      </a>
    `).join('') : '<div class="empty-state" style="padding:20px;"><div class="empty-desc">첫 대화를 시작해 보세요.</div></div>'}

    ${session ? `
      <div class="cta-block" style="margin-top:14px;"><button id="btn-start-thread">＋ 이 콘텐츠로 대화 시작</button></div>
    ` : ''}
  `;

  // 본문 마크다운 렌더 (marked로 GFM 파싱 → DOMPurify로 정화 → innerHTML)
  renderBody(content.body || '');

  // 읽기 경험 3종: 읽기시간 · 목차(TOC) · 진척도 바
  // 읽기시간은 본문 텍스트 길이 기반이라 마크다운 성공/폴백 무관하게 항상 표시
  setupReadTime(content.body || '');
  setupTOC();
  setupReadingProgress();

  // 작성자/관리자 전용 우상단 메뉴 (수정·삭제)
  if (canManage) {
    const barActions = document.querySelector('.itda-top-bar-actions');
    if (barActions) {
      const wrap = document.createElement('div');
      wrap.className = 'content-manage';
      wrap.innerHTML = `
        <button id="content-manage-btn" title="관리" aria-label="글 관리" aria-haspopup="true" aria-expanded="false">⋯</button>
        <div class="content-manage-menu" id="content-manage-menu" role="menu" hidden>
          <a role="menuitem" href="./content-write.html?id=${content.id}">✏ 수정</a>
          <button role="menuitem" id="content-delete-btn" class="danger">🗑 삭제</button>
        </div>`;
      barActions.appendChild(wrap);

      const mBtn = wrap.querySelector('#content-manage-btn');
      const menu = wrap.querySelector('#content-manage-menu');
      mBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const open = !menu.hidden;
        menu.hidden = open;
        mBtn.setAttribute('aria-expanded', String(!open));
      });
      document.addEventListener('click', () => { menu.hidden = true; mBtn.setAttribute('aria-expanded', 'false'); });
      menu.addEventListener('click', (e) => e.stopPropagation());

      wrap.querySelector('#content-delete-btn').addEventListener('click', async () => {
        if (!confirm('이 글을 삭제할까요? 되돌릴 수 없습니다.')) return;
        try {
          await deleteContent(content.id);
          window.location.href = './forest.html';
        } catch (err) { alert('삭제에 실패했습니다: ' + err.message); }
      });
    }
  }

  // 카드뉴스 공유 — 글 전체를 잇다™ 카드 한 장으로
  document.getElementById('btn-share-card')?.addEventListener('click', () => {
    const author = content.profiles?.name || (content.author_type === 'official' ? '잇다 에디터' : '');
    const date = formatDate(content.created_at);
    shareContent({
      title: content.title || '',
      body: content.body || content.excerpt || '',
      meta: [author, date].filter(Boolean).join(' · '),
    });
  });

  // 좋아요
  document.getElementById('btn-like').addEventListener('click', async () => {
    if (!session) { window.location.href = './login.html'; return; }
    try {
      const r = await toggleReaction({ target_type: 'content', target_id: id });
      const cnt = document.getElementById('like-count');
      cnt.textContent = parseInt(cnt.textContent, 10) + (r.active ? 1 : -1);
      document.getElementById('btn-like').classList.toggle('active', r.active);
    } catch (err) { alert(err.message); }
  });

  // 북마크
  document.getElementById('btn-bookmark').addEventListener('click', async () => {
    if (!session) { window.location.href = './login.html'; return; }
    try {
      const newState = await toggleBookmark(id);
      const btn = document.getElementById('btn-bookmark');
      btn.classList.toggle('active', newState);
      btn.innerHTML = `🔖 ${newState ? '저장됨' : '저장'}`;
    } catch (err) { alert(err.message); }
  });

  // 공감 ("비슷한 시기를 지나는 중")
  document.getElementById('btn-empathy')?.addEventListener('click', async () => {
    if (!session) { window.location.href = './login.html'; return; }
    try {
      const active = await toggleEmpathy(id);
      const cnt = document.getElementById('empathy-count');
      cnt.textContent = parseInt(cnt.textContent, 10) + (active ? 1 : -1);
      document.getElementById('btn-empathy').classList.toggle('active', active);
    } catch (err) { alert(err.message); }
  });

  // 토론 시작
  document.getElementById('btn-start-thread')?.addEventListener('click', () => {
    window.location.href = `./post-write.html?content_id=${id}`;
  });

  // 신고
  document.getElementById('btn-report')?.addEventListener('click', () => openReportModal('content', id));

  function openReportModal(target_type, target_id) {
    if (!session) { window.location.href = './login.html'; return; }
    const root = document.getElementById('modal-root');
    let selected = null;
    root.innerHTML = `
      <div class="modal-overlay" id="modal-overlay">
        <div class="modal-sheet">
          <div class="modal-title">신고 사유</div>
          <div class="reason-list">
            ${REPORT_REASONS.map((r) => `<button type="button" class="reason-opt" data-reason="${escapeAttr(r)}">${escapeHtml(r)}</button>`).join('')}
          </div>
          <div class="modal-actions">
            <button class="modal-cancel" id="modal-cancel">취소</button>
            <button class="modal-submit" id="modal-submit" disabled>신고</button>
          </div>
        </div>
      </div>
    `;
    const close = () => { root.innerHTML = ''; };
    document.getElementById('modal-overlay').addEventListener('click', (e) => { if (e.target.id === 'modal-overlay') close(); });
    document.getElementById('modal-cancel').addEventListener('click', close);
    root.querySelectorAll('.reason-opt').forEach((b) => b.addEventListener('click', () => {
      selected = b.dataset.reason;
      root.querySelectorAll('.reason-opt').forEach((x) => x.classList.toggle('active', x === b));
      document.getElementById('modal-submit').disabled = false;
    }));
    document.getElementById('modal-submit').addEventListener('click', async () => {
      try { await reportTarget({ target_type, target_id, reason: selected }); alert('신고가 접수되었어요. 운영자가 확인합니다.'); close(); }
      catch (err) { alert(err.message); }
    });
  }

  // 본문을 마크다운으로 렌더. 라이브러리 로드 실패 시 escape 텍스트로 폴백.
  function renderBody(raw) {
    const el = document.getElementById('content-body-text');
    if (!el) return;
    const md = window.marked;
    const purify = window.DOMPurify;
    // marked 또는 DOMPurify 미로드 → sanitize 없이 raw HTML 주입 금지. 안전 폴백.
    if (!md || !purify || typeof purify.sanitize !== 'function') {
      el.style.whiteSpace = 'pre-wrap';
      el.textContent = raw;
      return;
    }
    try {
      const html = md.parse(raw, { gfm: true, breaks: true });
      const clean = purify.sanitize(html, {
        ALLOWED_TAGS: ['h1','h2','h3','h4','h5','h6','p','br','hr','strong','b','em','i','u','s','del',
          'ul','ol','li','blockquote','a','code','pre','table','thead','tbody','tr','th','td','img','span'],
        ALLOWED_ATTR: ['href','title','alt','src'],
        ALLOWED_URI_REGEXP: /^(?:https?:|mailto:|tel:|\/|\.\/|#)/i,
      });
      el.innerHTML = clean;
      // 링크는 새 탭 + noopener (sanitize 후 적용해 안전)
      el.querySelectorAll('a[href]').forEach((a) => {
        a.setAttribute('target', '_blank');
        a.setAttribute('rel', 'noopener noreferrer');
      });
      // 잇다 기능을 언급한 CTA 인용구는 해당 탭으로 바로 이동(탭 가능)하게 만든다.
      linkifyCtaBlockquotes(el);
    } catch (_) {
      el.style.whiteSpace = 'pre-wrap';
      el.textContent = raw;
    }
  }

  // 본문 끝 CTA 인용구를 잇다 기능 탭으로 연결. 키워드→경로 매핑.
  // 인용구 안에 이미 링크가 있으면(출처 인용 등) 건드리지 않는다.
  function linkifyCtaBlockquotes(el) {
    const ROUTES = [
      { kw: '잇다 케어링', href: './nest.html' },
    ];
    el.querySelectorAll('blockquote').forEach((bq) => {
      if (bq.querySelector('a')) return;
      const text = bq.textContent || '';
      const hit = ROUTES.find((r) => text.includes(r.kw));
      if (!hit) return;
      bq.classList.add('cta-linked');
      bq.setAttribute('role', 'link');
      bq.setAttribute('tabindex', '0');
      const go = () => { window.location.href = hit.href; };
      bq.addEventListener('click', go);
      bq.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); go(); }
      });
    });
  }

  // ── 읽기 예상 시간 ──────────────────────────────
  // 마크다운 문법(#, *, [], 링크 등)을 대략 제거한 순수 글자 수로 추정.
  // 한글 읽기 속도 가정: 분당 약 500자. 최소 1분.
  function setupReadTime(raw) {
    const el = document.getElementById('content-readtime');
    if (!el) return;
    const text = String(raw)
      .replace(/```[\s\S]*?```/g, ' ')           // 코드블록
      .replace(/`[^`]*`/g, ' ')                   // 인라인 코드
      .replace(/!?\[([^\]]*)\]\([^)]*\)/g, '$1')  // 이미지/링크 → 텍스트만
      .replace(/[#>*_~`>-]/g, ' ')                // 마크다운 기호
      .replace(/\s+/g, ' ')
      .trim();
    const charCount = [...text].length;
    if (charCount === 0) { el.remove(); return; }
    const minutes = Math.max(1, Math.ceil(charCount / 500));
    el.textContent = `📖 약 ${minutes}분 읽기`;
  }

  // ── 목차(TOC) ──────────────────────────────────
  // 렌더된 본문에서 h2/h3 추출 → 각 헤딩에 안전한 id 부여 → 접이식 목차 생성.
  // 헤딩 2개 미만이면 표시하지 않음(짧은 글 폴백).
  function setupTOC() {
    const body = document.getElementById('content-body-text');
    const mount = document.getElementById('toc-mount');
    if (!body || !mount) return;

    const headings = [...body.querySelectorAll('h2, h3')];
    if (headings.length < 2) { mount.remove(); return; }

    const usedIds = new Set();
    const items = headings.map((h, i) => {
      // 기존 id 우선, 없으면 텍스트 기반 slug + 중복 방지
      let id = h.id;
      if (!id) {
        const base = (h.textContent || '')
          .trim().toLowerCase()
          .replace(/\s+/g, '-')
          .replace(/[^\w가-힣ㄱ-ㅎㅏ-ㅣ-]/g, '')
          .slice(0, 50);
        id = base || `section-${i + 1}`;
        let unique = id, n = 1;
        while (usedIds.has(unique)) unique = `${id}-${n++}`;
        id = unique;
        h.id = id;
      }
      usedIds.add(id);
      return { id, text: h.textContent || '', level: h.tagName === 'H3' ? 3 : 2 };
    });

    // 모바일에서 답답하지 않게 기본 펼침. 토글로 접힘 가능.
    mount.innerHTML = `
      <nav class="content-toc" id="content-toc" data-open="true" aria-label="목차">
        <button type="button" class="content-toc-toggle" id="toc-toggle"
                aria-expanded="true" aria-controls="toc-list">
          <span class="content-toc-toggle-label">📑 목차</span>
          <span class="content-toc-chevron" aria-hidden="true">▾</span>
        </button>
        <ul class="content-toc-list" id="toc-list">
          ${items.map((it) => `
            <li>
              <a class="content-toc-link depth-${it.level}" href="#${escapeAttr(it.id)}" data-target="${escapeAttr(it.id)}">
                ${escapeHtml(it.text)}
              </a>
            </li>`).join('')}
        </ul>
      </nav>`;

    const toc = document.getElementById('content-toc');
    const toggle = document.getElementById('toc-toggle');
    toggle.addEventListener('click', () => {
      const open = toc.getAttribute('data-open') !== 'true';
      toc.setAttribute('data-open', String(open));
      toggle.setAttribute('aria-expanded', String(open));
    });

    // 목차 클릭 → 부드러운 스크롤. 헤딩에 포커스 이동(접근성).
    toc.querySelectorAll('.content-toc-link').forEach((a) => {
      a.addEventListener('click', (e) => {
        e.preventDefault();
        const target = document.getElementById(a.dataset.target);
        if (!target) return;
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        // 포커스 가능하게 한 뒤 포커스(스크린리더/키보드)
        target.setAttribute('tabindex', '-1');
        target.focus({ preventScroll: true });
        history.replaceState(null, '', `#${a.dataset.target}`);
      });
    });

    // 현재 섹션 하이라이트 (IntersectionObserver, 미지원 시 생략)
    const linkById = new Map();
    toc.querySelectorAll('.content-toc-link').forEach((a) => linkById.set(a.dataset.target, a));
    if ('IntersectionObserver' in window) {
      const visible = new Set();
      const io = new IntersectionObserver((entries) => {
        entries.forEach((en) => {
          if (en.isIntersecting) visible.add(en.target.id);
          else visible.delete(en.target.id);
        });
        // 화면에 보이는 헤딩 중 문서 순서상 첫 번째를 활성화
        let activeId = null;
        for (const it of items) { if (visible.has(it.id)) { activeId = it.id; break; } }
        linkById.forEach((a, id) => a.classList.toggle('active', id === activeId));
      }, { rootMargin: '-60px 0px -70% 0px', threshold: 0 });
      headings.forEach((h) => io.observe(h));
    }
  }

  // ── 읽기 진척도 바 ──────────────────────────────
  // 본문 영역 기준 스크롤 비율. rAF로 스로틀.
  function setupReadingProgress() {
    const bar = document.getElementById('reading-progress');
    const body = document.getElementById('content-body-text');
    if (!bar || !body) return;
    let ticking = false;

    const update = () => {
      ticking = false;
      const rect = body.getBoundingClientRect();
      const vh = window.innerHeight || document.documentElement.clientHeight;
      const total = rect.height - vh;        // 본문이 뷰포트를 넘어 스크롤되는 양
      let pct;
      if (total <= 0) {
        // 본문이 화면보다 짧으면(짧은 글) 진척도 의미 없음 → 0% 유지
        pct = 0;
      } else {
        const scrolled = -rect.top;          // 본문 상단이 뷰포트 위로 올라간 거리
        pct = Math.min(100, Math.max(0, (scrolled / total) * 100));
      }
      bar.style.width = pct.toFixed(1) + '%';
      bar.setAttribute('aria-valuenow', String(Math.round(pct)));
    };
    const onScroll = () => {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(update);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll, { passive: true });
    update();
  }

  function formatDate(d) { return new Date(d).toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' }); }
  function escapeHtml(s) { return (s || '').replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
  function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }
</script>

</body>
