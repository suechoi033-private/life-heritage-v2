<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>라이프 · 잇다</title>
  <meta name="description" content="매일의 기록과 미래 계획 — 일기와 목표">
  <link rel="stylesheet" href="./auth-styles.css">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
  <meta name="theme-color" content="#5C8A6F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="잇다">
  <style>
    .seed-hero {
      background: linear-gradient(135deg, var(--primary-soft), #F3F8F5);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 16px;
    }
    .seed-hero-label { font-size: 11.5px; font-weight: 700; color: var(--primary); letter-spacing: 0.04em; }
    .seed-hero-title {
      font-family: var(--font-serif);
      font-size: 17px;
      font-weight: 800;
      line-height: 1.45;
      letter-spacing: -0.02em;
      margin: 4px 0 4px;
    }
    .seed-hero-stat { font-size: 12.5px; color: var(--ink-soft); }
    .seed-hero-stat strong { color: var(--primary); font-weight: 800; }

    /* 캘린더 */
    .calendar-wrap {
      background: var(--bg-alt);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 18px;
    }
    .calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .calendar-month {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.01em;
    }
    .calendar-nav {
      display: flex;
      gap: 4px;
    }
    .calendar-nav button {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      color: var(--ink-soft);
      font-family: inherit;
    }
    .calendar-nav button:hover { border-color: var(--primary); color: var(--primary); }
    .calendar-dow {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      margin-bottom: 4px;
    }
    .calendar-dow div {
      text-align: center;
      font-size: 10.5px;
      font-weight: 800;
      color: var(--ink-muted);
      letter-spacing: 0.04em;
      padding: 4px 0;
    }
    .calendar-dow div:first-child { color: var(--danger); }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .cal-cell {
      aspect-ratio: 1 / 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 4px;
      border-radius: 6px;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--ink-soft);
      cursor: pointer;
      background: transparent;
      border: none;
      font-family: inherit;
      position: relative;
    }
    .cal-cell:hover { background: rgba(0,0,0,0.04); }
    .cal-cell.other { color: var(--ink-faint); }
    .cal-cell.today {
      background: var(--primary);
      color: #fff;
      font-weight: 800;
    }
    .cal-cell.has-entry::after {
      content: '';
      position: absolute;
      bottom: 5px;
      left: 50%;
      transform: translateX(-50%);
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--primary);
    }
    .cal-cell.today.has-entry::after { background: #fff; }

    /* 검색 — 다이어리 탭 최상단 (눈에 잘 띄게) */
    .diary-search-wrap {
      position: relative;
      margin-bottom: 16px;
    }
    .diary-search-input {
      width: 100%;
      padding: 13px 90px 13px 44px;
      border: 1.5px solid var(--primary-soft);
      border-radius: 14px;
      font-size: 15px;
      font-family: inherit;
      background: #fff;
      box-shadow: 0 2px 8px rgba(92,138,111,0.06);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .diary-search-input::placeholder { color: var(--ink-muted); }
    .diary-search-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 2px 14px rgba(92,138,111,0.2);
    }
    .diary-search-icon {
      position: absolute;
      left: 16px; top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--primary);
      pointer-events: none;
    }
    .diary-search-clear {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--bg-alt);
      border: none;
      color: var(--ink-soft);
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      display: none;
    }
    .diary-search-clear.visible { display: inline-flex; align-items: center; justify-content: center; }
    .diary-search-new-badge {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 9.5px;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), #87B59C);
      padding: 3px 8px;
      border-radius: 999px;
      pointer-events: none;
      animation: badge-bounce 1.8s ease-in-out 0s 3;
    }
    .diary-search-input:focus ~ .diary-search-new-badge,
    .diary-search-wrap.has-text .diary-search-new-badge {
      display: none;
    }
    @keyframes badge-bounce {
      0%, 100% { transform: translateY(-50%) scale(1); }
      50% { transform: translateY(-50%) scale(1.15); }
    }
    .diary-search-hint {
      font-size: 11.5px;
      color: var(--ink-muted);
      padding: 6px 14px 0;
    }

    /* 타임라인 */
    .timeline-section { margin-top: 22px; }
    .timeline-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .timeline-title {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: -0.01em;
    }
    .timeline-empty {
      text-align: center;
      padding: 30px 20px;
      color: var(--ink-muted);
      font-size: 13.5px;
    }
    .diary-card {
      display: block;
      background: var(--bg-alt);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .diary-card:hover { border-color: var(--primary-soft); box-shadow: 0 2px 12px rgba(92,138,111,0.06); }
    .diary-card-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 11.5px;
      color: var(--ink-muted);
      margin-bottom: 6px;
    }
    .diary-card-date { font-weight: 800; color: var(--ink-soft); }
    .diary-card-template {
      padding: 1px 8px;
      border-radius: 999px;
      background: #fff;
      font-weight: 700;
      font-size: 10.5px;
    }
    .diary-card-title {
      font-family: var(--font-serif);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }
    .diary-card-excerpt {
      font-size: 13px;
      color: var(--ink-soft);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* FAB */
    .fab {
      position: fixed;
      right: 20px;
      bottom: calc(72px + env(safe-area-inset-bottom, 0px));
      z-index: 90;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      border: none;
      font-size: 24px;
      box-shadow: 0 4px 16px rgba(92,138,111,0.4);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s;
    }
    .fab:hover { background: var(--primary-hover); }
    .fab:active { transform: scale(0.95); }

    /* 더보기 */
    .load-more {
      width: 100%;
      padding: 11px;
      background: var(--bg-alt);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 700;
      color: var(--ink-soft);
      cursor: pointer;
      font-family: inherit;
      margin-top: 8px;
    }
    .load-more:hover { border-color: var(--primary); color: var(--primary); }

    /* 목표 대시보드 */
    .goal-summary {
      background: linear-gradient(135deg, var(--primary), #87B59C);
      color: #fff;
      border-radius: var(--radius);
      padding: 20px 22px;
      margin-bottom: 14px;
    }
    .goal-summary-label { font-size: 11.5px; font-weight: 700; letter-spacing: 0.04em; opacity: 0.85; }
    .goal-summary-pct {
      font-family: var(--font-serif);
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-top: 2px;
      line-height: 1;
    }
    .goal-summary-track {
      height: 6px;
      background: rgba(255,255,255,0.25);
      border-radius: 999px;
      margin: 14px 0 10px;
      overflow: hidden;
    }
    .goal-summary-fill {
      height: 100%;
      background: #fff;
      border-radius: 999px;
      transition: width 0.5s ease;
    }
    .goal-summary-stats { font-size: 12.5px; opacity: 0.92; }
    .goal-summary-stats strong { font-weight: 800; }

    .area-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 22px;
    }
    .area-card {
      background: var(--bg-alt);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      text-decoration: none;
      color: inherit;
    }
    .area-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
    .area-card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .area-card-icon { font-size: 22px; }
    .area-card-pct { font-size: 16px; font-weight: 800; font-family: var(--font-serif); }
    .area-card-label { font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
    .area-card-stat { font-size: 11.5px; color: var(--ink-muted); }
    .area-card-track {
      height: 4px;
      background: rgba(0,0,0,0.07);
      border-radius: 999px;
      margin-top: 8px;
      overflow: hidden;
    }
    .area-card-fill { height: 100%; border-radius: 999px; transition: width 0.4s ease; }

    .goal-card {
      display: block;
      background: var(--bg-alt);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .goal-card:hover { border-color: var(--primary-soft); box-shadow: 0 2px 12px rgba(92,138,111,0.06); }
    .goal-card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .goal-card-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10.5px;
      font-weight: 800;
    }
    .goal-card-priority {
      font-size: 10.5px;
      color: var(--ink-muted);
      font-weight: 700;
    }
    .goal-card-title {
      font-size: 14.5px;
      font-weight: 800;
      letter-spacing: -0.01em;
      margin: 8px 0 4px;
    }
    .goal-card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11.5px;
      color: var(--ink-muted);
      margin-top: 6px;
    }
    .goal-card-track {
      height: 4px;
      background: rgba(0,0,0,0.07);
      border-radius: 999px;
      margin-top: 4px;
      overflow: hidden;
    }
    .goal-card-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 999px;
      transition: width 0.4s ease;
    }
  </style>
</head>
<body>

<main class="page-shell" id="main-content">
  <div class="tab-segment" role="tablist">
    <button type="button" id="tab-diary" class="active" role="tab" aria-selected="true">일기</button>
    <button type="button" id="tab-goal" role="tab" aria-selected="false">목표·계획</button>
  </div>

  <div id="seed-hero" class="seed-hero">
    <div class="seed-hero-label">라이프</div>
    <div class="seed-hero-title" id="hero-title">오늘 하루,<br>어떻게 보내셨나요?</div>
    <div class="seed-hero-stat" id="seed-stat">불러오는 중...</div>
  </div>

  <div id="diary-pane">
    <!-- 검색 (최상단, 발견하기 쉽게) -->
    <div class="diary-search-wrap" id="diary-search-wrap">
      <span class="diary-search-icon">🔍</span>
      <input type="search" id="diary-search" class="diary-search-input"
        placeholder="일기 속 단어·태그로 검색…" autocomplete="off">
      <button type="button" id="diary-search-clear" class="diary-search-clear" aria-label="지우기">✕</button>
      <span class="diary-search-new-badge">NEW</span>
    </div>

    <!-- 캘린더 -->
    <div class="calendar-wrap">
      <div class="calendar-head">
        <div class="calendar-month" id="cal-month">2026년 5월</div>
        <div class="calendar-nav">
          <button id="cal-prev" aria-label="이전 달">‹</button>
          <button id="cal-today" aria-label="오늘">●</button>
          <button id="cal-next" aria-label="다음 달">›</button>
        </div>
      </div>
      <div class="calendar-dow">
        <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
      </div>
      <div class="calendar-grid" id="cal-grid"></div>
    </div>

    <!-- 타임라인 / 검색 결과 -->
    <div class="timeline-section">
      <div class="timeline-head">
        <div class="timeline-title" id="timeline-title">최근 일기</div>
      </div>
      <div id="timeline-body">
        <div class="timeline-empty">불러오는 중...</div>
      </div>
    </div>
  </div>

  <div id="goal-pane" style="display:none;">
    <!-- 전체 진척 카드 -->
    <div class="goal-summary" id="goal-summary"></div>
    <!-- 영역별 카드 -->
    <div class="area-grid" id="area-grid"></div>
    <!-- 목표 리스트 -->
    <div class="timeline-section">
      <div class="timeline-head">
        <div class="timeline-title">진행 중 목표</div>
      </div>
      <div id="goal-list-body">
        <div class="timeline-empty">불러오는 중...</div>
      </div>
    </div>
  </div>
</main>

<button class="fab" id="fab-write" aria-label="작성">＋</button>

<script type="module">
  import { supabase } from './auth.js';
  import { renderNav } from './nav.js';
  import { registerPWA } from './js/pwa.js';
  import { listMyDiariesByMonth, listMyDiariesTimeline, searchDiaries, TEMPLATES } from './js/diary.js';
  import { AREAS, PRIORITY_LABELS, listMyGoals, getDashboardSummary } from './js/goals.js';

  await renderNav({ active: 'seed', infoIcon: true, title: '라이프' });
  registerPWA();

  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { window.location.href = './login.html'; throw new Error('로그인 필요'); }

  // URL ?tab=diary|goal
  const params = new URLSearchParams(location.search);
  if (params.get('action') === 'new') {
    window.location.href = './diary-write.html';
  }
  const initialTab = params.get('tab') === 'goal' ? 'goal' : 'diary';
  setActiveTab(initialTab);

  let currentTab = 'diary';

  document.getElementById('tab-diary').addEventListener('click', () => setActiveTab('diary'));
  document.getElementById('tab-goal').addEventListener('click', () => setActiveTab('goal'));
  document.getElementById('fab-write').addEventListener('click', () => {
    window.location.href = currentTab === 'goal' ? './plan-write.html' : './diary-write.html';
  });

  function setActiveTab(tab) {
    currentTab = tab;
    document.getElementById('tab-diary').classList.toggle('active', tab === 'diary');
    document.getElementById('tab-goal').classList.toggle('active',  tab === 'goal');
    document.getElementById('diary-pane').style.display = tab === 'diary' ? '' : 'none';
    document.getElementById('goal-pane').style.display  = tab === 'goal'  ? '' : 'none';
    document.getElementById('hero-title').innerHTML = tab === 'diary'
      ? '오늘 하루,<br>어떻게 보내셨나요?'
      : '3·6·12·60개월<br>목표 진척은요?';
    if (tab === 'goal') loadGoalDashboard();
  }

  // ── 통계 ── (백그라운드 — 페이지 로드 차단 안 함)
  (async () => {
    const stat = document.getElementById('seed-stat');
    try {
      // 각 쿼리에 5초 타임아웃 — 하나가 멈춰도 다른 하나 결과는 받음
      const withTimeout = (p, ms = 5000) => Promise.race([
        p,
        new Promise((resolve) => setTimeout(() => resolve({ count: null, error: 'timeout' }), ms)),
      ]);
      const [diaryRes, goalRes] = await Promise.all([
        withTimeout(supabase.from('diary_entries').select('id', { count: 'exact', head: true }).eq('user_id', session.user.id)),
        withTimeout(supabase.from('goals').select('id', { count: 'exact', head: true }).eq('user_id', session.user.id).eq('status', 'active')),
      ]);
      const dc = diaryRes?.count;
      const gc = goalRes?.count;
      if (dc == null && gc == null) {
        stat.textContent = '시작해 보세요';
      } else {
        stat.innerHTML = `일기 <strong>${dc ?? '-'}</strong>개 · 진행 중 목표 <strong>${gc ?? '-'}</strong>개`;
      }
    } catch (err) {
      console.warn('[seed] 통계 조회 실패:', err);
      stat.textContent = '시작해 보세요';
    }
  })();

  // ── 캘린더 ──
  let calCursor = new Date();
  calCursor.setDate(1);
  let monthEntries = new Map();

  async function renderCalendar() {
    const year = calCursor.getFullYear();
    const month = calCursor.getMonth();
    document.getElementById('cal-month').textContent = `${year}년 ${month + 1}월`;

    try {
      const entries = await Promise.race([
        listMyDiariesByMonth(year, month),
        new Promise((_, rej) => setTimeout(() => rej(new Error('캘린더 쿼리 시간초과 (5초)')), 5000)),
      ]);
      monthEntries.clear();
      (entries || []).forEach((e) => {
        const key = e.entry_date;
        if (!monthEntries.has(key)) monthEntries.set(key, []);
        monthEntries.get(key).push(e);
      });
    } catch (err) {
      console.warn('[seed] 캘린더 조회 실패:', err);
      monthEntries.clear();
    }

    const firstDow = new Date(year, month, 1).getDay();
    const lastDate = new Date(year, month + 1, 0).getDate();
    const prevLastDate = new Date(year, month, 0).getDate();
    const today = new Date().toISOString().slice(0, 10);

    const cells = [];
    // 앞쪽 빈칸
    for (let i = firstDow - 1; i >= 0; i--) {
      const d = prevLastDate - i;
      cells.push({ day: d, other: true, date: null });
    }
    for (let d = 1; d <= lastDate; d++) {
      const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      cells.push({ day: d, other: false, date: dateStr });
    }
    // 뒷쪽: 6행 채우기
    const total = Math.ceil(cells.length / 7) * 7;
    for (let d = 1; cells.length < total; d++) {
      cells.push({ day: d, other: true, date: null });
    }

    const grid = document.getElementById('cal-grid');
    grid.innerHTML = cells.map((c) => {
      const cls = [
        'cal-cell',
        c.other ? 'other' : '',
        c.date === today ? 'today' : '',
        c.date && monthEntries.has(c.date) ? 'has-entry' : '',
      ].filter(Boolean).join(' ');
      return `<button type="button" class="${cls}" data-date="${c.date || ''}">${c.day}</button>`;
    }).join('');

    grid.querySelectorAll('.cal-cell').forEach((btn) => {
      btn.addEventListener('click', () => {
        const date = btn.dataset.date;
        if (!date) return;
        const list = monthEntries.get(date);
        if (list && list.length === 1) {
          window.location.href = `./diary-detail.html?id=${list[0].id}`;
        } else if (list && list.length > 1) {
          // 여러 개 있으면 타임라인에서 보여줄 수도, 우선 첫 번째로
          window.location.href = `./diary-detail.html?id=${list[0].id}`;
        } else {
          // 새 일기 쓰기
          window.location.href = `./diary-write.html?date=${date}`;
        }
      });
    });
  }

  document.getElementById('cal-prev').addEventListener('click', () => {
    calCursor = new Date(calCursor.getFullYear(), calCursor.getMonth() - 1, 1);
    renderCalendar();
  });
  document.getElementById('cal-next').addEventListener('click', () => {
    calCursor = new Date(calCursor.getFullYear(), calCursor.getMonth() + 1, 1);
    renderCalendar();
  });
  document.getElementById('cal-today').addEventListener('click', () => {
    calCursor = new Date();
    calCursor.setDate(1);
    renderCalendar();
  });

  renderCalendar();

  // ── 타임라인 ──
  let timelineCursor = null;
  let timelineExhausted = false;

  async function loadTimeline(append = false) {
    const body = document.getElementById('timeline-body');
    if (!append) body.innerHTML = `<div class="timeline-empty">불러오는 중...</div>`;
    try {
      const items = await Promise.race([
        listMyDiariesTimeline(10, timelineCursor),
        new Promise((_, rej) => setTimeout(() => rej(new Error('일기 목록 시간초과 (8초) — 네트워크 또는 RLS 문제 가능')), 8000)),
      ]);
      if (!append) body.innerHTML = '';
      if (!items.length && !append) {
        body.innerHTML = `
          <div class="timeline-empty">
            아직 일기가 없어요.<br>오른쪽 아래 ＋ 버튼으로 첫 일기를 심어보세요.
          </div>`;
        return;
      }
      if (!items.length) {
        timelineExhausted = true;
        document.getElementById('btn-more')?.remove();
        return;
      }

      const html = items.map((d) => {
        const excerpt = (d.content || '').replace(/\s+/g, ' ').slice(0, 120);
        return `
          <a class="diary-card" href="./diary-detail.html?id=${d.id}">
            <div class="diary-card-meta">
              <span class="diary-card-date">${formatDate(d.entry_date)}</span>
              <span class="diary-card-template">${TEMPLATES[d.template_type]?.label || ''}</span>
            </div>
            ${d.title ? `<div class="diary-card-title">${escapeHtml(d.title)}</div>` : ''}
            ${excerpt ? `<div class="diary-card-excerpt">${escapeHtml(excerpt)}</div>` : ''}
          </a>`;
      }).join('');

      body.insertAdjacentHTML('beforeend', html);
      timelineCursor = items[items.length - 1].entry_date;

      document.getElementById('btn-more')?.remove();
      if (items.length === 10) {
        const btn = document.createElement('button');
        btn.id = 'btn-more';
        btn.className = 'load-more';
        btn.textContent = '더보기';
        btn.addEventListener('click', () => loadTimeline(true));
        body.appendChild(btn);
      }
    } catch (err) {
      body.innerHTML = `<div class="timeline-empty">불러오기 실패: ${err.message || err}</div>`;
    }
  }

  loadTimeline();

  // ── 검색 ──
  const searchEl = document.getElementById('diary-search');
  const searchClearEl = document.getElementById('diary-search-clear');
  const titleEl = document.getElementById('timeline-title');
  let searchTimer = null;
  let searchToken = 0;

  function renderSearchResults(items, q) {
    const body = document.getElementById('timeline-body');
    document.getElementById('btn-more')?.remove();
    if (!items.length) {
      body.innerHTML = `<div class="timeline-empty">'${escapeHtml(q)}'에 해당하는 일기가 없어요.</div>`;
      return;
    }
    body.innerHTML = items.map((d) => {
      const excerpt = (d.content || '').replace(/\s+/g, ' ').slice(0, 120);
      return `
        <a class="diary-card" href="./diary-detail.html?id=${d.id}">
          <div class="diary-card-meta">
            <span class="diary-card-date">${formatDate(d.entry_date)}</span>
            <span class="diary-card-template">${TEMPLATES[d.template_type]?.label || ''}</span>
          </div>
          ${d.title ? `<div class="diary-card-title">${highlightHtml(d.title, q)}</div>` : ''}
          ${excerpt ? `<div class="diary-card-excerpt">${highlightHtml(excerpt, q)}</div>` : ''}
        </a>`;
    }).join('');
  }

  function highlightHtml(text, q) {
    const safe = escapeHtml(text);
    if (!q) return safe;
    const safeQ = escapeHtml(q);
    return safe.replace(new RegExp(safeQ.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'),
      (m) => `<mark style="background:#FFF4B8;padding:0 2px;border-radius:2px;">${m}</mark>`);
  }

  async function runSearch(q) {
    const my = ++searchToken;
    titleEl.textContent = `'${q}' 검색 중…`;
    document.getElementById('timeline-body').innerHTML = `<div class="timeline-empty">검색 중...</div>`;
    try {
      const items = await Promise.race([
        searchDiaries(q, { limit: 40 }),
        new Promise((_, rej) => setTimeout(() => rej(new Error('검색 시간초과 (8초) — 네트워크 또는 DB가 느립니다')), 8000)),
      ]);
      if (my !== searchToken) return;
      titleEl.textContent = `'${q}' 검색 결과 ${items.length}건`;
      renderSearchResults(items, q);
    } catch (err) {
      if (my !== searchToken) return;
      console.warn('[seed] 검색 실패:', err);
      document.getElementById('timeline-body').innerHTML =
        `<div class="timeline-empty">검색 실패: ${err.message || err}<br><span style="font-size:12px;color:var(--ink-muted);">다시 시도하거나 키워드를 짧게 해보세요.</span></div>`;
    }
  }

  function exitSearch() {
    searchToken++;
    titleEl.textContent = '최근 일기';
    timelineCursor = null;
    timelineExhausted = false;
    loadTimeline();
  }

  const searchWrapEl = document.getElementById('diary-search-wrap');
  searchEl.addEventListener('input', () => {
    const v = searchEl.value.trim();
    searchClearEl.classList.toggle('visible', !!v);
    searchWrapEl?.classList.toggle('has-text', !!v);
    clearTimeout(searchTimer);
    if (!v) { exitSearch(); return; }
    searchTimer = setTimeout(() => runSearch(v), 280);
  });
  searchClearEl.addEventListener('click', () => {
    searchEl.value = '';
    searchClearEl.classList.remove('visible');
    searchWrapEl?.classList.remove('has-text');
    exitSearch();
    searchEl.focus();
  });
  searchEl.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { searchEl.value = ''; searchClearEl.classList.remove('visible'); exitSearch(); }
  });

  // 초기 탭이 goal이면 대시보드 로드
  if (initialTab === 'goal') loadGoalDashboard();

  // ── 목표 대시보드 ──
  let goalDashboardLoaded = false;
  async function loadGoalDashboard(force = false) {
    if (goalDashboardLoaded && !force) return;
    goalDashboardLoaded = true;

    const summaryEl = document.getElementById('goal-summary');
    const gridEl    = document.getElementById('area-grid');
    const listEl    = document.getElementById('goal-list-body');

    summaryEl.innerHTML = `<div class="goal-summary-label">전체 진척</div><div class="goal-summary-pct">…</div>`;
    listEl.innerHTML = `<div class="timeline-empty">불러오는 중...</div>`;

    try {
      const withTimeout = (p, ms = 6000, name = '쿼리') => Promise.race([
        p,
        new Promise((_, rej) => setTimeout(() => rej(new Error(`${name} 시간초과 (${ms / 1000}초)`)), ms)),
      ]);
      const [summary, goals] = await Promise.all([
        withTimeout(getDashboardSummary(), 6000, '목표 대시보드'),
        withTimeout(listMyGoals({ status: 'active' }), 6000, '목표 목록'),
      ]);

      // 전체 진척 카드
      summaryEl.innerHTML = `
        <div class="goal-summary-label">전체 진척</div>
        <div class="goal-summary-pct">${summary.overallProgress}%</div>
        <div class="goal-summary-track"><div class="goal-summary-fill" style="width:${summary.overallProgress}%;"></div></div>
        <div class="goal-summary-stats">
          진행 중 <strong>${summary.totalActive}</strong>개
          ${summary.upcomingDeadlines > 0 ? ` · 한 달 내 마감 <strong>${summary.upcomingDeadlines}</strong>개` : ''}
        </div>
      `;

      // 영역별 카드
      gridEl.innerHTML = Object.entries(AREAS).map(([key, a]) => {
        const stat = summary.byArea[key];
        return `
          <a class="area-card" href="./seed.html?tab=goal&area=${key}" data-area="${key}"
             style="border-color:${a.color}33;">
            <div class="area-card-head">
              <span class="area-card-icon">${a.icon}</span>
              <span class="area-card-pct" style="color:${a.color};">${stat.avgProgress}%</span>
            </div>
            <div class="area-card-label">${a.label}</div>
            <div class="area-card-stat">진행 ${stat.active} · 달성 ${stat.completed}</div>
            <div class="area-card-track"><div class="area-card-fill" style="width:${stat.avgProgress}%;background:${a.color};"></div></div>
          </a>
        `;
      }).join('');

      // 영역 필터 (?area=...)
      const areaFilter = params.get('area');
      const filtered = areaFilter ? goals.filter((g) => g.area === areaFilter) : goals;

      if (!filtered.length) {
        listEl.innerHTML = `
          <div class="timeline-empty">
            ${areaFilter ? `${AREAS[areaFilter]?.label} 영역에 ` : ''}아직 목표가 없어요.<br>
            오른쪽 아래 ＋ 버튼으로 첫 목표를 심어보세요.
          </div>`;
        return;
      }

      listEl.innerHTML = filtered.map(goalCardHtml).join('');
    } catch (err) {
      listEl.innerHTML = `<div class="timeline-empty">불러오기 실패: ${err.message || err}</div>`;
    }
  }

  function goalCardHtml(g) {
    const a = AREAS[g.area];
    const daysLeft = g.due_date
      ? Math.ceil((new Date(g.due_date) - new Date()) / (1000 * 60 * 60 * 24))
      : null;
    const dueText = daysLeft != null
      ? (daysLeft < 0 ? `⏰ ${-daysLeft}일 지남` : daysLeft === 0 ? '오늘 마감' : `D-${daysLeft}`)
      : '';
    return `
      <a class="goal-card" href="./plan-detail.html?id=${g.id}">
        <div class="goal-card-head">
          <span class="goal-card-chip" style="background:${a.bg};color:${a.color};">${a.icon} ${a.label}</span>
          <span class="goal-card-priority">⭐ ${PRIORITY_LABELS[g.priority]}</span>
        </div>
        <div class="goal-card-title">${escapeHtml(g.title)}</div>
        <div class="goal-card-track"><div class="goal-card-fill" style="width:${g.progress_pct}%;background:${a.color};"></div></div>
        <div class="goal-card-meta">
          <span>${g.progress_pct}%</span>
          <span>${dueText}</span>
        </div>
      </a>
    `;
  }

  function formatDate(d) {
    const date = new Date(d);
    return date.toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' });
  }
  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }
</script>

</body>
</html>
