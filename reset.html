<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 재설정 · 잇다</title>
  <link rel="stylesheet" href="./auth-styles.css">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
  <meta name="theme-color" content="#1F6E4E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="잇다">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="./index.html" class="logo"><span class="logo-mark">●</span> 잇다</a>
  </div>
</nav>

<main class="auth-container">
  <span class="auth-kicker">NEW PASSWORD</span>
  <h1>새 비밀번호를<br>설정해주세요</h1>
  <p class="auth-lead">
    앞으로 이 비밀번호로 로그인하게 됩니다.
  </p>

  <div id="alert" class="hidden"></div>

  <form id="reset-form" class="auth-form">
    <div class="field">
      <label for="password">새 비밀번호</label>
      <input type="password" id="password" name="password" placeholder="6자 이상" required minlength="6" autocomplete="new-password">
    </div>

    <div class="field">
      <label for="confirm">비밀번호 확인</label>
      <input type="password" id="confirm" name="confirm" placeholder="같은 비밀번호를 다시 입력" required minlength="6" autocomplete="new-password">
    </div>

    <button type="submit" class="auth-submit">비밀번호 변경</button>
  </form>
</main>

<footer class="auth-footer">
  © 2026 라이프헤리티지 · 잇다
</footer>

<script type="module">
  import { updatePassword, friendlyError, supabase } from './auth.js';

  const form = document.getElementById('reset-form');
  const alertBox = document.getElementById('alert');
  const submitBtn = form.querySelector('.auth-submit');

  function showAlert(message, type = 'error') {
    alertBox.className = `alert alert-${type}`;
    alertBox.textContent = message;
    alertBox.classList.remove('hidden');
  }

  function hideAlert() {
    alertBox.classList.add('hidden');
  }

  // Check if the user arrived via valid reset link
  // Supabase automatically handles the token from URL hash
  supabase.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      // User is in password recovery flow
    }
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert();

    const password = form.password.value;
    const confirm = form.confirm.value;

    if (password !== confirm) {
      showAlert('비밀번호가 일치하지 않습니다.', 'error');
      return;
    }

    if (password.length < 6) {
      showAlert('비밀번호는 6자 이상이어야 합니다.', 'error');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = '변경 중...';

    const { error } = await updatePassword(password);

    if (error) {
      showAlert(friendlyError(error), 'error');
      submitBtn.disabled = false;
      submitBtn.textContent = '비밀번호 변경';
      return;
    }

    form.classList.add('hidden');
    showAlert(
      '🌼 비밀번호가 변경되었습니다. 3초 후 로그인 페이지로 이동합니다.',
      'success'
    );

    setTimeout(() => {
      window.location.href = './login.html';
    }, 3000);
  });
</script>

</body>
</html>
