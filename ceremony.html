<html lang="ko">
<head>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="잇다">
  <style>
    body { background: var(--bg); }
    .cer-shell { max-width: 560px; margin: 0 auto; padding: 0 20px 140px; }

    /* 진행 바 */
    .cer-progress-wrap { position: sticky; top: 0; z-index: 5; background: var(--bg); padding: 12px 0 10px; }
    .cer-progress { height: 6px; background: var(--bg-alt); border-radius: 999px; overflow: hidden; }
    .cer-progress-fill { height: 100%; width: 0; background: linear-gradient(90deg, var(--primary), #3E9C72); border-radius: 999px; transition: width 0.3s ease; }
    .cer-step-count { font-size: 12px; font-weight: 700; color: var(--ink-muted); margin-top: 8px; }

    /* 인트로 */
    .cer-intro { padding: 30px 0 8px; text-align: center; }
    .cer-intro-kicker { font-size: 12.5px; font-weight: 800; letter-spacing: 0.06em; color: var(--primary); margin-bottom: 12px; }
    .cer-intro-title { font-family: var(--font-serif); font-size: 25px; font-weight: 800; line-height: 1.5; color: var(--ink); margin-bottom: 14px; letter-spacing: -0.01em; }
    .cer-intro-lead { font-size: 15px; line-height: 1.7; color: var(--ink-soft); margin-bottom: 28px; }
    .cer-start-btn, .cer-primary { display: block; width: 100%; padding: 16px; border: none; border-radius: var(--radius-sm); background: var(--primary); color: #fff; font-size: 16px; font-weight: 800; cursor: pointer; font-family: inherit; transition: background 0.15s; }
    .cer-start-btn:hover, .cer-primary:hover { background: var(--primary-hover); }
    .cer-intro-note { font-size: 12.5px; color: var(--ink-muted); margin-top: 14px; }

    /* 질문 단계 */
    .cer-step { padding: 18px 0 8px; }
    .cer-q-eyebrow { font-size: 12.5px; font-weight: 800; letter-spacing: 0.04em; color: var(--primary); margin-bottom: 10px; }
    .cer-q-title { font-family: var(--font-serif); font-size: 22px; font-weight: 800; line-height: 1.5; color: var(--ink); margin-bottom: 6px; letter-spacing: -0.01em; }
    .cer-q-sub { font-size: 13.5px; color: var(--ink-muted); line-height: 1.6; margin-bottom: 20px; }

    .cer-opts { display: flex; flex-direction: column; gap: 10px; }
    .cer-opt { display: flex; align-items: center; gap: 14px; padding: 16px 16px; border: 1.5px solid var(--line); border-radius: var(--radius-sm); background: #fff; cursor: pointer; font-family: inherit; text-align: left; transition: all 0.12s; width: 100%; }
    .cer-opt:hover { border-color: var(--primary-soft); }
    .cer-opt.active { border-color: var(--primary); border-width: 2px; background: var(--primary-soft); }
    .cer-opt-ic { font-size: 26px; flex-shrink: 0; }
    .cer-opt-body { flex: 1; min-width: 0; }
    .cer-opt-label { font-size: 15.5px; font-weight: 700; color: var(--ink); }
    .cer-opt-desc { font-size: 12.5px; color: var(--ink-muted); margin-top: 2px; line-height: 1.5; }
    .cer-opt-check { width: 22px; height: 22px; border-radius: 999px; border: 2px solid var(--line); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; }
    .cer-opt.active .cer-opt-check { background: var(--primary); border-color: var(--primary); }

    .cer-multi-hint { font-size: 12px; font-weight: 700; color: var(--ink-muted); margin-bottom: 12px; }

    /* 텍스트 단계 */
    .cer-text-input { width: 100%; padding: 16px; border: 1.5px solid var(--line); border-radius: var(--radius-sm); font-size: 16px; font-family: var(--font-serif); line-height: 1.6; background: #fff; min-height: 110px; resize: vertical; }
    .cer-text-input:focus { outline: none; border-color: var(--primary); }

    /* 하단 액션 */
    .cer-actionbar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--line); padding: 12px 20px calc(12px + env(safe-area-inset-bottom, 0px)); display: flex; gap: 10px; max-width: 560px; margin: 0 auto; }
    .cer-back { flex: 0 0 auto; padding: 14px 18px; border-radius: var(--radius-sm); border: 1px solid var(--line); background: var(--bg-alt); color: var(--ink-soft); font-size: 14.5px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .cer-next { flex: 1; padding: 14px; border-radius: var(--radius-sm); border: none; background: var(--primary); color: #fff; font-size: 15.5px; font-weight: 800; cursor: pointer; font-family: inherit; }
    .cer-next:disabled { opacity: 0.4; cursor: not-allowed; }

    /* 결과 */
    .cer-result-head { text-align: center; padding: 26px 0 4px; }
    .cer-result-kicker { font-size: 12.5px; font-weight: 800; letter-spacing: 0.06em; color: var(--primary); margin-bottom: 10px; }
    .cer-result-title { font-family: var(--font-serif); font-size: 26px; font-weight: 800; line-height: 1.45; color: var(--ink); letter-spacing: -0.01em; }

    .cer-plan-card { background: linear-gradient(160deg, #FAFCFB, var(--bg-alt)); border: 1px solid var(--line); border-radius: var(--radius); padding: 22px; margin-top: 22px; }
    .cer-plan-wish { font-family: var(--font-serif); font-size: 18px; font-weight: 700; line-height: 1.6; color: var(--primary); margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px dashed var(--line); }
    .cer-plan-wish small { display: block; font-family: var(--font-sans); font-size: 11.5px; font-weight: 700; letter-spacing: 0.04em; color: var(--ink-muted); margin-bottom: 8px; }
    .cer-plan-row { display: flex; gap: 12px; padding: 9px 0; font-size: 14px; }
    .cer-plan-row .k { flex: 0 0 76px; color: var(--ink-muted); font-weight: 700; font-size: 12.5px; padding-top: 1px; }
    .cer-plan-row .v { flex: 1; color: var(--ink); font-weight: 600; line-height: 1.6; }

    .cer-sec-title { font-size: 16px; font-weight: 800; color: var(--ink); margin: 30px 0 4px; }
    .cer-sec-sub { font-size: 12.5px; color: var(--ink-muted); margin-bottom: 14px; line-height: 1.6; }

    .cer-recos { display: flex; flex-direction: column; gap: 12px; position: relative; }
    .cer-reco { display: flex; gap: 14px; padding: 16px; border: 1px solid var(--line); border-radius: var(--radius-sm); background: #fff; align-items: center; }
    .cer-reco-ic { width: 48px; height: 48px; border-radius: 12px; background: var(--primary-soft); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
    .cer-reco-body { flex: 1; min-width: 0; }
    .cer-reco-name { font-size: 14.5px; font-weight: 800; color: var(--ink); }
    .cer-reco-desc { font-size: 12.5px; color: var(--ink-muted); margin-top: 2px; line-height: 1.5; }
    .cer-reco-meta { font-size: 12px; color: var(--primary); font-weight: 700; margin-top: 5px; }
    .cer-reco-btn { flex-shrink: 0; padding: 9px 14px; border-radius: 999px; border: 1px solid var(--primary); background: #fff; color: var(--primary); font-size: 12.5px; font-weight: 800; cursor: pointer; font-family: inherit; white-space: nowrap; }
    .cer-reco-btn:hover { background: var(--primary-soft); }
    .cer-reco-btn.done { background: var(--success-soft); color: var(--success); border-color: var(--success); }

    /* 가입 게이트 오버레이 */
    .cer-locked { position: relative; }
    .cer-locked .cer-recos { filter: blur(5px); pointer-events: none; user-select: none; }
    .cer-gate { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    .cer-gate-card { background: #fff; border: 1px solid var(--line); border-radius: var(--radius); box-shadow: 0 12px 40px rgba(33,38,30,0.12); padding: 22px 20px; max-width: 380px; }
    .cer-gate-ic { font-size: 30px; margin-bottom: 8px; }
    .cer-gate-title { font-family: var(--font-serif); font-size: 18px; font-weight: 800; color: var(--ink); line-height: 1.5; margin-bottom: 6px; }
    .cer-gate-desc { font-size: 13px; color: var(--ink-soft); line-height: 1.6; margin-bottom: 16px; }
    .cer-gate-login { font-size: 12.5px; color: var(--ink-muted); margin-top: 12px; }
    .cer-gate-login a { color: var(--primary); font-weight: 700; }

    .cer-notice { background: var(--primary-soft); border-radius: var(--radius-sm); padding: 15px 16px; margin: 22px 0 6px; font-size: 13px; line-height: 1.7; color: var(--ink-soft); text-align: center; }
    .cer-notice b { color: var(--primary); }
    .cer-footnote { font-size: 11.5px; color: var(--ink-faint); line-height: 1.6; margin-top: 22px; text-align: center; }
    .cer-restart { display: block; margin: 18px auto 0; background: none; border: none; color: var(--ink-muted); font-size: 13px; font-weight: 700; text-decoration: underline; cursor: pointer; font-family: inherit; }

    /* 토스트 */
    .cer-toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink); color: #fff; padding: 13px 20px; border-radius: 999px; font-size: 13.5px; font-weight: 700; opacity: 0; transition: all 0.25s; z-index: 20; pointer-events: none; max-width: 90%; text-align: center; }
    .cer-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .hidden { display: none !important; }
    .itda-bottom-nav { display: none !important; }
    body.has-bottom-nav { padding-bottom: 0; }
  </style>
</head>
<body>

<main class="cer-shell">
  <!-- 진행 바 -->
  <div class="cer-progress-wrap hidden" id="progress-wrap">
    <div class="cer-progress"><div class="cer-progress-fill" id="progress-fill"></div></div>
    <div class="cer-step-count" id="step-count"></div>

  <!-- 인트로 -->
  <section id="intro" class="cer-intro">
    <div class="cer-intro-kicker">살아서 하는 장례식</div>
    <h1 class="cer-intro-title">내가 떠난 자리에서<br>들릴 말을, 살아서 듣는다면</h1>
    <p class="cer-intro-lead">
      누구를 부르고, 무엇을 나누고, 무슨 말을 듣고 싶으세요?<br>
      1분이면 나만의 자리가 그려집니다. 거창하지 않아도 돼요.

  </section>

  <!-- 질문 단계 (JS 렌더) -->
  <section id="step" class="cer-step hidden"></section>

  <!-- 결과 (JS 렌더) -->
  <section id="result" class="hidden"></section>
</main>

<!-- 하단 액션바 -->
<div class="cer-actionbar hidden" id="actionbar">

  <button class="cer-next" id="next-btn" disabled>다음</button>
</div>

<div class="cer-toast" id="toast"></div>

  // 측정 실패는 앱 동작을 절대 방해하지 않는다. props엔 PII 금지.
  const FUNNEL_SID_KEY = 'itda:funnel_sid';
  function funnelSid() {
    try {
      let sid = sessionStorage.getItem(FUNNEL_SID_KEY);
      if (!sid) { sid = (crypto?.randomUUID?.() || (Date.now() + '-' + Math.random().toString(16).slice(2))); sessionStorage.setItem(FUNNEL_SID_KEY, sid); }
      return sid;
    } catch (_) { return 'anon'; }
  }

    try { await supabase.from('funnel_events').insert({ session_id: funnelSid(), event, props: { loggedIn, ...props } }); } catch (_) {}

      key: 'wish', type: 'text',
      eyebrow: '9. 가장 듣고 싶은 말',
      title: '그날, 가장 듣고 싶은<br>한마디는 무엇인가요?',
      sub: '이 한 줄이 당신의 자리를 완성합니다. (건너뛰어도 돼요)',
      placeholder: '예: "당신 덕분에 참 행복했어요." / "고마웠어. 잘 살았다."',
    },
  ];

  // 라벨 매핑 (결과 요약용)
  const LABELS = {};
  STEPS.forEach(s => { if (s.options) s.options.forEach(o => { LABELS[s.key + ':' + o.v] = o.label; }); });

  // ───────────────────────── 추천 데이터 (예시 — 실제 제휴 준비 중) ─────────────────────────
  const VENUES = {
    home:       [{ ic: '🛋', name: '출장 세팅 서비스', desc: '우리 집을 그날의 공간으로 — 꽃·테이블·음향 세팅', meta: '예시 · 15만원~' }],
    restaurant: [{ ic: '🍽', name: '소담 한정식 (단체석)', desc: '20명까지 프라이빗 룸, 차분한 분위기', meta: '예시 · 1인 4만원~' },
                 { ic: '🥘', name: '모임공간 ㅁㅁ', desc: '대관 가능한 작은 연회장, 음향·빔 구비', meta: '예시 · 대관 20만원~' }],
    hanok:      [{ ic: '🏯', name: '북촌 한옥 다이닝', desc: '고즈넉한 마당, 품위 있는 자리', meta: '예시 · 대관 40만원~' }],
    cafe:       [{ ic: '☕', name: '라운지형 카페 (단독)', desc: '조용한 단독 공간, 다과 세팅 가능', meta: '예시 · 대관 15만원~' }],
    nature:     [{ ic: '🌳', name: '정원이 있는 공간', desc: '야외 가든·루프탑, 탁 트인 자리', meta: '예시 · 대관 30만원~' }],
  };
  const FOODS = {
    homemade: { ic: '🍚', name: '한정식 출장상', desc: '집·공간으로 차려지는 정갈한 한 상', meta: '예시 · 1인 3만원~' },
    catering: { ic: '🥗', name: '케이터링 ㅇㅇ', desc: '핑거푸드·코스 출장, 인원 맞춤', meta: '예시 · 1인 2.5만원~' },
    course:   { ic: '🍷', name: '코스 다이닝 제휴', desc: '특별한 날의 풀코스', meta: '예시 · 1인 6만원~' },
    tea:      { ic: '🍰', name: '디저트 & 티 케이터링', desc: '차와 디저트 중심 세팅', meta: '예시 · 1인 1.8만원~' },
  };

  // ───────────────────────── 상태 ─────────────────────────
  let plan = loadPlan() || {};
  let idx = 0;

  const $ = (id) => document.getElementById(id);
  const introEl = $('intro'), stepEl = $('step'), resultEl = $('result');
  const actionbar = $('actionbar'), backBtn = $('back-btn'), nextBtn = $('next-btn');
  const progressWrap = $('progress-wrap'), progressFill = $('progress-fill'), stepCount = $('step-count');

  function savePlan() { try { localStorage.setItem(PLAN_KEY, JSON.stringify(plan)); } catch (_) {} }
  function loadPlan() { try { return JSON.parse(localStorage.getItem(PLAN_KEY) || 'null'); } catch (_) { return null; } }

  function toast(msg) {
    const t = $('toast'); t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // 완성된 플랜이 있고 로그인 상태면 바로 결과로
  const planComplete = plan && plan.who && plan.venue && plan.food;
  if (planComplete && loggedIn) {
    showResult();
  } else if (planComplete) {
    // 비로그인인데 플랜 있음 → 인트로 대신 "이어보기" 살짝 안내
    introEl.querySelector('.cer-start-btn').textContent = '내 자리 이어보기';
  }

  // ───────────────────────── 인트로 → 시작 ─────────────────────────
  $('start-btn').addEventListener('click', () => {
    introEl.classList.add('hidden');
    logFunnel('cer_start');
    // 첫 미응답 단계로 점프 (이어보기 지원)
    idx = STEPS.findIndex(s => !isAnswered(s.key));
    if (idx < 0) idx = 0;
    renderStep();
  });

  function isAnswered(key) {
    // 'song' / 'wish'는 선택사항이라 위저드 진행 흐름에선 항상 '답한 것'으로 취급
    if (key === 'song' || key === 'wish') return true;
    const v = plan[key];
    if (Array.isArray(v)) return v.length > 0;
    return v !== undefined && v !== null && v !== '';
  }

  // ───────────────────────── 단계 렌더 ─────────────────────────
  function renderStep() {
    resultEl.classList.add('hidden');
    stepEl.classList.remove('hidden');
    actionbar.classList.remove('hidden');
    progressWrap.classList.remove('hidden');

    const s = STEPS[idx];
    if (!_funnelStepsLogged.has(idx)) { _funnelStepsLogged.add(idx); logFunnel('cer_step', { step: idx + 1, key: s.key }); }
    progressFill.style.width = `${((idx) / STEPS.length) * 100}%`;
    stepCount.textContent = `${idx + 1} / ${STEPS.length}`;

    let inner = `
      <div class="cer-q-eyebrow">${s.eyebrow}</div>
      <div class="cer-q-title">${s.title}</div>
      <div class="cer-q-sub">${s.sub}</div>`;

    if (s.type === 'text') {
      inner += `<textarea class="cer-text-input" id="text-field" placeholder="${s.placeholder}">${plan[s.key] || ''}</textarea>`;
    } else if (s.type === 'song') {
      inner += `<div id="song-mount" class="cer-song-mount" style="margin-top:12px;"><div style="text-align:center;color:var(--ink-muted);font-size:12.5px;padding:14px;">불러오는 중…</div></div>`;
    } else {
      if (s.type === 'multi') inner += `<div class="cer-multi-hint">여러 개 선택 가능</div>`;
      inner += `<div class="cer-opts">` + s.options.map(o => {
        const sel = s.type === 'multi'
          ? (plan[s.key] || []).includes(o.v)
          : plan[s.key] === o.v;
        return `
          <button type="button" class="cer-opt ${sel ? 'active' : ''}" data-v="${o.v}">
            <span class="cer-opt-ic">${o.ic}</span>
            <span class="cer-opt-body">
              <span class="cer-opt-label">${o.label}</span>
              ${o.desc ? `<span class="cer-opt-desc">${o.desc}</span>` : ''}
            </span>
            <span class="cer-opt-check">${sel ? '✓' : ''}</span>
          </button>`;
      }).join('') + `</div>`;
    }

    stepEl.innerHTML = inner;
    window.scrollTo(0, 0);

    // 이벤트 바인딩
    if (s.type === 'text') {
      $('text-field').addEventListener('input', (e) => { plan[s.key] = e.target.value.trim(); savePlan(); });
    } else if (s.type === 'song') {
      mountSongQuestion($('song-mount'));
    } else {
      stepEl.querySelectorAll('.cer-opt').forEach(btn => {
        btn.addEventListener('click', () => {
          const v = btn.dataset.v;
          if (s.type === 'multi') {
            const arr = plan[s.key] || [];
            plan[s.key] = arr.includes(v) ? arr.filter(x => x !== v) : [...arr, v];
          } else {
            plan[s.key] = v;
          }
          savePlan();
          renderStep(); // 선택 상태 갱신
        });
      });
    }

    backBtn.textContent = idx === 0 ? '처음으로' : '이전';
    nextBtn.textContent = idx === STEPS.length - 1 ? '내 자리 완성하기' : '다음';
    // text·song은 선택사항 — 항상 진행 가능
    nextBtn.disabled = s.type !== 'text' && s.type !== 'song' && !isAnswered(s.key);
  }

  // ───────── song 질문 마운트 (플레이리스트) ─────────
  const SERVICE_LABEL = { spotify: 'Spotify', apple: 'Apple Music', youtube: 'YouTube' };
  async function mountSongQuestion(root) {
    if (!root) return;
    root.innerHTML = `
      <style>
        .cer-pl-block { background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:14px; }
        .cer-pl-head { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:8px; }
        .cer-pl-label { font-size:11px; font-weight:800; color:var(--primary); letter-spacing:0.06em; }
        .cer-pl-count { font-size:11px; color:var(--ink-muted); font-weight:700; }
        .cer-pl-list { display:flex; flex-direction:column; gap:6px; }
        .cer-pl-empty { font-size:12.5px; color:var(--ink-muted); text-align:center; padding:14px 8px; line-height:1.6; }
        .cer-pl-row { display:flex; align-items:center; gap:9px; padding:7px; background:var(--bg-alt); border-radius:8px; }
        .cer-pl-img { width:38px; height:38px; border-radius:5px; object-fit:cover; background:var(--line); flex-shrink:0; }
        .cer-pl-meta { min-width:0; flex:1; }
        .cer-pl-name { font-size:13px; font-weight:700; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .cer-pl-sub { font-size:11px; color:var(--ink-muted); margin-top:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .cer-pl-sub b { color:var(--primary); font-weight:800; }
        .cer-pl-btn { width:28px; height:28px; border-radius:6px; border:1px solid var(--line); background:#fff; display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--ink-soft); cursor:pointer; text-decoration:none; font-family:inherit; flex-shrink:0; }
        .cer-pl-btn:hover { border-color:var(--primary); color:var(--primary); }
        .cer-pl-btn.danger:hover { border-color:var(--danger); color:var(--danger); }
        .cer-pl-actions { display:flex; gap:3px; flex-shrink:0; }
        .cer-paste-input { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:10px; font-size:14px; font-family:inherit; background:#fff; color:var(--ink); box-sizing:border-box; }
        .cer-paste-input:focus { outline:none; border-color:var(--primary); }
        .cer-paste-hint { font-size:12px; color:var(--ink-muted); margin-top:8px; line-height:1.55; }
        .cer-paste-hint b { color:var(--ink-soft); }
        .cer-prev { margin-top:10px; background:#fff; border:1.5px solid var(--primary); border-radius:10px; padding:10px; }
        .cer-prev-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
        .cer-prev-name { font-size:13px; font-weight:800; color:var(--ink); overflow:hidden; text-overflow:ellipsis; }
        .cer-prev-svc { font-size:11px; color:var(--ink-muted); margin-top:1px; }
        .cer-add-btn { width:100%; padding:10px; border-radius:8px; border:0; background:var(--primary); color:#fff; font-size:13px; font-weight:800; font-family:inherit; cursor:pointer; }
        .cer-add-btn:disabled { opacity:0.6; cursor:wait; }
        .cer-err { padding:9px 11px; border-radius:8px; background:var(--danger-soft); color:var(--danger); font-size:12px; margin-top:10px; }
      </style>
      <div class="cer-pl-block">
        <div class="cer-pl-head">
          <span class="cer-pl-label">✦ 내 플레이리스트</span>
          <span class="cer-pl-count" id="cer-pl-count"></span>
        </div>
        <div id="cer-pl-list"><div class="cer-pl-empty">불러오는 중…</div></div>
      </div>
      <input type="url" class="cer-paste-input" id="cer-paste-input" placeholder="Spotify · Apple Music · YouTube 링크 paste" autocomplete="off" autocapitalize="off" spellcheck="false">
      <div class="cer-paste-hint">
        곡을 듣는 앱에서 <b>공유 → 링크 복사</b> → 여기 paste. 한 곡씩 더할 수 있어요.
      </div>
      <div id="cer-prev-mount"></div>
    `;

    const listMount = root.querySelector('#cer-pl-list');
    const countMount = root.querySelector('#cer-pl-count');
    const pasteInput = root.querySelector('#cer-paste-input');
    const prevMount = root.querySelector('#cer-prev-mount');

    async function renderList(isBackfillRetry) {
      try {
        const songs = await listMyPlaylist();
        countMount.textContent = songs.length ? `${songs.length}곡` : '';
        if (!isBackfillRetry && songs.some(s => !s.name && s.external_url)) {
          const changed = await backfillMissingMetadata(songs);
          if (changed) { return renderList(true); }
        }
        if (!songs.length) {
          listMount.innerHTML = `<div class="cer-pl-empty">아직 곡이 없어요.<br>아래에 좋아하는 곡 링크를 paste해 첫 곡을 더해 보세요.</div>`;
          return;
        }
        listMount.innerHTML = songs.map((s) => {
          const svc = detectService(s.external_url || '') || 'spotify';
          const sub = `${escapeHtml(s.artists || '')}${s.artists ? ' · ' : ''}<b>${escapeHtml(SERVICE_LABEL[svc] || svc)}</b>`;
          return `
            <div class="cer-pl-row">
              ${s.image_url ? `<img class="cer-pl-img" src="${escapeHtml(s.image_url)}" alt="">` : '<div class="cer-pl-img"></div>'}
              <div class="cer-pl-meta">
                <div class="cer-pl-name">${escapeHtml(s.name || '곡')}</div>
                <div class="cer-pl-sub">${sub}</div>
              </div>
              <div class="cer-pl-actions">
                ${s.external_url ? `<a class="cer-pl-btn" href="${escapeHtml(s.external_url)}" target="_blank" rel="noopener" aria-label="듣기">▶</a>` : ''}
                <button type="button" class="cer-pl-btn danger" data-del="${s.id}" aria-label="삭제">✕</button>
              </div>
            </div>`;
        }).join('');
        listMount.querySelectorAll('button[data-del]').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (!confirm('이 곡을 플레이리스트에서 지울까요?')) return;
            try { await removeFromPlaylist(btn.dataset.del); await renderList(); }
            catch (e) { alert('삭제 실패: ' + (e.message || e)); }
          });
        });
      } catch (e) {
        listMount.innerHTML = `<div class="cer-err">불러오기 실패: ${escapeHtml(e.message || String(e))}</div>`;
      }
    }

    let lastUrl = '';
    async function processPaste() {
      const url = pasteInput.value.trim();
      if (url === lastUrl) return;
      lastUrl = url;
      if (!url) { prevMount.innerHTML = ''; return; }
      const svc = detectService(url);
      if (!svc) {
        prevMount.innerHTML = `<div class="cer-err">지원하는 음악 서비스 링크를 붙여넣어 주세요 — Spotify · Apple Music · YouTube</div>`;
        return;
      }
      prevMount.innerHTML = `<div class="cer-pl-empty">불러오는 중…</div>`;
      const meta = await fetchSongMetadata(url);
      const trackId = extractTrackId(url);
      if (url !== lastUrl) return;
      prevMount.innerHTML = `
        <div class="cer-prev">
          <div class="cer-prev-row">
            ${meta?.image ? `<img class="cer-pl-img" src="${escapeHtml(meta.image)}" alt="">` : '<div class="cer-pl-img"></div>'}
            <div style="min-width:0;flex:1;">
              <div class="cer-prev-name">${escapeHtml(meta?.name || '곡')}</div>
              <div class="cer-prev-svc">${SERVICE_LABEL[svc] || svc}</div>
            </div>
          </div>
          <button type="button" class="cer-add-btn" id="cer-add-btn">플레이리스트에 추가</button>
        </div>`;
      prevMount.querySelector('#cer-add-btn')?.addEventListener('click', async () => {
        const btn = prevMount.querySelector('#cer-add-btn');
        btn.disabled = true; btn.textContent = '추가 중…';
        try {
          await addToPlaylist({ id: trackId || '', name: meta?.name || '', artists: meta?.artists || '', image: meta?.image || '', external_url: url });
          pasteInput.value = ''; lastUrl = '';
          prevMount.innerHTML = '';
          await renderList();
        } catch (e) {
          alert('추가 실패: ' + (e.message || e));
          btn.disabled = false; btn.textContent = '플레이리스트에 추가';
        }
      });
    }
    let pasteTimer = null;
    pasteInput.addEventListener('input', () => { clearTimeout(pasteTimer); pasteTimer = setTimeout(processPaste, 200); });
    pasteInput.addEventListener('paste', () => setTimeout(processPaste, 0));

    renderList();
  }

  backBtn.addEventListener('click', () => {
    if (idx === 0) { stepEl.classList.add('hidden'); actionbar.classList.add('hidden'); progressWrap.classList.add('hidden'); introEl.classList.remove('hidden'); window.scrollTo(0,0); return; }
    idx--; renderStep();
  });

  nextBtn.addEventListener('click', () => {
    if (idx === STEPS.length - 1) { savePlan(); showResult(); return; }
    idx++; renderStep();
  });

  // ───────────────────────── 결과 ─────────────────────────
  async function showResult() {
    if (!_funnelCompleteLogged) { _funnelCompleteLogged = true; logFunnel('cer_complete'); }
    introEl.classList.add('hidden');
    stepEl.classList.add('hidden');
    actionbar.classList.add('hidden');
    progressWrap.classList.add('hidden');
    resultEl.classList.remove('hidden');
    progressFill.style.width = '100%';

    const whoWord = { self: '나의', parent: '부모님을 위한', spouse: '사랑하는 사람을 위한' }[plan.who] || '나의';
    const titleName = (plan.who === 'self' && userName) ? `${userName}님의` : whoWord;

    const guestLabels = (plan.guests || []).map(v => LABELS['guests:' + v]).filter(Boolean);
    const programLabels = (plan.program || []).map(v => LABELS['program:' + v]).filter(Boolean);
    const scaleLabel = LABELS['scale:' + plan.scale] || '';
    const occasionLabel = LABELS['occasion:' + plan.occasion] || '';
    const venueLabel = LABELS['venue:' + plan.venue] || '';
    const foodLabel = LABELS['food:' + plan.food] || '';

    const wish = plan.wish && plan.wish.length
      ? plan.wish
      : '말로 다 못 해도, 그 마음이 전해지는 자리.';

    const recos = VENUES[plan.venue] || [];
    const food = FOODS[plan.food];

    // 골라둔 플레이리스트 (있으면)
    let playlist = [];
    try { playlist = await listMyPlaylist(); } catch (_) { /* noop */ }
    const songLabel = playlist.length
      ? `♬ ${escapeHtml(playlist[0].name || '내 플레이리스트')}` + (playlist.length > 1 ? ` 외 ${playlist.length - 1}곡` : '')
      : '';

    resultEl.innerHTML = `
      <div class="cer-result-head">
        <div class="cer-result-kicker">당신의 자리가 완성됐어요</div>
        <h1 class="cer-result-title">${titleName}<br>살아서 하는 장례식</h1>
      </div>

      <div class="cer-plan-card">
        <div class="cer-plan-wish"><small>그날 가장 듣고 싶은 말</small>"${escapeHtml(wish)}"</div>
        ${row('계기', occasionLabel)}
        ${row('초대', guestLabels.join(' · '))}
        ${row('규모', scaleLabel)}
        ${row('나눌 것', programLabels.join(' · '))}
        ${row('장소', venueLabel)}
        ${row('음식', foodLabel)}
        ${songLabel ? row('플레이리스트', songLabel) : ''}
      </div>

      <div class="cer-notice">
        표시된 장소·음식은 아직 <b>예시</b>예요. 실제 제휴처를 연결하는 서비스를 준비하고 있어요.<br>차후 더 보완해 나갈 예정이에요.
      </div>

      <div class="cer-sec-title">이런 곳은 어떠세요?</div>
      <div class="cer-sec-sub">${venueLabel} 분위기에 어울리는 장소·음식을 골라봤어요.</div>

      <div class="${loggedIn ? '' : 'cer-locked'}">
        <div class="cer-recos">
          ${recos.map((r, i) => recoCard(r, 'venue', i)).join('')}
          ${food ? recoCard(food, 'food', 0) : ''}
        </div>
        ${loggedIn ? '' : `
          <div class="cer-gate">
            <div class="cer-gate-card">
              <div class="cer-gate-ic">🌿</div>
              <div class="cer-gate-title">이 플랜을 저장하고<br>맞춤 장소·음식을 받아보세요</div>
              <div class="cer-gate-desc">가입하면 설계한 자리가 저장되고, 어울리는 장소·음식을 이어드려요. 무료예요.</div>
              <button class="cer-primary" id="gate-signup">가입하고 추천 받기</button>
              <div class="cer-gate-login">이미 계정이 있으세요? <a href="./login.html">로그인</a></div>
            </div>
          </div>`}
      </div>

      <button class="cer-restart" id="restart">처음부터 다시 그려보기</button>
    `;

    window.scrollTo(0, 0);

    if (!loggedIn) {
      $('gate-signup').addEventListener('click', () => {
        logFunnel('cer_signup_click');
        savePlan();
        window.location.href = './signup.html?mode=ceremony';
      });
    } else {
      resultEl.querySelectorAll('.cer-reco-btn').forEach(btn => {
        btn.addEventListener('click', () => submitLead(btn));
      });
    }
    $('restart').addEventListener('click', () => {
      if (!confirm('설계한 내용을 지우고 처음부터 다시 할까요?')) return;
      plan = {}; idx = 0; savePlan();
      resultEl.classList.add('hidden'); introEl.classList.remove('hidden'); window.scrollTo(0,0);
    });
  }

  function row(k, v) {
    if (!v) return '';
    return `<div class="cer-plan-row"><div class="k">${k}</div><div class="v">${v}</div></div>`;
  }

  function recoCard(r, kind, i) {
    return `
      <div class="cer-reco">
        <div class="cer-reco-ic">${r.ic}</div>
        <div class="cer-reco-body">
          <div class="cer-reco-name">${r.name}</div>
          <div class="cer-reco-desc">${r.desc}</div>
          <div class="cer-reco-meta">${r.meta}</div>
        </div>
        <button class="cer-reco-btn" data-kind="${kind}" data-name="${escapeHtml(r.name)}">연결 요청</button>
      </div>`;
  }

  function submitLead(btn) {
    if (btn.classList.contains('done')) return;
    logFunnel('cer_reco_click', { kind: btn.dataset.kind });
    const lead = {
      kind: btn.dataset.kind,
      partner: btn.dataset.name,
      plan: plan,
      user: session?.user?.id || null,
      ts: Date.now(),
    };
    try {
      const list = JSON.parse(localStorage.getItem(LEADS_KEY) || '[]');
      list.push(lead);
      localStorage.setItem(LEADS_KEY, JSON.stringify(list));
    } catch (_) {}
    btn.classList.add('done'); btn.textContent = '요청 완료 ✓';
    toast('신청이 접수됐어요. 어울리는 곳을 찾아 연락드릴게요. 🌿');
    // TODO(server): Supabase ceremony_leads 테이블로 전송 (창업자 승인 후)
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }
</script>

</body>
</html>
