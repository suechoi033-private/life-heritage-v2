<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>잇다 — 삶 성찰 및 미래 준비</title>
  <meta name="description" content="라이프 · 케어링 · 커뮤니티 — 삶의 전주기를 한 곳에서.">
  <meta property="og:title" content="잇다 — 삶 성찰 및 미래 준비">
  <meta property="og:description" content="라이프 · 케어링 · 커뮤니티, 삶의 전주기를 한 곳에서.">
  <link rel="stylesheet" href="./auth-styles.css">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
  <meta name="theme-color" content="#2F6B4F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="잇다">
  <style>
    body { background: var(--bg); }

    .greeting-block { padding: 26px 0 10px; }
    .greeting-label {
      font-size: 12.5px; font-weight: 700;
      color: var(--primary); letter-spacing: 0.04em;
      margin-bottom: 8px;
    }
    .greeting-text {
      font-family: var(--font-serif);
      font-size: 21px; font-weight: 800;
      line-height: 1.55; letter-spacing: -0.01em;
      color: var(--ink);
    }

    .home-cards {
      display: flex; flex-direction: column;
      gap: 12px; margin-top: 22px;
    }

    /* 씨앗 카드 (오늘 일기) */
    .card-seed {
      background: linear-gradient(135deg, var(--primary), #3E9C72);
      border-radius: var(--radius);
      padding: 20px 22px;
      color: #fff; cursor: pointer; text-decoration: none; display: block;
      transition: opacity 0.15s;
    }
    .card-seed:hover { opacity: 0.93; color: #fff; }
    .card-eyebrow {
      font-size: 11.5px; font-weight: 700;
      letter-spacing: 0.06em; opacity: 0.85; margin-bottom: 6px;
    }
    .card-seed-title {
      font-family: var(--font-serif);
      font-size: 17px; font-weight: 700;
      line-height: 1.55; margin-bottom: 14px;
    }
    .card-cta {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13.5px; font-weight: 700;
      background: rgba(255,255,255,0.2);
      border-radius: 999px; padding: 7px 14px;
    }

    /* 둥지 카드 */
    .card-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .card-mini {
      background: var(--bg-alt);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px 16px;
      text-decoration: none; color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .card-mini:hover { border-color: var(--primary-soft); box-shadow: 0 4px 16px rgba(47,107,79,0.06); }
    .card-mini-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--primary-soft);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; margin-bottom: 10px;
    }
    .card-mini-icon.nest { background: var(--warm-soft); }
    .card-mini-title {
      font-size: 14.5px; font-weight: 800;
      letter-spacing: -0.01em; margin-bottom: 3px;
    }
    .card-mini-desc {
      font-size: 12px; color: var(--ink-muted); line-height: 1.5;
    }

    /* 숲 카드 (가로형) */
    .card-forest {
      background: var(--bg-alt);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex; align-items: center; gap: 14px;
      text-decoration: none; color: inherit;
      transition: border-color 0.15s;
    }
    .card-forest:hover { border-color: var(--primary-soft); }
    .card-forest-icon {
      width: 42px; height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, #E7F1EC, #D2E8DC);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .card-forest-body { flex: 1; min-width: 0; }
    .card-forest-title { font-size: 14.5px; font-weight: 800; margin-bottom: 3px; }
    .card-forest-desc { font-size: 12.5px; color: var(--ink-muted); }
    .card-arrow { color: var(--ink-faint); font-size: 18px; flex-shrink: 0; }

    /* 온보딩 (비로그인) */
    .card-onboard {
      background: var(--bg-alt);
      border-radius: var(--radius);
      padding: 24px 22px;
      border: 1px solid var(--line);
    }
    .card-onboard-title {
      font-family: var(--font-serif);
      font-size: 19px; font-weight: 800;
      letter-spacing: -0.02em; margin-bottom: 8px; line-height: 1.4;
    }
    .card-onboard-desc {
      font-size: 13.5px; color: var(--ink-soft);
      line-height: 1.7; margin-bottom: 18px;
    }
    .onboard-options { display: flex; flex-direction: column; gap: 10px; }
    .onboard-opt {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      background: var(--bg);
      border: 1.5px solid var(--line);
      border-radius: var(--radius-sm);
      cursor: pointer; text-decoration: none; color: inherit;
      font-size: 14px; font-weight: 700;
      transition: border-color 0.15s, background 0.15s;
    }
    .onboard-opt:hover { border-color: var(--primary); background: var(--primary-soft); }
    .onboard-opt-icon { font-size: 22px; width: 36px; text-align: center; flex-shrink: 0; }
    .onboard-opt-text { line-height: 1.4; }
    .onboard-opt-sub {
      font-size: 11.5px; font-weight: 500;
      color: var(--ink-muted); margin-top: 2px; display: block;
    }
    .onboard-note {
      margin-top: 14px;
      font-size: 12.5px; color: var(--ink-muted);
      text-align: center;
    }

    .section-label {
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.06em; color: var(--ink-muted);
      text-transform: uppercase;
      margin: 28px 0 12px;
    }

    .skeleton {
      background: linear-gradient(90deg, var(--bg-alt) 25%, var(--line) 50%, var(--bg-alt) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius-sm);
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
  </style>
</head>
<body>

<main class="page-shell" id="main-content">
  <div class="greeting-block">
    <div class="greeting-label" id="greeting-label">잇다</div>
    <div class="greeting-text" id="greeting-text">잠시만요…</div>
  </div>
  <div class="home-cards" id="home-cards">
    <div class="skeleton" style="height:120px;"></div>
    <div class="skeleton" style="height:80px;margin-top:14px;"></div>
  </div>
</main>

<script type="module">
import { supabase } from './auth.js';
import { renderNav } from './nav.js';
import { registerPWA } from './js/pwa.js';

await renderNav({ active: 'home', infoIcon: true });
registerPWA();

const { data: { session } } = await supabase.auth.getSession();
const user = session?.user ?? null;

// ── 인사말 ──
const greetingLabel = document.getElementById('greeting-label');
const greetingText  = document.getElementById('greeting-text');
const hour = new Date().getHours();
const timeLabel = hour < 12 ? '좋은 아침이에요'
              : hour < 18 ? '안녕하세요'
              : '오늘 하루 수고하셨어요';

if (user) {
  const name = user.user_metadata?.name || user.email?.split('@')[0] || '';
  greetingLabel.textContent = timeLabel;
  greetingText.innerHTML = name
    ? `${escapeHtml(name)}님,<br>오늘도 한 발씩.`
    : `이따가 하지 말고,<br>오늘 한 발씩.`;
} else {
  greetingLabel.textContent = '잇다';
  greetingText.innerHTML = `라이프 · 케어링 · 커뮤니티,<br>한 곳에서.`;
}

// ── 오늘의 질문(있으면) ──
let todayQ = null;
try {
  const { data } = await supabase.rpc('get_todays_question');
  if (data && data.length > 0) todayQ = data[0];
} catch (_) {}

// ── 카드 렌더 ──
const cardsEl = document.getElementById('home-cards');

if (user) {
  // 진행 중 목표·일기 카운트
  const [diaryStats, goalStats, careStats] = await Promise.all([
    supabase.from('diary_entries').select('id', { count: 'exact', head: true }).eq('user_id', user.id),
    supabase.from('goals').select('id', { count: 'exact', head: true }).eq('user_id', user.id).eq('status', 'active'),
    supabase.from('care_members').select('subject_id', { count: 'exact', head: true }).eq('user_id', user.id),
  ]);
  const diaryCount = diaryStats?.count ?? 0;
  const goalCount  = goalStats?.count ?? 0;
  const careCount  = careStats?.count ?? 0;

  cardsEl.innerHTML = `
    <a href="./ask.html" class="card-seed">
      <div class="card-eyebrow">🕯 오늘의 질문</div>
      <div class="card-seed-title">${todayQ?.question_text || '오늘 하루, 어떻게 보내셨나요?'}</div>
      <div class="card-cta">답변 남기기 <span>→</span></div>
    </a>

    <div class="card-row">
      <a href="./seed.html?tab=goal" class="card-mini">
        <div class="card-mini-icon">🎯</div>
        <div class="card-mini-title">목표 · 계획</div>
        <div class="card-mini-desc">진행 중 ${goalCount}개</div>
      </a>
      <a href="./nest.html" class="card-mini">
        <div class="card-mini-icon nest">🪺</div>
        <div class="card-mini-title">케어링</div>
        <div class="card-mini-desc">케어링 대상 ${careCount}분</div>
      </a>
    </div>

    <a href="./forest.html" class="card-forest">
      <div class="card-forest-icon">🌳</div>
      <div class="card-forest-body">
        <div class="card-forest-title">커뮤니티</div>
        <div class="card-forest-desc">콘텐츠 · 게시판 · 추모</div>
      </div>
      <span class="card-arrow">›</span>
    </a>

    <a href="./root.html" class="card-forest">
      <div class="card-forest-icon" style="background:linear-gradient(135deg,#F5EFE3,#FAF6EC);">🌿</div>
      <div class="card-forest-body">
        <div class="card-forest-title">마이</div>
        <div class="card-forest-desc">기록 ${diaryCount}개 · 친구 초대 · 알림 설정</div>
      </div>
      <span class="card-arrow">›</span>
    </a>
  `;
} else {
  // 비로그인 온보딩
  cardsEl.innerHTML = `
    <div class="card-onboard">
      <div class="card-onboard-title">라이프 · 케어링 · 커뮤니티<br>한 곳에서</div>
      <div class="card-onboard-desc">잇다는 삶을 성찰하고 미래를 준비하는 통합 플랫폼입니다.</div>
      <div class="onboard-options">
        <a href="./signup.html?mode=seed" class="onboard-opt">
          <div class="onboard-opt-icon">🌱</div>
          <div class="onboard-opt-text">
            매일 기록하고 목표를 세우고 싶어요
            <span class="onboard-opt-sub">라이프 — 일기 · 3·6·12·60개월 계획</span>
          </div>
        </a>
        <a href="./signup.html?mode=nest" class="onboard-opt">
          <div class="onboard-opt-icon">🪺</div>
          <div class="onboard-opt-text">
            가족 케어링을 함께 기록하고 싶어요
            <span class="onboard-opt-sub">케어링 — 케어링 일지 · 가족 초대 · 응급</span>
          </div>
        </a>
        <a href="./signup.html?mode=forest" class="onboard-opt">
          <div class="onboard-opt-icon">🌳</div>
          <div class="onboard-opt-text">
            먼저 둘러보고 싶어요
            <span class="onboard-opt-sub">커뮤니티 — 콘텐츠 · 게시판 · 추모</span>
          </div>
        </a>
      </div>
      <div class="onboard-note">이미 계정이 있으시면 <a href="./login.html" style="color:var(--primary);font-weight:700;">로그인</a></div>
    </div>

    <a href="./forest.html" class="card-forest" style="margin-top:14px;">
      <div class="card-forest-icon">🌳</div>
      <div class="card-forest-body">
        <div class="card-forest-title">커뮤니티 둘러보기</div>
        <div class="card-forest-desc">가입 없이 콘텐츠와 대화 탐색</div>
      </div>
      <span class="card-arrow">›</span>
    </a>
  `;
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
</script>

<script src="./scroll-top.js" defer></script>
</body>
</html>
