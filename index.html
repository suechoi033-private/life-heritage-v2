<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>잇다 — 삶 성찰 및 미래 준비</title>
  <meta name="description" content="라이프 · 케어링 · 커뮤니티 — 삶의 전주기를 한 곳에서.">
  <meta property="og:title" content="잇다 — 삶 성찰 및 미래 준비">
  <meta property="og:description" content="라이프 · 케어링 · 커뮤니티, 삶의 전주기를 한 곳에서.">
  <link rel="stylesheet" href="./auth-styles.css">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
  <meta name="theme-color" content="#2F6B4F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="잇다">
  <style>
    body { background: var(--bg); }

    .greeting-block { padding: 26px 0 10px; }
    .greeting-label {
      font-size: 12.5px; font-weight: 700;
      color: var(--primary); letter-spacing: 0.04em;
      margin-bottom: 8px;
    }
    .greeting-text {
      font-family: var(--font-serif);
      font-size: 21px; font-weight: 800;
      line-height: 1.55; letter-spacing: -0.01em;
      color: var(--ink);
    }

    .home-cards {
      display: flex; flex-direction: column;
      gap: 12px; margin-top: 22px;
    }

    /* 씨앗 카드 (오늘 일기) */
    .card-seed {
      background: linear-gradient(135deg, var(--primary), #3E9C72);
      border-radius: var(--radius);
      padding: 20px 22px;
      color: #fff; cursor: pointer; text-decoration: none; display: block;
      transition: opacity 0.15s;
    }
    .card-seed:hover { opacity: 0.93; color: #fff; }
    .card-eyebrow {
      font-size: 11.5px; font-weight: 700;
      letter-spacing: 0.06em; opacity: 0.85; margin-bottom: 6px;
    }
    .card-seed-title {
      font-family: var(--font-serif);
      font-size: 17px; font-weight: 700;
      line-height: 1.55; margin-bottom: 14px;
    }
    .card-cta {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13.5px; font-weight: 700;
      background: rgba(255,255,255,0.2);
      border-radius: 999px; padding: 7px 14px;
    }

    /* 둥지 카드 */
    .card-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .card-mini {
      background: var(--bg-alt);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px 16px;
      text-decoration: none; color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .card-mini:hover { border-color: var(--primary-soft); box-shadow: 0 4px 16px rgba(47,107,79,0.06); }
    .card-mini-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--primary-soft);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; margin-bottom: 10px;
    }
    .card-mini-icon.nest { background: var(--warm-soft); }
    .card-mini-title {
      font-size: 14.5px; font-weight: 800;
      letter-spacing: -0.01em; margin-bottom: 3px;
    }
    .card-mini-desc {
      font-size: 12px; color: var(--ink-muted); line-height: 1.5;
    }

    /* 숲 카드 (가로형) */
    .card-forest {
      background: var(--bg-alt);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex; align-items: center; gap: 14px;
      text-decoration: none; color: inherit;
      transition: border-color 0.15s;
    }
    .card-forest:hover { border-color: var(--primary-soft); }
    .card-forest-icon {
      width: 42px; height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, #E7F1EC, #D2E8DC);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .card-forest-body { flex: 1; min-width: 0; }
    .card-forest-title { font-size: 14.5px; font-weight: 800; margin-bottom: 3px; }
    .card-forest-desc { font-size: 12.5px; color: var(--ink-muted); }
    .card-arrow { color: var(--ink-faint); font-size: 18px; flex-shrink: 0; }

    /* 온보딩 (비로그인) */
    .card-onboard {
      background: var(--bg-alt);
      border-radius: var(--radius);
      padding: 24px 22px;
      border: 1px solid var(--line);
    }

    /* D2 — 비회원 진단 입구 카드 (잔잔한 솔리드 톤, 그라데이션 X)
       회원의 .card-seed 그라데이션과 의도적으로 구분: 두 카드의 정체가 다르다(엔게이지 vs 진단 입구)는
       시각 차이로 즉시 전달한다. 디자인 토큰만 사용. */
    .card-quiet {
      background: var(--bg-alt);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 22px 22px;
      color: var(--ink);
      cursor: pointer; text-decoration: none; display: block;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .card-quiet:hover {
      border-color: var(--primary-soft);
      box-shadow: 0 4px 16px rgba(47,107,79,0.06);
      color: var(--ink);
    }
    .card-quiet-eyebrow {
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--ink-muted);
      margin-bottom: 8px;
    }
    .card-quiet-title {
      font-family: var(--font-serif);
      font-size: 19px; font-weight: 700;
      line-height: 1.5; letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 6px;
    }
    .card-quiet-desc {
      font-size: 13.5px; line-height: 1.65;
      color: var(--ink-soft);
      margin-bottom: 14px;
    }
    .card-quiet-cta {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13.5px; font-weight: 800;
      color: var(--primary);
      background: var(--primary-soft);
      border-radius: 999px; padding: 8px 14px;
    }

    /* D1 — 비회원 below-fold "둘러보기" 작은 링크 */
    .browse-link {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 14px;
      font-size: 12.5px; font-weight: 700;
      color: var(--ink-muted);
      text-decoration: none;
    }
    .browse-link:hover { color: var(--primary); }
    .card-onboard-title {
      font-family: var(--font-serif);
      font-size: 19px; font-weight: 800;
      letter-spacing: -0.02em; margin-bottom: 8px; line-height: 1.4;
    }
    .card-onboard-desc {
      font-size: 13.5px; color: var(--ink-soft);
      line-height: 1.7; margin-bottom: 18px;
    }
    .onboard-options { display: flex; flex-direction: column; gap: 10px; }
    .onboard-opt {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      background: var(--bg);
      border: 1.5px solid var(--line);
      border-radius: var(--radius-sm);
      cursor: pointer; text-decoration: none; color: inherit;
      font-size: 14px; font-weight: 700;
      transition: border-color 0.15s, background 0.15s;
    }
    .onboard-opt:hover { border-color: var(--primary); background: var(--primary-soft); }
    .onboard-opt-icon { font-size: 22px; width: 36px; text-align: center; flex-shrink: 0; }
    .onboard-opt-text { line-height: 1.4; }
    .onboard-opt-sub {
      font-size: 11.5px; font-weight: 500;
      color: var(--ink-muted); margin-top: 2px; display: block;
    }
    .onboard-note {
      margin-top: 14px;
      font-size: 12.5px; color: var(--ink-muted);
      text-align: center;
    }

    .section-label {
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.06em; color: var(--ink-muted);
      text-transform: uppercase;
      margin: 28px 0 12px;
    }

    .skeleton {
      background: linear-gradient(90deg, var(--bg-alt) 25%, var(--line) 50%, var(--bg-alt) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius-sm);
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── 홈 콘텐츠 피드 (오늘의집/Airbnb 스타일) ── */
    .feed-section { margin-top: 30px; }
    .feed-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 14px;
    }
    .feed-head-title { font-size: 18px; font-weight: 800; color: var(--ink); }
    .feed-head-more { font-size: 13px; font-weight: 700; color: var(--primary); text-decoration: none; }

    .hcard {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 12px;
      cursor: pointer;
      transition: box-shadow .15s, transform .1s;
    }
    .hcard:active { transform: scale(0.995); }
    .hcard:hover { box-shadow: 0 6px 22px rgba(0,0,0,0.07); }
    .hcard-cover {
      position: relative;
      aspect-ratio: 2 / 1;
      background-size: cover; background-position: center;
      display: flex; align-items: center; justify-content: center;
    }
    .hcard-art { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    .hcard-badges {
      position: absolute; top: 12px; left: 12px;
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .hbadge {
      font-size: 11px; font-weight: 800; padding: 4px 9px; border-radius: 999px;
      background: rgba(255,255,255,0.92); color: var(--ink); backdrop-filter: blur(4px);
    }
    .hbadge-new { background: var(--primary); color: #fff; }
    .hbadge-story { background: #1c2620; color: #fff; }
    .hbadge-mine { background: var(--warm, #BE6440); color: #fff; }
    .hcard-body { padding: 12px 15px 13px; }
    .hcard-cat { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; flex-wrap: wrap; }
    .hcard-src { font-size: 10.5px; font-weight: 800; padding: 2px 7px; border-radius: 999px; }
    .src-editor { background: var(--primary-soft); color: var(--primary); }
    .src-user { background: var(--warm-soft, #F4E7DE); color: var(--warm, #BE6440); }
    .hcard-catname { font-size: 11.5px; font-weight: 700; color: var(--ink-muted); }
    .hcard-title { font-size: 15.5px; font-weight: 800; color: var(--ink); line-height: 1.4; margin-bottom: 5px; }
    .hcard-excerpt {
      font-size: 13px; color: var(--ink-soft); line-height: 1.55; margin-bottom: 10px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .hcard-foot { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .hcard-author { display: flex; align-items: center; gap: 7px; min-width: 0; }
    .hcard-avatar {
      width: 26px; height: 26px; border-radius: 999px; object-fit: cover;
      background: var(--primary-soft); color: var(--primary);
      display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; flex-shrink: 0;
    }
    .hcard-author-name { font-size: 12.5px; font-weight: 700; color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hcard-engage { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
    .hcard-heart, .hcard-comment {
      display: inline-flex; align-items: center; gap: 5px;
      background: none; border: none; font-family: inherit; cursor: pointer;
      font-size: 13.5px; font-weight: 700; color: var(--ink-muted); padding: 4px;
    }
    .hcard-heart.on { color: #E0556B; }
    .hcard-heart .ic { font-size: 16px; }
    .feed-empty {
      background: var(--bg-alt); border: 1px solid var(--line);
      border-radius: 18px; padding: 32px 20px;
      text-align: center; color: var(--ink-soft); font-size: 14px; line-height: 1.7;
    }
    /* 새 글 실시간 알림 pill */
    .feed-new-pill {
      position: sticky; top: 8px; z-index: 30;
      display: block; margin: 0 auto 14px; width: fit-content;
      background: var(--primary); color: #fff;
      border: none; border-radius: 999px; padding: 9px 18px;
      font-size: 13px; font-weight: 800; font-family: inherit;
      box-shadow: 0 4px 16px rgba(47,107,79,0.35); cursor: pointer;
      animation: pill-in .2s ease;
    }
    @keyframes pill-in { from { transform: translateY(-8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    /* 인라인 댓글 패널 */
    .hcard-comments {
      border-top: 1px solid var(--line);
      padding: 12px 16px 4px; background: var(--bg-alt);
    }
    .hcc-item { display: flex; gap: 8px; padding: 7px 0; }
    .hcc-avatar {
      width: 24px; height: 24px; border-radius: 999px; flex-shrink: 0;
      background: var(--primary-soft); color: var(--primary);
      display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800;
    }
    .hcc-bubble { flex: 1; min-width: 0; }
    .hcc-name { font-size: 12px; font-weight: 800; color: var(--ink-soft); }
    .hcc-body { font-size: 13.5px; color: var(--ink); line-height: 1.5; word-break: break-word; }
    .hcc-tools { display: flex; gap: 10px; margin-top: 4px; }
    .hcc-tools button {
      background: none; border: none; padding: 0;
      font-family: inherit; font-size: 11.5px; font-weight: 700;
      color: var(--ink-muted); cursor: pointer;
    }
    .hcc-tools button:hover { color: var(--primary); }
    .hcc-edit-form { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
    .hcc-edit-input {
      width: 100%; padding: 8px 10px; border: 1.5px solid var(--line); border-radius: 10px;
      font-family: inherit; font-size: 13.5px; line-height: 1.5; background: #fff;
      resize: vertical; min-height: 38px;
    }
    .hcc-edit-input:focus { outline: none; border-color: var(--primary); }
    .hcc-edit-actions { display: flex; gap: 8px; }
    .hcc-edit-actions button {
      border: none; border-radius: 999px; padding: 6px 12px;
      font-family: inherit; font-size: 12px; font-weight: 800; cursor: pointer;
    }
    .hcc-edit-save { background: var(--primary); color: #fff; }
    .hcc-edit-cancel { background: var(--bg-alt); color: var(--ink-soft); border: 1px solid var(--line) !important; }
    .hcc-edit-save:disabled { opacity: .5; }
    .hcc-empty { font-size: 13px; color: var(--ink-muted); padding: 6px 0 10px; }
    .hcc-form { display: flex; gap: 8px; padding: 8px 0 12px; }
    .hcc-input {
      flex: 1; padding: 10px 12px; border: 1.5px solid var(--line); border-radius: 999px;
      font-family: inherit; font-size: 14px; background: #fff;
    }
    .hcc-input:focus { outline: none; border-color: var(--primary); }
    .hcc-send {
      background: var(--primary); color: #fff; border: none; border-radius: 999px;
      padding: 0 16px; font-size: 13.5px; font-weight: 800; font-family: inherit; cursor: pointer;
    }
    .hcc-send:disabled { opacity: .5; }
  </style>
</head>
<body>

<main class="page-shell" id="main-content">
  <div class="greeting-block">
    <div class="greeting-label" id="greeting-label">잇다</div>
    <div class="greeting-text" id="greeting-text">잠시만요…</div>
  </div>
  <div class="home-cards" id="home-cards">
    <div class="skeleton" style="height:120px;"></div>
    <div class="skeleton" style="height:80px;margin-top:14px;"></div>
  </div>

  <section class="feed-section" id="home-feed" hidden>
    <button id="feed-new-pill" class="feed-new-pill" hidden></button>
    <div class="feed-head">
      <span class="feed-head-title">요즘, 잇다에선</span>
      <a href="./forest.html" class="feed-head-more">더보기 →</a>
    </div>
    <div id="home-feed-body">
      <div class="skeleton" style="height:96px;"></div>
      <div class="skeleton" style="height:96px;margin-top:12px;"></div>
    </div>
  </section>

  <!-- D1 — 비회원 below-fold 둘러보기 (작게). 회원에겐 노출 안 함. -->
  <div id="guest-browse-row" hidden style="text-align:center; margin: 20px 0 8px;">
    <a href="./forest.html" class="browse-link">가입 없이 둘러보기 <span>›</span></a>
  </div>
</main>

<script type="module">
import { supabase } from './auth.js';
import { renderNav } from './nav.js';
import { registerPWA } from './js/pwa.js';
import { getFeaturedStory, listHomeFeed, getEngagementMap, listContentComments, addContentComment, updateContentComment, deleteContentComment } from './js/content.js';
import { toggleReaction } from './js/community.js';

await renderNav({ active: 'home', infoIcon: true });
registerPWA();

const { data: { session } } = await supabase.auth.getSession();
const user = session?.user ?? null;
const currentUserId = user?.id || null;

// ── 인사말 ──
const greetingLabel = document.getElementById('greeting-label');
const greetingText  = document.getElementById('greeting-text');
const hour = new Date().getHours();
const timeLabel = hour < 12 ? '좋은 아침이에요'
              : hour < 18 ? '안녕하세요'
              : '오늘 하루 수고하셨어요';

if (user) {
  const name = user.user_metadata?.name || user.email?.split('@')[0] || '';
  greetingLabel.textContent = timeLabel;
  greetingText.innerHTML = name
    ? `${escapeHtml(name)}님,<br>오늘도 한 발씩.`
    : `이따가 하지 말고,<br>오늘 한 발씩.`;
} else {
  greetingLabel.textContent = '잇다';
  greetingText.innerHTML = `라이프 · 케어링 · 커뮤니티,<br>한 곳에서.`;
}

// ── 오늘의 질문(있으면) ──
let todayQ = null;
try {
  const { data } = await supabase.rpc('get_todays_question');
  if (data && data.length > 0) todayQ = data[0];
} catch (_) {}

// ── 자기성찰 시리즈 상태 (회원만) — 사장님 결정 2026-06-14 ──
//   미답: Axis A·B 진입 카드 (사장님 확정 카피)
//   답함: 약속 진행 한 줄 (사람 path → 이름 / 일 path → 한 가지)
//   사별: 알람 노출 X (slience by design)
async function loadReflectionSeriesState() {
  if (!user) return null;
  try {
    // 시리즈 질문들의 id 가져오기
    const { data: qs } = await supabase
      .from('daily_questions')
      .select('id, series_step, series_branch')
      .eq('series_key', 'not_waking_tomorrow');
    if (!qs || qs.length === 0) return null; // 마이그레이션 미적용 시 안전하게 null
    const qIds = qs.map(q => q.id);
    const { data: answers } = await supabase
      .from('daily_answers')
      .select('question_id, content')
      .eq('user_id', user.id)
      .in('question_id', qIds);
    if (!answers || answers.length === 0) return { started: false };
    const byQid = {};
    answers.forEach(a => { byQid[a.question_id] = a.content; });
    let branch = null, personName = null, pick = null, freq = null, optin = null, bereaved = false;
    qs.forEach(q => {
      const c = byQid[q.id];
      if (!c) return;
      if (q.series_step === 2 && (c === 'person' || c === 'work')) branch = c;
      if (q.series_branch === 'person' && q.series_step === 3) {
        bereaved = c.includes('[사별]');
        personName = c.replace('[사별]', '').trim();
      }
      if (q.series_branch === 'person' && q.series_step === 4) freq = c;
      if (q.series_branch === 'work' && q.series_step === 4) pick = c;
      if (q.series_step === 5) optin = c;
    });
    const q5Answered = !!optin;
    return {
      started: true,
      completed: q5Answered || (bereaved && !!personName), // 사별이면 Q4·Q5 스킵 = 완료로 봄
      branch, personName, pick, freq, optin, bereaved,
    };
  } catch (e) {
    console.warn('[home] reflection series state load failed', e);
    return null;
  }
}

// in-app 알람 노출 룰 — 옵트인 사용자, 사별 제외, 사용자 정한 빈도
//   주 1·2·3회 → 각각 일 / 월·목 / 월·수·금 노출일에만 카드 표시
function shouldShowReminderToday(rs) {
  if (!rs || !rs.completed) return false;
  if (rs.bereaved) return false;
  if (rs.optin !== '예') return false;
  if (!rs.freq) return false;
  const day = new Date().getDay(); // 0=일, 1=월, ...
  if (rs.freq === '주 1회') return day === 0;
  if (rs.freq === '주 2회') return day === 1 || day === 4;
  if (rs.freq === '주 3회') return day === 1 || day === 3 || day === 5;
  return false;
}

// ── 카드 렌더 ──
const cardsEl = document.getElementById('home-cards');

if (user) {
  const rs = await loadReflectionSeriesState();
  let reflectionCardHtml = '';

function coverArt(c) {
  const p = CATEGORY_ART[c.category] || { a:'#EFEFEF', b:'#DADADA', sun:'#CFCFCF', h1:'#DCDCDC', h2:'#C6C6C6', motif:'' };
  const gid = 'sky_' + String(c.id || c.category || 'x').replace(/[^a-zA-Z0-9_-]/g, '');
  const motif = COVER_MOTIF[p.motif] || '';
  return `<svg class="hcard-art" viewBox="0 0 160 90" preserveAspectRatio="xMidYMid slice" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">`
    + `<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${p.a}"/><stop offset="1" stop-color="${p.b}"/></linearGradient></defs>`
    + `<rect width="160" height="90" fill="url(#${gid})"/>`
    + `<circle cx="119" cy="31" r="22" fill="${p.sun}" opacity="0.26"/>`
    + `<circle cx="119" cy="31" r="12.5" fill="${p.sun}"/>`
    + `<path d="M0 58 Q40 45 80 53 T160 50 L160 90 L0 90 Z" fill="${p.h1}"/>`
    + `<path d="M0 74 Q48 63 100 71 T160 69 L160 90 L0 90 Z" fill="${p.h2}"/>`
    + motif
    + `</svg>`;
}

function isNew(created) { return (Date.now() - new Date(created).getTime()) < 3 * 86400000; }

async function renderHomeFeed() {
  const section = document.getElementById('home-feed');
  const body = document.getElementById('home-feed-body');
  section.hidden = false;
  try {
    const [story, list] = await Promise.all([
      getFeaturedStory().catch(() => null),
      listHomeFeed(12),
    ]);
    let items = list || [];
    if (story) items = items.filter((c) => c.id !== story.id);
    const ordered = story ? [story, ...items] : items;

    if (!ordered.length) {
      body.innerHTML = `<div class="feed-empty">아직 조용하네요.<br>당신의 오늘 한 줄이 누군가의 내일이 됩니다.</div>`;
      return;
    }

    const eng = await getEngagementMap(ordered.map((c) => c.id)).catch(() => ({}));
    body.innerHTML = ordered.map((c) => feedCard(c, eng[c.id] || { likes: 0, mineLiked: false, comments: 0 })).join('');
    wireHearts(body);
  } catch (err) {
    console.warn('[home] 피드 로드 실패:', err);
    section.hidden = true;
  }
}

function feedCard(c, e) {
  const isEditor = c.author_type === 'official';
  const isStory = c.format === 'story';
  const cover = c.cover_image_url
    ? `style="background-image:url('${encodeURI(c.cover_image_url)}')"`
    : '';
  const coverIcon = c.cover_image_url ? '' : coverArt(c);

  const badges = [];
  if (isNew(c.created_at)) badges.push(`<span class="hbadge hbadge-new">NEW</span>`);
  if (isStory) badges.push(`<span class="hbadge hbadge-story">📖 이야기</span>`);
  if (currentUserId && c.creator_id === currentUserId) badges.push(`<span class="hbadge hbadge-mine">내 글</span>`);

  const authorName = isEditor ? '잇다 에디터' : (c.profiles?.name || '잇다 사용자');
  const avatar = (!isEditor && c.profiles?.avatar_url)
    ? `<img class="hcard-avatar" src="${escapeHtml(c.profiles.avatar_url)}" alt="">`
    : `<span class="hcard-avatar">${isEditor ? '✓' : escapeHtml((authorName[0] || '·'))}</span>`;
  const excerpt = c.excerpt || (c.body || '').replace(/[#*>`_\-\[\]()]/g, '').replace(/\s+/g, ' ').trim();

  return `
    <article class="hcard" data-href="./content-detail.html?id=${c.id}">
      <div class="hcard-cover" ${cover}>
        ${coverIcon}
        ${badges.length ? `<div class="hcard-badges">${badges.join('')}</div>` : ''}
      </div>
      <div class="hcard-body">
        <div class="hcard-cat">
          <!-- D3 (2026-06-13) — 작성자 칩 "이웃 톤"으로 시각 조정.
               필터(listHomeFeed: author_type='official')는 v3 검증 전 유지.
               본문/제목 비건드림. 카드가 "먼저 겪은 사람의 이야기"로 읽히도록 라벨만 손봄. -->
          <span class="hcard-src ${isEditor ? 'src-editor' : 'src-user'}">${isEditor ? '먼저 겪은 이웃' : '이웃의 이야기'}</span>
          ${CATEGORY_LABELS[c.category] ? `<span class="hcard-catname">${CATEGORY_LABELS[c.category]}</span>` : ''}
        </div>
        <div class="hcard-title">${escapeHtml(c.title || '제목 없음')}</div>
        ${excerpt ? `<div class="hcard-excerpt">${escapeHtml(excerpt)}</div>` : ''}
        <div class="hcard-foot">
          <div class="hcard-author">${avatar}<span class="hcard-author-name">${escapeHtml(authorName)}</span></div>
          <div class="hcard-engage">
            <button class="hcard-heart ${e.mineLiked ? 'on' : ''}" data-id="${c.id}" aria-label="공감">
              <span class="ic">${e.mineLiked ? '❤' : '♡'}</span>
            </button>
            <button class="hcard-comment" data-id="${c.id}" aria-label="댓글"><span class="ic">💬</span><span class="cnt">${e.comments}</span></button>
          </div>
        </div>
      </div>
      <div class="hcard-comments" data-for="${c.id}" hidden></div>
    </article>
  `;
}

function wireHearts(root) {
  // 카드 본문 클릭 → 상세 이동 (하트/댓글 영역 제외)
  root.querySelectorAll('.hcard').forEach((card) => {
    card.addEventListener('click', (ev) => {
      if (ev.target.closest('.hcard-engage') || ev.target.closest('.hcard-comments')) return;
      window.location.href = card.dataset.href;
    });
  });
  // 하트 토글
  root.querySelectorAll('.hcard-heart').forEach((btn) => {
    btn.addEventListener('click', async (ev) => {
      ev.stopPropagation();
      if (!currentUserId) { window.location.href = './login.html'; return; }
      const icEl = btn.querySelector('.ic');
      const wasOn = btn.classList.contains('on');
      btn.classList.toggle('on', !wasOn);
      icEl.textContent = !wasOn ? '❤' : '♡';
      try {
        await toggleReaction({ target_type: 'content', target_id: btn.dataset.id });
      } catch (err) {
        btn.classList.toggle('on', wasOn);
        icEl.textContent = wasOn ? '❤' : '♡';
      }
    });
  });
  // 댓글 토글
  root.querySelectorAll('.hcard-comment').forEach((btn) => {
    btn.addEventListener('click', (ev) => { ev.stopPropagation(); toggleComments(btn.dataset.id); });
  });
}

const _commentsLoaded = new Set();
async function toggleComments(id) {
  const panel = document.querySelector(`.hcard-comments[data-for="${id}"]`);
  if (!panel) return;
  if (!panel.hidden) { panel.hidden = true; return; }
  panel.hidden = false;
  if (!_commentsLoaded.has(id)) {
    panel.innerHTML = `<div class="hcc-empty">불러오는 중…</div>`;
    try {
      const list = await listContentComments(id);
      renderCommentPanel(panel, id, list);
      _commentsLoaded.add(id);
    } catch (e) {
      panel.innerHTML = `<div class="hcc-empty">댓글을 불러오지 못했어요.</div>`;
    }
  }
}

function commentItemHtml(c) {
  const name = c.profiles?.name || '잇다 사용자';
  const isOwner = currentUserId && c.user_id === currentUserId;
  const tools = isOwner
    ? `<div class="hcc-tools">
         <button type="button" data-action="edit-card-comment" data-id="${c.id}">수정</button>
         <button type="button" data-action="delete-card-comment" data-id="${c.id}">삭제</button>
       </div>`
    : '';
  return `<div class="hcc-item" data-comment-id="${c.id}">
    <span class="hcc-avatar">${escapeHtml(name[0] || '·')}</span>
    <div class="hcc-bubble">
      <div class="hcc-name">${escapeHtml(name)}</div>
      <div class="hcc-body" data-role="body">${escapeHtml(c.body)}</div>
      ${tools}
    </div>
  </div>`;
}

function openCardCommentEdit(itemEl) {
  if (!itemEl || itemEl.querySelector('.hcc-edit-form')) return;
  const bodyEl = itemEl.querySelector('[data-role="body"]');
  const toolsEl = itemEl.querySelector('.hcc-tools');
  const current = bodyEl?.textContent || '';
  if (bodyEl) bodyEl.hidden = true;
  if (toolsEl) toolsEl.hidden = true;
  const form = document.createElement('div');
  form.className = 'hcc-edit-form';
  form.innerHTML = `
    <textarea class="hcc-edit-input" maxlength="500" rows="2"></textarea>
    <div class="hcc-edit-actions">
      <button type="button" class="hcc-edit-save">저장</button>
      <button type="button" class="hcc-edit-cancel">취소</button>
    </div>`;
  const ta = form.querySelector('textarea');
  ta.value = current;
  itemEl.querySelector('.hcc-bubble').appendChild(form);
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);

  const close = (newBody) => {
    if (typeof newBody === 'string' && bodyEl) bodyEl.textContent = newBody;
    form.remove();
    if (bodyEl) bodyEl.hidden = false;
    if (toolsEl) toolsEl.hidden = false;
  };
  form.querySelector('.hcc-edit-cancel').addEventListener('click', () => close());
  form.querySelector('.hcc-edit-save').addEventListener('click', async (ev) => {
    const text = ta.value.trim();
    if (!text) return;
    if (text === current) { close(); return; }
    const btn = ev.currentTarget;
    btn.disabled = true;
    try {
      const id = itemEl.dataset.commentId;
      const updated = await updateContentComment(id, text);
      close(updated.body);
    } catch (e) {
      btn.disabled = false;
      alert(e.message || '댓글 수정에 실패했어요.');
    }
  });
}

function renderCommentPanel(panel, id, list) {
  panel.innerHTML = `
    <div class="hcc-list">${list.length ? list.map(commentItemHtml).join('') : '<div class="hcc-empty">첫 댓글을 남겨보세요.</div>'}</div>
    <form class="hcc-form" data-id="${id}">
      <input class="hcc-input" type="text" placeholder="${currentUserId ? '따뜻한 한마디를 남겨주세요' : '로그인 후 댓글을 남길 수 있어요'}" maxlength="500" ${currentUserId ? '' : 'disabled'}>
      <button type="submit" class="hcc-send" ${currentUserId ? '' : 'disabled'}>등록</button>
    </form>`;
  const form = panel.querySelector('.hcc-form');
  form.addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const input = form.querySelector('.hcc-input');
    const text = input.value.trim();
    if (!text) return;
    const send = form.querySelector('.hcc-send');
    send.disabled = true;
    try {
      const c = await addContentComment(id, text);
      const listEl = panel.querySelector('.hcc-list');
      if (listEl.querySelector('.hcc-empty')) listEl.innerHTML = '';
      listEl.insertAdjacentHTML('beforeend', commentItemHtml(c));
      input.value = '';
      bumpCommentCount(id, 1);
    } catch (e) {
      alert(e.message || '댓글 등록 실패');
    } finally {
      send.disabled = false;
    }
  });

  // 댓글 수정/삭제 — 본인 댓글만 (UI는 owner에게만 노출됨)
  // 이 위임은 .hcard-comments[data-for] 패널 안에서만 동작하므로 다른 곳(post-detail 등)에 영향 0.
  panel.querySelector('.hcc-list')?.addEventListener('click', async (ev) => {
    const editBtn = ev.target.closest('[data-action="edit-card-comment"]');
    const delBtn  = ev.target.closest('[data-action="delete-card-comment"]');
    if (!editBtn && !delBtn) return;
    ev.stopPropagation();
    const itemEl = ev.target.closest('.hcc-item');
    if (!itemEl) return;
    if (editBtn) {
      openCardCommentEdit(itemEl);
      return;
    }
    if (delBtn) {
      if (!confirm('이 댓글을 삭제할까요?')) return;
      delBtn.disabled = true;
      try {
        await deleteContentComment(delBtn.dataset.id);
        itemEl.remove();
        bumpCommentCount(id, -1);
        const listEl = panel.querySelector('.hcc-list');
        if (listEl && !listEl.querySelector('.hcc-item')) {
          listEl.innerHTML = '<div class="hcc-empty">첫 댓글을 남겨보세요.</div>';
        }
      } catch (e) {
        delBtn.disabled = false;
        alert(e.message || '댓글 삭제에 실패했어요.');
      }
    }
  });
}

function bumpCommentCount(id, delta) {
  const cnt = document.querySelector(`.hcard-comment[data-id="${id}"] .cnt`);
  if (cnt) cnt.textContent = Math.max(0, parseInt(cnt.textContent, 10) + delta);
}
function bumpLikeCount(id, delta) {
  const btn = document.querySelector(`.hcard-heart[data-id="${id}"]`);
  if (!btn) return;
  const cnt = btn.querySelector('.cnt');
  cnt.textContent = Math.max(0, parseInt(cnt.textContent, 10) + delta);
}

// ── 실시간 갱신 ──
let _newCount = 0;
function subscribeRealtime() {
  const pill = document.getElementById('feed-new-pill');
  supabase.channel('home-feed')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'contents' }, (p) => {
      const r = p.new || {};
      if (r.is_published === false || r.category === 'memorial' || r.category === 'reflection' || r.author_type !== 'official') return;
      _newCount++;
      pill.hidden = false;
      pill.textContent = `🆕 새 글 ${_newCount}개 · 보기`;
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'reactions' }, (p) => {
      const r = p.new || {};
      if (r.target_type !== 'content' || r.reaction_type !== 'like') return;
      if (currentUserId && r.user_id === currentUserId) return; // 내 좋아요는 낙관적 처리됨
      bumpLikeCount(r.target_id, 1);
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'comments' }, (p) => {
      const r = p.new || {};
      if (!r.content_id) return;
      if (currentUserId && r.user_id === currentUserId) return; // 내 댓글은 낙관적 처리됨
      bumpCommentCount(r.content_id, 1);
    })
    .subscribe();

  pill.addEventListener('click', () => {
    _newCount = 0; pill.hidden = true; _commentsLoaded.clear();
    renderHomeFeed();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
