<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>잇다 시작하기</title>
  <meta name="description" content="일곱 번만 답하면, 지금 맞는 첫걸음을 같이 찾아요. 1분이면 돼요.">
  <link rel="stylesheet" href="./auth-styles.css">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <meta name="theme-color" content="#2F6B4F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="잇다">
  <style>
    body { background: var(--bg); }
    .onb-shell { max-width: 560px; margin: 0 auto; padding: 0 20px 140px; }

    .onb-progress-wrap { position: sticky; top: 0; z-index: 5; background: var(--bg); padding: 12px 0 10px; }
    .onb-progress { height: 6px; background: var(--bg-alt); border-radius: 999px; overflow: hidden; }
    .onb-progress-fill { height: 100%; width: 0; background: linear-gradient(90deg, var(--primary), #3E9C72); border-radius: 999px; transition: width 0.3s ease; }
    .onb-step-count { font-size: 12px; font-weight: 700; color: var(--ink-muted); margin-top: 8px; }

    .onb-intro { padding: 34px 0 8px; text-align: center; }
    .onb-intro-kicker { font-size: 12.5px; font-weight: 800; letter-spacing: 0.06em; color: var(--primary); margin-bottom: 12px; }
    .onb-intro-title { font-family: var(--font-serif); font-size: 26px; font-weight: 800; line-height: 1.5; color: var(--ink); margin-bottom: 14px; letter-spacing: -0.01em; }
    .onb-intro-lead { font-size: 15px; line-height: 1.75; color: var(--ink-soft); margin-bottom: 28px; }
    .onb-start-btn, .onb-primary { display: block; width: 100%; padding: 16px; border: none; border-radius: var(--radius-sm); background: var(--primary); color: #fff; font-size: 16px; font-weight: 800; cursor: pointer; font-family: inherit; transition: background 0.15s; text-align: center; text-decoration: none; }
    .onb-start-btn:hover, .onb-primary:hover { background: var(--primary-hover); color: #fff; }
    .onb-intro-note { font-size: 12.5px; color: var(--ink-muted); margin-top: 14px; }

    .onb-step { padding: 18px 0 8px; }
    .onb-q-eyebrow { font-size: 12.5px; font-weight: 800; letter-spacing: 0.04em; color: var(--primary); margin-bottom: 10px; }
    .onb-q-title { font-family: var(--font-serif); font-size: 22px; font-weight: 800; line-height: 1.5; color: var(--ink); margin-bottom: 18px; letter-spacing: -0.01em; }

    .onb-opts { display: flex; flex-direction: column; gap: 10px; }
    .onb-opt { display: flex; align-items: center; gap: 14px; padding: 16px; border: 1.5px solid var(--line); border-radius: var(--radius-sm); background: #fff; cursor: pointer; font-family: inherit; text-align: left; transition: all 0.12s; width: 100%; }
    .onb-opt:hover { border-color: var(--primary-soft); }
    .onb-opt.active { border-color: var(--primary); border-width: 2px; background: var(--primary-soft); }
    .onb-opt-label { flex: 1; font-size: 15.5px; font-weight: 700; color: var(--ink); line-height: 1.5; }
    .onb-opt-check { width: 22px; height: 22px; border-radius: 999px; border: 2px solid var(--line); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; }
    .onb-opt.active .onb-opt-check { background: var(--primary); border-color: var(--primary); }
    .onb-multi-hint { font-size: 12px; font-weight: 700; color: var(--ink-muted); margin-bottom: 12px; }

    .onb-text-input { width: 100%; padding: 16px; border: 1.5px solid var(--line); border-radius: var(--radius-sm); font-size: 16px; font-family: var(--font-serif); line-height: 1.6; background: #fff; min-height: 100px; resize: vertical; }
    .onb-text-input:focus { outline: none; border-color: var(--primary); }
    .onb-skip-hint { font-size: 12.5px; color: var(--ink-muted); margin-top: 10px; }

    /* 인터스티셜 */
    .onb-mid { padding: 60px 6px; text-align: center; }
    .onb-mid-text { font-family: var(--font-serif); font-size: 21px; font-weight: 800; line-height: 1.6; color: var(--ink); }

    /* 분석 중 로딩 */
    .onb-loading { padding: 90px 10px; text-align: center; }
    .onb-loading-text { font-family: var(--font-serif); font-size: 19px; font-weight: 700; color: var(--ink-soft); line-height: 1.6; }
    .onb-dots { display: inline-flex; gap: 6px; margin-top: 18px; }
    .onb-dots span { width: 8px; height: 8px; border-radius: 999px; background: var(--primary); opacity: 0.35; animation: onbdot 1.2s infinite; }
    .onb-dots span:nth-child(2) { animation-delay: 0.2s; }
    .onb-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes onbdot { 0%,100% { opacity: 0.35; } 50% { opacity: 1; } }

    .onb-actionbar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--line); padding: 12px 20px calc(12px + env(safe-area-inset-bottom, 0px)); display: flex; gap: 10px; max-width: 560px; margin: 0 auto; }
    .onb-back { flex: 0 0 auto; padding: 14px 18px; border-radius: var(--radius-sm); border: 1px solid var(--line); background: var(--bg-alt); color: var(--ink-soft); font-size: 14.5px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .onb-next { flex: 1; padding: 14px; border-radius: var(--radius-sm); border: none; background: var(--primary); color: #fff; font-size: 15.5px; font-weight: 800; cursor: pointer; font-family: inherit; }
    .onb-next:disabled { opacity: 0.4; cursor: not-allowed; }

    /* 결과 */
    .onb-result-head { text-align: center; padding: 26px 0 4px; }
    .onb-result-kicker { font-size: 12.5px; font-weight: 800; letter-spacing: 0.06em; color: var(--primary); margin-bottom: 12px; }
    .onb-name { font-family: var(--font-serif); font-size: 24px; font-weight: 800; line-height: 1.5; color: var(--ink); letter-spacing: -0.01em; }
    .onb-quote { background: var(--bg-alt); border-left: 3px solid var(--primary); border-radius: 0 12px 12px 0; padding: 16px 18px; margin: 20px 0; }
    .onb-quote-q { font-family: var(--font-serif); font-size: 17px; font-weight: 700; color: var(--ink); line-height: 1.6; }
    .onb-quote-sub { font-size: 13px; color: var(--ink-soft); margin-top: 8px; line-height: 1.6; }
    .onb-companion { font-size: 15px; line-height: 1.75; color: var(--ink-soft); margin: 20px 2px; }
    .onb-solo { font-size: 14px; line-height: 1.7; color: var(--ink-soft); background: var(--warm-soft); border-radius: 12px; padding: 14px 16px; margin: 16px 0; }

    .onb-step-card { background: linear-gradient(160deg, #FAFCFB, var(--bg-alt)); border: 1px solid var(--line); border-radius: var(--radius); padding: 20px; margin-top: 8px; }
    .onb-step-card-label { font-size: 12px; font-weight: 800; letter-spacing: 0.04em; color: var(--primary); margin-bottom: 8px; }
    .onb-step-card-text { font-size: 15.5px; font-weight: 700; color: var(--ink); line-height: 1.6; margin-bottom: 16px; }

    /* 게이트 */
    .onb-gate { margin-top: 28px; border-top: 1px solid var(--line); padding-top: 24px; }
    .onb-gate-title { font-family: var(--font-serif); font-size: 19px; font-weight: 800; color: var(--ink); line-height: 1.5; margin-bottom: 6px; text-align: center; }
    .onb-gate-desc { font-size: 13.5px; color: var(--ink-soft); line-height: 1.65; margin-bottom: 18px; text-align: center; }
    .onb-pledge { display: flex; align-items: flex-start; gap: 10px; background: var(--primary-soft); border-radius: 12px; padding: 14px 16px; margin-bottom: 18px; cursor: pointer; }
    .onb-pledge input { margin-top: 3px; width: 18px; height: 18px; accent-color: var(--primary); flex-shrink: 0; }
    .onb-pledge-body { flex: 1; }
    .onb-pledge-main { font-size: 14px; font-weight: 700; color: var(--ink); line-height: 1.5; }
    .onb-pledge-sub { font-size: 12px; color: var(--ink-muted); margin-top: 3px; }
    .onb-social { margin: 4px 0; }
    .onb-skip { display: block; width: 100%; background: none; border: none; color: var(--ink-muted); font-size: 13px; font-weight: 700; text-decoration: underline; cursor: pointer; font-family: inherit; margin-top: 16px; text-align: center; }
    .onb-restart { display: block; margin: 18px auto 0; background: none; border: none; color: var(--ink-faint); font-size: 12.5px; font-weight: 700; text-decoration: underline; cursor: pointer; font-family: inherit; }

    .hidden { display: none !important; }
    .itda-bottom-nav { display: none !important; }
    body.has-bottom-nav { padding-bottom: 0; }
  </style>
</head>
<body>

<main class="onb-shell">
  <div class="onb-progress-wrap hidden" id="progress-wrap">
    <div class="onb-progress"><div class="onb-progress-fill" id="progress-fill"></div></div>
    <div class="onb-step-count" id="step-count"></div>
  </div>

  <section id="intro" class="onb-intro">
    <div class="onb-intro-kicker">잇다 시작하기</div>
    <h1 class="onb-intro-title" id="intro-title">지금, 어느 단계에<br>와 계세요?</h1>
    <p class="onb-intro-lead">일곱 번만 답하면, 지금 맞는 첫걸음을 같이 찾아요.<br>1분이면 돼요. 정답은 없어요.</p>
    <button class="onb-start-btn" id="start-btn">시작하기</button>
    <div class="onb-intro-note">답은 언제든 바꿀 수 있어요</div>
  </section>

  <section id="step" class="onb-step hidden"></section>
  <section id="result" class="hidden"></section>
</main>

<div class="onb-actionbar hidden" id="actionbar">
  <button class="onb-back" id="back-btn">이전</button>
  <button class="onb-next" id="next-btn" disabled>다음</button>
</div>

<script type="module">
  import { supabase } from './auth.js';
  import { renderNav } from './nav.js';
  import { renderSocialAuthButtons } from './js/social-auth.js';

  await renderNav({ active: 'home', infoIcon: false, title: '잇다 시작하기', quickWrite: false });
  // 풀스크린 플로우 탈출구: 상단에 홈 링크
  {
    const tbActions = document.querySelector('#itda-top-bar .itda-top-bar-actions');
    if (tbActions) tbActions.insertAdjacentHTML('beforeend',
      '<a href="./index.html" aria-label="홈으로" style="font-size:13.5px;color:var(--ink-soft);text-decoration:none;font-weight:700;padding:4px 8px;">홈</a>');
  }

  const { data: { session } } = await supabase.auth.getSession();
  const loggedIn = !!session;
  const ANS_KEY = 'itda:onboarding';

  // ───────── 문항 (확정 카피) ─────────
  const STEPS = [
    { key: 'q1', type: 'single', eyebrow: '1 / 7',
      title: '지금 마음이 가장 많이 머무는 곳은 어디인가요?',
      options: [
        { v: 'reflect', label: '살아온 시간을 한번 돌아보고 싶어요' },
        { v: 'pre',     label: '앞일을 미리 챙겨두고 싶어요' },
        { v: 'care',    label: '곁에서 누군가를 돌보고 있어요' },
        { v: 'memory',  label: '소중한 분을 떠나보냈어요' },
        { v: 'explore', label: '아직 잘 모르겠어요' },
      ] },
    { key: 'q2', type: 'single', eyebrow: '2 / 7',
      title: '그 마음이 든 계기가 있다면, 어느 쪽에 가까운가요?',
      options: [
        { v: 'care',      label: '부모님이나 가족이 편찮으세요' },
        { v: 'loss',      label: '가까운 분을 얼마 전에 보내드렸어요' },
        { v: 'health',    label: '건강검진이나 진단에서 마음에 걸리는 게 있었어요' },
        { v: 'milestone', label: '은퇴나 환갑, 손주처럼 삶의 매듭을 지났어요' },
        { v: 'none',      label: '특별한 계기는 없어요. 그냥 한번 챙겨보려고요' },
      ] },
    { type: 'interstitial' },
    { key: 'q3', type: 'single', eyebrow: '3 / 7',
      title: '이 고민을 누구와 함께하고 계세요?',
      options: [
        { v: 'siblings', label: '형제, 자매와 함께요' },
        { v: 'spouse',   label: '배우자와 함께요' },
        { v: 'children', label: '자녀와 함께요' },
        { v: 'alone',    label: '지금은 혼자 하고 있어요' },
      ] },
    { key: 'q4', type: 'single', eyebrow: '4 / 7',
      title: '지금 마음은 어느 쪽에 가까우세요?',
      options: [
        { v: 'heavy', label: '머릿속이 복잡하고 막막해요' },
        { v: 'mid',   label: '잘 모르겠지만, 천천히 해보려 해요' },
        { v: 'light', label: '가볍게, 한번 살펴보는 정도예요' },
      ] },
    { key: 'q5', type: 'multi', eyebrow: '5 / 7',
      title: '아래 중 요즘 가장 많이 생각하는 것은 무엇인가요?',
      options: [
        { v: 'prep',   label: '언젠가 가족이 헤매지 않게 정리해 두는 것' },
        { v: 'words',  label: '가족에게 못 한 말을 남기는 것' },
        { v: 'care',   label: '돌봄과 치료, 요양을 어떻게 할지' },
        { v: 'grief',  label: '떠난 분을 잘 기억하고, 마음을 추스르는 것' },
        { v: 'record', label: '내가 살아온 시간을 글로 남기는 것' },
      ] },
    { key: 'q6', type: 'single', eyebrow: '6 / 7',
      title: '지금 시작한다면, 어느 정도가 편하시겠어요?',
      options: [
        { v: 'read',   label: '짧은 글 하나 읽는 정도' },
        { v: 'answer', label: '질문 하나에 답해보는 정도' },
        { v: 'do',     label: '뭔가 하나 직접 정리해 보고 결과물을 보는 정도' },
      ] },
    { key: 'q7', type: 'text', eyebrow: '7 / 7',
      title: '마지막으로, 사랑하는 사람을 떠올리며(본인이어도 괜찮아요) 지금 가장 남기고 싶은 한 문장이 있다면 적어주세요.',
      placeholder: '예: 고생한 우리 가족, 고맙다고 / 나는 이렇게 살았다고' },
  ];
  const QUESTION_KEYS = STEPS.filter(s => s.key).map(s => s.key);

  // ───────── stage 판정 (전략 확정: Q1·Q2 2축, Q2 우선, Q1=memory 예외) ─────────
  function computeStage(p) {
    if (p.q1 === 'memory') return 'bereaved';
    switch (p.q2) {
      case 'loss': return 'bereaved';
      case 'care': return 'caregiver';
      case 'health': return 'self_prep';
      case 'milestone': return 'reflector';
      case 'none':
      default:
        if (p.q1 === 'care') return 'caregiver';
        if (p.q1 === 'pre') return 'self_prep';
        if (p.q1 === 'reflect') return 'reflector';
        return 'explorer';
    }
  }
  const isSolo = (p) => p.q3 === 'alone';

  const INTERSTITIAL = {
    reflector: '그러시군요. 살아온 시간을 한번 돌아보고 싶으신 거죠.',
    self_prep: '그러시군요. 앞일을 미리 챙겨두고 싶으신 마음이군요.',
    caregiver: '그러시군요. 지금 누군가의 곁을 지키고 계시는군요.',
    bereaved:  '그러시군요. 소중한 분을 떠나보내셨군요.',
    explorer:  '그러시군요. 아직 정하지 않으셔도 괜찮아요.',
  };

  const STAGE = {
    caregiver: { name: '당신은 지금, 누군가의 곁을 지키는 자리에 계세요.',
      companion: '곁을 지키는 일은 혼자 짊어지기 버거워요. 나누면 한결 가벼워져요.',
      step: '오늘 면회 기록 한 줄을 남겨보세요. 형제도 같은 화면에서 함께 봅니다.',
      cta: '케어 기록 시작하기', href: './care.html' },
    self_prep: { name: '당신은 지금, 가족이 헤매지 않게 미리 챙겨두려는 자리에 계세요.',
      companion: "먼저 정리해 둔 분들은 '내 자식들은 나처럼 막막하지 않았으면' 하는 마음에서 시작했어요.",
      step: '가장 가벼운 것부터요. 가족에게 남기고 싶은 정보 한 가지를 적어보세요.',
      cta: '정보 한 가지 남기기', href: './info.html' },
    reflector: { name: '당신은 지금, 살아온 시간을 돌아보려는 자리에 계세요.',
      companion: '거창하게 시작할 필요 없어요. 하루 한 문장이 일 년 뒤엔 한 권이 돼요.',
      step: '오늘의 질문 하나에 답해보세요. 1분이면 됩니다.',
      cta: '오늘의 질문 답하기', href: './ask.html' },
    bereaved: { name: '당신은 지금, 소중한 분을 떠나보낸 자리에 계세요.',
      companion: '같은 길을 먼저 지난 분들의 기록이 여기 있어요. 천천히, 마음 가는 만큼만 읽으셔도 돼요.',
      step: '먼저 겪은 분의 이야기 한 편을 읽어보세요.',
      cta: '먼저 겪은 분의 글 읽기', href: './forest.html' },
    explorer: { name: '아직 어디라고 정하지 않아도 괜찮아요. 천천히 둘러보는 것도 한 걸음이에요.',
      companion: "많은 분들이 '그냥 한번' 들렀다가, 자기 자리를 찾았어요.",
      step: '마음 가는 글 한 편부터 읽어보세요.',
      cta: '글 둘러보기', href: './forest.html' },
  };
  const SOLO = {
    name: '지금은 혼자 챙기고 계시지만, 그래서 더 또렷이 정리해 두는 분들이 있어요.',
    companion: '혼자라서 더 막막한 게 아니라, 혼자라서 더 내 뜻대로 정리할 수 있어요.',
  };

  // ───────── 상태 ─────────
  let answers = loadAns() || {};
  let idx = 0;

  const $ = (id) => document.getElementById(id);
  const introEl = $('intro'), stepEl = $('step'), resultEl = $('result');
  const actionbar = $('actionbar'), backBtn = $('back-btn'), nextBtn = $('next-btn');
  const progressWrap = $('progress-wrap'), progressFill = $('progress-fill'), stepCount = $('step-count');

  function saveAns() { try { localStorage.setItem(ANS_KEY, JSON.stringify(answers)); } catch (_) {} }
  function loadAns() { try { return JSON.parse(localStorage.getItem(ANS_KEY) || 'null'); } catch (_) { return null; } }
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
  function answered(key) { const v = answers[key]; return Array.isArray(v) ? v.length > 0 : (v !== undefined && v !== null && v !== ''); }

  $('start-btn').addEventListener('click', () => {
    introEl.classList.add('hidden');
    idx = 0;
    renderStep();
  });

  function renderStep() {
    resultEl.classList.add('hidden');
    stepEl.classList.remove('hidden');
    actionbar.classList.remove('hidden');
    progressWrap.classList.remove('hidden');

    const s = STEPS[idx];
    const qDone = STEPS.slice(0, idx).filter(x => x.key).length;
    progressFill.style.width = `${(qDone / QUESTION_KEYS.length) * 100}%`;
    stepCount.textContent = s.key ? `${qDone + 1} / ${QUESTION_KEYS.length}` : '';

    if (s.type === 'interstitial') {
      const stage = computeStage(answers);
      stepEl.innerHTML = `<div class="onb-mid"><div class="onb-mid-text">${INTERSTITIAL[stage]}<br>몇 가지만 더 여쭤볼게요.</div></div>`;
      backBtn.textContent = '이전';
      nextBtn.textContent = '계속';
      nextBtn.disabled = false;
      window.scrollTo(0, 0);
      return;
    }

    let inner = `<div class="onb-q-eyebrow">${s.eyebrow}</div><div class="onb-q-title">${s.title}</div>`;
    if (s.type === 'text') {
      inner += `<textarea class="onb-text-input" id="text-field" placeholder="${s.placeholder}">${answers[s.key] ? escapeHtml(answers[s.key]) : ''}</textarea>
                <div class="onb-skip-hint">떠오르지 않으면 비워두셔도 돼요.</div>`;
    } else {
      if (s.type === 'multi') inner += `<div class="onb-multi-hint">해당하는 것을 모두 골라주세요</div>`;
      inner += `<div class="onb-opts">` + s.options.map(o => {
        const sel = s.type === 'multi' ? (answers[s.key] || []).includes(o.v) : answers[s.key] === o.v;
        return `<button type="button" class="onb-opt ${sel ? 'active' : ''}" data-v="${o.v}">
          <span class="onb-opt-label">${o.label}</span>
          <span class="onb-opt-check">${sel ? '✓' : ''}</span></button>`;
      }).join('') + `</div>`;
    }
    stepEl.innerHTML = inner;
    window.scrollTo(0, 0);

    if (s.type === 'text') {
      $('text-field').addEventListener('input', (e) => { answers[s.key] = e.target.value.trim(); saveAns(); });
    } else {
      stepEl.querySelectorAll('.onb-opt').forEach(btn => {
        btn.addEventListener('click', () => {
          const v = btn.dataset.v;
          if (s.type === 'multi') {
            const arr = answers[s.key] || [];
            answers[s.key] = arr.includes(v) ? arr.filter(x => x !== v) : [...arr, v];
          } else {
            answers[s.key] = v;
          }
          saveAns();
          renderStep();
        });
      });
    }

    backBtn.textContent = idx === 0 ? '처음으로' : '이전';
    nextBtn.textContent = idx === STEPS.length - 1 ? '결과 보기' : '다음';
    nextBtn.disabled = s.type !== 'text' && !answered(s.key);
  }

  backBtn.addEventListener('click', () => {
    if (idx === 0) {
      stepEl.classList.add('hidden'); actionbar.classList.add('hidden'); progressWrap.classList.add('hidden');
      introEl.classList.remove('hidden'); window.scrollTo(0, 0); return;
    }
    idx--; renderStep();
  });

  nextBtn.addEventListener('click', () => {
    if (idx === STEPS.length - 1) { saveAns(); showLoading(); return; }
    idx++; renderStep();
  });

  function showLoading() {
    stepEl.classList.add('hidden'); actionbar.classList.add('hidden'); progressWrap.classList.add('hidden');
    resultEl.classList.remove('hidden');
    resultEl.innerHTML = `<div class="onb-loading"><div class="onb-loading-text">답해주신 이야기를<br>정리하고 있어요</div>
      <div class="onb-dots"><span></span><span></span><span></span></div></div>`;
    window.scrollTo(0, 0);
    setTimeout(showResult, 2500);
  }

  function showResult() {
    const stage = computeStage(answers);
    answers.stage = stage; answers.solo = isSolo(answers); answers.ts = Date.now();
    saveAns();
    const s = STAGE[stage];
    const wish = (answers.q7 || '').trim();

    const quoteBlock = wish
      ? `<div class="onb-quote"><div class="onb-quote-q">"${escapeHtml(wish)}"</div>
         <div class="onb-quote-sub">이 한 문장이, 지금 여기 와 계신 이유예요.</div></div>`
      : '';
    const soloBlock = answers.solo
      ? `<div class="onb-solo">${SOLO.name}<br>${SOLO.companion}</div>`
      : '';

    const firstStep = `<div class="onb-step-card">
        <div class="onb-step-card-label">지금, 가장 가벼운 첫걸음</div>
        <div class="onb-step-card-text">${s.step}</div>
        ${loggedIn
          ? `<a class="onb-primary" href="${s.href}">${s.cta}</a>`
          : `<button class="onb-primary" id="cta-gate">${s.cta}</button>`}
      </div>`;

    const gate = loggedIn ? '' : `
      <div class="onb-gate" id="gate">
        <div class="onb-gate-title">여기까지 그려본 내 자리, 저장해 둘까요?</div>
        <div class="onb-gate-desc">가입하면 오늘 답이 그대로 남아요. 다음에 와서 이어 가시면 돼요.</div>
        <label class="onb-pledge">
          <input type="checkbox" id="pledge">
          <span class="onb-pledge-body">
            <span class="onb-pledge-main">서두르지 않고, 내 속도로 한 걸음씩 해볼게요</span>
            <span class="onb-pledge-sub">약속이 아니에요. 마음의 준비일 뿐이에요.</span>
          </span>
        </label>
        <div class="onb-social" id="social-auth"></div>
        <a class="onb-primary" href="./signup.html?next=${encodeURIComponent(s.href)}" style="margin-top:10px;">이메일로 시작하기</a>
        <button class="onb-skip" id="skip">지금은 저장 없이 둘러볼게요</button>
      </div>`;

    resultEl.innerHTML = `
      <div class="onb-result-head"><div class="onb-result-kicker">당신의 자리가 그려졌어요</div>
        <div class="onb-name">${s.name}</div></div>
      ${quoteBlock}
      ${soloBlock}
      <div class="onb-companion">${s.companion}</div>
      ${firstStep}
      ${gate}
      <button class="onb-restart" id="restart">처음부터 다시 해보기</button>`;
    window.scrollTo(0, 0);

    if (!loggedIn) {
      renderSocialAuthButtons($('social-auth'), { redirectAfter: s.href });
      $('cta-gate').addEventListener('click', () => $('gate').scrollIntoView({ behavior: 'smooth' }));
    }
    $('restart').addEventListener('click', () => {
      if (!confirm('답한 내용을 지우고 처음부터 다시 할까요?')) return;
      answers = {}; idx = 0; saveAns();
      resultEl.classList.add('hidden'); introEl.classList.remove('hidden'); window.scrollTo(0, 0);
    });
  }

  // 이미 로그인 + 완료된 답이 있으면 결과부터
  if (loggedIn && answers.stage && answers.q1) {
    introEl.classList.add('hidden');
    showResult();
  }
</script>

</body>
</html>
