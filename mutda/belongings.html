<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유품 미리 정리 — 묻다.</title>
  <link rel="stylesheet" href="./css/mutda.css" />
</head>
<body>
<main>
  <div style="padding-top:8px;">
    <h2 class="serif" style="font-size:22px;">내 물건 미리 정리하기</h2>
    <p class="muted small">남겨질 유품이 아니라, 내가 직접 자리를 정해주는 물건들입니다. 하루 하나면 충분해요.</p>
  </div>

  <section class="card" style="margin-top:16px;">
    <div class="field">
      <label>분류</label>
      <select id="in-category">
        <option value="귀중품">귀중품 (귀금속·통장·증서)</option>
        <option value="추억">추억의 물건 (사진·편지·기념품)</option>
        <option value="일상">일상 물건 (옷·가구·그릇)</option>
        <option value="디지털">디지털 (계정·사진·구독)</option>
        <option value="기타">기타</option>
      </select>
    </div>
    <div class="field">
      <label>품목</label>
      <input id="in-name" placeholder="예) 아버지께 물려받은 손목시계" />
    </div>
    <div class="field">
      <label>이 물건의 자리</label>
      <select id="in-decision">
        <option value="undecided">아직 고민 중</option>
        <option value="give">물려주기</option>
        <option value="donate">기부하기</option>
        <option value="sell">판매하기</option>
        <option value="keep">간직하기 (내가 끝까지)</option>
        <option value="discard">비우기 (처분)</option>
      </select>
    </div>
    <label class="item-row" id="sale-consent-row" style="display:none; cursor:pointer; border:none; padding-top:0;">
      <input type="checkbox" id="in-public-sale" style="width:20px;height:20px;accent-color:var(--primary);" />
      <span class="grow">
        <span class="title">판매 품목 공개에 동의합니다</span><br/>
        <span class="meta">'판매하기'로 남긴 품목을 공개해 주시면, 차후 사전·사후 유품정리를
        돕는 서비스로 보답하겠습니다.</span>
      </span>
    </label>
    <div class="field" id="recipient-field" style="display:none;">
      <label>누구에게</label>
      <input id="in-recipient" placeholder="예) 큰아들 / ○○복지관" />
    </div>
    <div class="field">
      <label>메모 (이 물건의 이야기)</label>
      <input id="in-note" placeholder="예) 1988년 결혼 예물. 시계방 김씨가 고쳐준 적 있음" />
    </div>
    <label class="item-row" style="cursor:pointer; border:none; padding-top:0;">
      <input type="checkbox" id="in-share" style="width:20px;height:20px;accent-color:var(--primary);" />
      <span class="grow">
        <span class="title">🕯️ 이 이야기 함께 나누기 (익명)</span><br/>
        <span class="meta">물건의 자리를 정한 마음이 '함께' 화면에 익명으로 실려,
        다른 이의 정리에 용기가 됩니다. 언제든 내릴 수 있어요.</span>
      </span>
    </label>
    <button class="btn" id="add-btn">목록에 담기</button>
  </section>

  <section>
    <h2 class="section-title">나의 물건 목록 <span class="chip green" id="count-chip"></span></h2>
    <div class="card" style="padding:6px 20px;" id="list"></div>
  </section>
</main>

<script type="module">
  import { supabase, initAppPage, toast, esc, logEvent } from './js/app.js';
  import { renderNav } from './js/nav.js';

  renderNav({ active: 'home', title: '유품 정리' });
  const { user } = await initAppPage();
  logEvent('belongings_view');

  const DECISION_LABEL = {
    undecided: ['고민 중', 'chip'],
    give: ['물려주기', 'chip green'],
    donate: ['기부', 'chip green'],
    sell: ['판매', 'chip warm'],
    keep: ['간직', 'chip warm'],
    discard: ['비우기', 'chip'],
  };

  const decisionSel = document.getElementById('in-decision');
  const recipientField = document.getElementById('recipient-field');
  const saleConsentRow = document.getElementById('sale-consent-row');
  decisionSel.onchange = () => {
    recipientField.style.display =
      ['give', 'donate'].includes(decisionSel.value) ? '' : 'none';
    saleConsentRow.style.display = decisionSel.value === 'sell' ? '' : 'none';
  };

  // 나눔 글 제목 — 물건의 자리를 정한 마음이 제목이 된다
  const DECISION_PHRASE = {
    give: '물려주기로 정했습니다', donate: '기부하기로 정했습니다',
    sell: '판매하기로 정했습니다', keep: '간직하기로 정했습니다',
    discard: '비우기로 정했습니다', undecided: '아직 자리를 고민 중입니다',
  };

  async function sharePost(b) {
    const title = `'${b.name}' — ${DECISION_PHRASE[b.decision] || DECISION_PHRASE.undecided}`;
    const body = b.note || `${b.category || '물건'} '${b.name}'의 자리를 정했습니다.`;
    const { data: post, error } = await supabase.from('mutda_posts').insert({
      user_id: user.id, author_name: '익명', title, body, topic: 'belongings',
    }).select().single();
    if (error) return null;
    await supabase.from('mutda_belongings').update({ shared_post_id: post.id }).eq('id', b.id);
    logEvent('belonging_shared');
    return post.id;
  }

  document.getElementById('add-btn').onclick = async () => {
    const name = document.getElementById('in-name').value.trim();
    if (!name) return alert('품목을 적어주세요.');
    const { data: item, error } = await supabase.from('mutda_belongings').insert({
      user_id: user.id,
      name,
      category: document.getElementById('in-category').value,
      decision: decisionSel.value,
      recipient: document.getElementById('in-recipient').value.trim() || null,
      note: document.getElementById('in-note').value.trim() || null,
      public_sale: decisionSel.value === 'sell' && document.getElementById('in-public-sale').checked,
    }).select().single();
    if (error) return alert('담지 못했어요. 다시 시도해 주세요.');
    logEvent('belonging_added');

    if (document.getElementById('in-share').checked) {
      await sharePost(item);
      toast('담았어요. 🕯️ 이야기는 익명으로 함께에 실렸어요.');
    } else {
      toast('목록에 담았어요');
    }
    ['in-name', 'in-recipient', 'in-note'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('in-share').checked = false;
    load();
  };

  async function load() {
    const { data } = await supabase.from('mutda_belongings')
      .select('*').eq('user_id', user.id).order('created_at', { ascending: false });
    const list = document.getElementById('list');
    document.getElementById('count-chip').textContent = `${data?.length || 0}개`;

    if (!data?.length) {
      list.innerHTML = '<p class="muted small" style="padding:12px 0;">첫 물건을 담아보세요. 눈앞에 보이는 것부터가 좋아요.</p>';
      return;
    }
    list.innerHTML = data.map(b => {
      const [label, cls] = DECISION_LABEL[b.decision] || DECISION_LABEL.undecided;
      // 긴 메모는 접어서 — 목록은 한눈에, 이야기는 '더보기'로
      const note = b.note || '';
      const noteShort = note.length > 40 ? esc(note.slice(0, 40)) + '…' : esc(note);
      return `
      <div class="item-row" style="${b.done ? 'opacity:.55;' : ''}">
        <input type="checkbox" ${b.done ? 'checked' : ''} data-done="${b.id}"
               title="정리 완료" style="width:20px;height:20px;accent-color:var(--primary);" />
        <span class="grow">
          <span class="title">${esc(b.name)}</span>
          <span class="${cls}" style="margin-left:6px;">${label}${b.recipient ? ' → ' + esc(b.recipient) : ''}</span>
          ${b.public_sale ? '<span class="chip" style="margin-left:4px;">공개 동의</span>' : ''}
          ${b.shared_post_id ? '<span class="chip warm" style="margin-left:4px;">🕯️ 나눔 중</span>' : ''}<br/>
          <span class="meta" data-note-view="${b.id}">${esc(b.category || '')}${note ? ' · ' + noteShort : ''}</span>
          ${note.length > 40 ? `<button class="btn quiet sm" data-more="${b.id}" style="padding:2px 10px; font-size:12px; margin-top:4px;">더보기</button>` : ''}
        </span>
        <button class="btn quiet sm" data-toggle-share="${b.id}">${b.shared_post_id ? '나눔 내리기' : '🕯️ 나누기'}</button>
        <button class="btn quiet sm" data-del="${b.id}">삭제</button>
      </div>`;
    }).join('');

    list.querySelectorAll('[data-more]').forEach(btn => btn.onclick = () => {
      const b = data.find(x => x.id === btn.dataset.more);
      const view = list.querySelector(`[data-note-view="${b.id}"]`);
      const expanded = btn.dataset.open === '1';
      view.textContent = `${b.category || ''}${b.note ? ' · ' + (expanded ? (b.note.length > 40 ? b.note.slice(0, 40) + '…' : b.note) : b.note) : ''}`;
      btn.dataset.open = expanded ? '' : '1';
      btn.textContent = expanded ? '더보기' : '접기';
    });

    list.querySelectorAll('[data-done]').forEach(c => c.onchange = async () => {
      await supabase.from('mutda_belongings').update({ done: c.checked }).eq('id', c.dataset.done);
      if (c.checked) toast('실제로 정리하셨군요. 하나가 가벼워졌어요.');
      load();
    });
    list.querySelectorAll('[data-toggle-share]').forEach(btn => btn.onclick = async () => {
      const b = data.find(x => x.id === btn.dataset.toggleShare);
      if (b.shared_post_id) {
        if (!confirm('함께 화면에서 내리시겠어요?')) return;
        await supabase.from('mutda_posts').delete().eq('id', b.shared_post_id);
        await supabase.from('mutda_belongings').update({ shared_post_id: null }).eq('id', b.id);
        toast('나눔을 내렸어요');
      } else {
        if (!confirm('이 물건 이야기를 익명으로 함께 화면에 나눌까요?')) return;
        await sharePost(b);
        toast('🕯️ 익명으로 나눴어요');
      }
      load();
    });
    list.querySelectorAll('[data-del]').forEach(btn => btn.onclick = async () => {
      if (!confirm('목록에서 삭제할까요?')) return;
      const b = data.find(x => x.id === btn.dataset.del);
      if (b.shared_post_id) await supabase.from('mutda_posts').delete().eq('id', b.shared_post_id);
      await supabase.from('mutda_belongings').delete().eq('id', b.id);
      load();
    });
  }

  load();
</script>
</body>
</html>
