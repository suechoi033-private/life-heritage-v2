<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나 — 묻다</title>
  <link rel="stylesheet" href="./css/mutda.css" />
</head>
<body>
<main>
  <div style="padding-top:8px;">
    <h2 class="serif" id="my-name" style="font-size:22px;">나</h2>
    <div style="margin-top:8px; display:flex; gap:8px; flex-wrap:wrap;">
      <span class="streak-chip" id="streak"></span>
      <span class="chip" id="since"></span>
    </div>
  </div>

  <section>
    <h2 class="section-title">나의 기록</h2>
    <div class="card" style="padding:6px 20px;" id="summary"></div>
  </section>

  <section>
    <h2 class="section-title">설정</h2>
    <div class="card" style="padding:6px 20px;">
      <a class="item-row" href="./checkin.html" style="color:inherit;">
        <span class="grow"><span class="title">🔔 안부확인</span><br/>
        <span class="meta" id="checkin-status"></span></span>
        <span class="go" style="color:var(--ink-faint);">›</span>
      </a>
      <label class="item-row" style="cursor:pointer;">
        <input type="checkbox" id="pet-toggle" style="width:20px;height:20px;accent-color:var(--primary);" />
        <span class="grow"><span class="title">🐾 반려동물과 함께 살아요</span><br/>
        <span class="meta">켜면 홈 여정에 반려동물 돌봄 플랜이 나타나요.</span></span>
      </label>
      <div class="item-row">
        <span class="grow"><span class="title">계정</span><br/>
        <span class="meta" id="my-email"></span></span>
        <button class="btn quiet sm" id="logout-btn">로그아웃</button>
      </div>
    </div>
  </section>

  <a class="card soft" href="../info.html" style="display:flex; align-items:center; gap:10px; padding:11px 14px; color:inherit;">
    <span style="font-size:17px;">🌳</span>
    <span style="flex:1; min-width:0;">
      <b style="font-size:13.5px;">돌봄이 시작되면 — 잇다</b><br/>
      <span class="small muted" style="font-size:12px;">케어링·요양·호스피스 정보 · 같은 계정으로 바로</span>
    </span>
    <span style="color:var(--ink-faint);">›</span>
  </a>

  <p class="legal-note">
    묻다에 남긴 기록은 본인만 볼 수 있습니다 (커뮤니티에 직접 올린 이야기 제외).
    계정 삭제를 원하시면 문의해 주세요 — 모든 기록이 함께 삭제됩니다.
  </p>
</main>

<script type="module">
  import { supabase, initAppPage, signOut, fmtDate } from './js/app.js';
  import { renderNav } from './js/nav.js';

  renderNav({ active: 'my' });
  const { user, profile } = await initAppPage();

  document.getElementById('my-name').textContent = `${profile.name}님의 자리`;
  document.getElementById('streak').textContent = `🌱 이어온 지 ${profile.streak_days || 1}일째`;
  document.getElementById('since').textContent = `${fmtDate(profile.created_at)} 시작`;
  document.getElementById('my-email').textContent = user.email;
  document.getElementById('checkin-status').textContent = profile.checkin_enabled
    ? `켜짐 · ${profile.checkin_threshold_hours}시간 기준` : '꺼짐';

  const uid = user.id;
  const [wills, letters, belongings, pets, posts] = await Promise.all([
    supabase.from('mutda_wills').select('status').eq('user_id', uid),
    supabase.from('mutda_letters').select('kind').eq('user_id', uid),
    supabase.from('mutda_belongings').select('done').eq('user_id', uid),
    supabase.from('mutda_pet_plans').select('pet_name').eq('user_id', uid),
    supabase.from('mutda_posts').select('id').eq('user_id', uid),
  ]);

  const willStatus = { draft: '초안', handwritten: '자필 완료', notarized: '공증 완료' };
  const w = wills.data?.[0];
  const g = (letters.data || []).filter(l => l.kind === 'gratitude').length;
  const f = (letters.data || []).filter(l => l.kind === 'farewell').length;
  const bDone = (belongings.data || []).filter(b => b.done).length;

  const rows = [
    ['📜 유언장', w ? willStatus[w.status] || '초안' : '아직 없음', 'will.html'],
    ['💐 감사의 말', g ? `${g}통` : '아직 없음', 'letters.html?kind=gratitude'],
    ['🕊️ 작별인사', f ? `${f}통` : '아직 없음', 'letters.html?kind=farewell'],
    ['🎁 물건 정리', belongings.data?.length ? `${belongings.data.length}개 담음 · ${bDone}개 정리 완료` : '아직 없음', 'belongings.html'],
    ['🐾 반려동물 플랜', pets.data?.length ? pets.data.map(p => p.pet_name).join(', ') : '아직 없음', 'pet.html'],
    ['🕯️ 남긴 이야기', posts.data?.length ? `${posts.data.length}편` : '아직 없음', 'community.html'],
  ];

  document.getElementById('summary').innerHTML = rows.map(([t, v, href]) => `
    <a class="item-row" href="./${href}" style="color:inherit;">
      <span class="grow"><span class="title">${t}</span></span>
      <span class="meta">${v}</span>
      <span style="color:var(--ink-faint);">›</span>
    </a>`).join('');

  document.getElementById('logout-btn').onclick = signOut;

  // 반려동물 여부 — 온보딩 답을 언제든 바꿀 수 있게
  const petToggle = document.getElementById('pet-toggle');
  petToggle.checked = !!profile.has_pet;
  petToggle.onchange = async () => {
    await supabase.from('mutda_profiles')
      .update({ has_pet: petToggle.checked }).eq('user_id', user.id);
  };
</script>
</body>
</html>
