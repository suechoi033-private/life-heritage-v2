<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가입하기 — 묻다</title>
  <link rel="stylesheet" href="./css/mutda.css" />
</head>
<body>
<main>
  <div class="auth-wrap">
    <div class="brand">묻다</div>
    <p class="brand-sub">삶에게 묻고, 마음을 남기다</p>

    <form id="signup-form" novalidate>
      <div class="field">
        <label for="name">이름</label>
        <input id="name" type="text" autocomplete="name" placeholder="어떻게 불러드릴까요?" required />
      </div>
      <div class="field">
        <label for="email">이메일</label>
        <input id="email" type="email" autocomplete="email" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label for="password">비밀번호</label>
        <input id="password" type="password" autocomplete="new-password" placeholder="6자 이상" minlength="6" required />
      </div>
      <p class="form-error" id="err"></p>
      <button class="btn" type="submit" id="submit-btn">가입하고 시작하기</button>
    </form>

    <p class="center small muted" style="margin-top:18px;">
      이미 계정이 있나요? <a href="./login.html"><b>로그인</b></a>
    </p>
  </div>
</main>

<script type="module">
  import { signUp, signIn, redirectIfAuthed, friendlyError, logEvent } from './js/app.js';
  import { captureReferral } from './js/referral.js';

  captureReferral(); // ?ref= 유입 태그 캡처(첫 진입이 signup인 경우 대비)

  redirectIfAuthed('home.html');
  logEvent('signup_view');

  const form = document.getElementById('signup-form');
  const err = document.getElementById('err');
  const btn = document.getElementById('submit-btn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.textContent = '';
    btn.disabled = true; btn.textContent = '가입 중…';

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const { data, error } = await signUp(email, password, name);
    if (error) {
      err.textContent = friendlyError(error);
      btn.disabled = false; btn.textContent = '가입하고 시작하기';
      return;
    }
    logEvent('signup_done');
    sessionStorage.setItem('mutda:signup_name', name);
    // 보호자 초대를 수락하러 온 경우 → 초대 화면으로 복귀
    const guardianPending = !!localStorage.getItem('mutda:guardian_code');
    const nextPage = guardianPending ? './guardian.html' : './onboarding.html';

    if (data?.session) { location.href = nextPage; return; }

    // 세션이 없는 경우 = ① 방금 만든 계정(자동 확인 처리됨) ② 이미 가입된 이메일.
    // 어느 쪽이든 바로 로그인을 시도해 가른다 — 인증 메일을 기다리게 하지 않는다.
    const { error: loginErr } = await signIn(email, password);
    if (!loginErr) { location.href = nextPage; return; }

    if ((loginErr.message || '').includes('Invalid login credentials')) {
      err.innerHTML = '이미 가입된 이메일이에요. (잇다 계정도 그대로 쓸 수 있어요)<br/>'
        + '<a href="./login.html"><b>이 이메일로 로그인하기</b></a>';
    } else {
      err.textContent = friendlyError(loginErr);
    }
    btn.disabled = false; btn.textContent = '가입하고 시작하기';
  });
</script>
</body>
</html>
