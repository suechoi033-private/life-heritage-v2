<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>커뮤니티 · 잇다</title>
  <meta name="description" content="콘텐츠·커뮤니티·추모">
  <link rel="stylesheet" href="./auth-styles.css">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <meta name="theme-color" content="#2F6B4F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="잇다">
  <style>
    .forest-segment { margin-bottom: 14px; }
    .forest-chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 0 12px;
      margin: 0 -4px 16px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .forest-chips::-webkit-scrollbar { display: none; }
    .forest-chip {
      flex-shrink: 0;
      padding: 7px 14px;
      border-radius: 999px;
      background: var(--bg-alt);
      border: 1px solid var(--line);
      font-size: 12.5px;
      font-weight: 700;
      color: var(--ink-soft);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .forest-chip.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .content-card {
      display: block;
      background: var(--bg-alt);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 12px;
      cursor: pointer;
      text-decoration: none;
      color: var(--ink);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .content-card:hover { border-color: var(--primary-soft); box-shadow: 0 4px 16px rgba(47,107,79,0.08); }
    .content-card-badge {
      display: inline-block;
      font-size: 10.5px;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 999px;
      letter-spacing: 0.04em;
      margin-right: 6px;
    }
    .badge-official { background: var(--primary-soft); color: var(--primary); }
    .badge-user     { background: var(--warm-soft); color: var(--warm); }
    .content-card-title {
      font-family: var(--font-serif);
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.01em;
      line-height: 1.45;
      margin: 8px 0 6px;
    }
    .content-card-meta { font-size: 12px; color: var(--ink-muted); display: flex; flex-wrap: wrap; align-items: center; gap: 6px 10px; }
    .content-card-author { font-weight: 800; color: var(--ink-soft); }

    /* 오늘의 성찰 질문 카드 (보라 강조 — 답변카드 시각 구분) */
    .question-card {
      display: block;
      background: linear-gradient(135deg, #9A6BB8, #B58FCB);
      color: #fff;
      border-radius: var(--radius);
      padding: 20px 22px;
      margin-bottom: 14px;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.05s;
    }
    .question-card:hover  { opacity: 0.94; color: #fff; }
    .question-card:active { transform: scale(0.995); }
    .question-card-eyebrow {
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: 0.06em;
      opacity: 0.9;
      margin-bottom: 6px;
    }
    .question-card-text {
      font-family: var(--font-serif);
      font-size: 17px;
      font-weight: 700;
      line-height: 1.55;
      margin-bottom: 12px;
    }
    .question-card-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12.5px;
      font-weight: 700;
      background: rgba(255,255,255,0.2);
      border-radius: 999px;
      padding: 6px 12px;
    }
    .question-card-preview {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.2);
      font-size: 12.5px;
      opacity: 0.95;
      line-height: 1.55;
    }
    .question-card-preview-name {
      font-weight: 800;
      margin-right: 4px;
    }
    /* 내 마지막 한 곡 진입 카드 */
    .my-song-cta {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 14px;
      margin: 6px 0 14px;
      background: var(--warm-soft);
      border: 1px solid var(--line);
      border-radius: 14px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, transform 0.1s;
    }
    .my-song-cta:hover { border-color: var(--warm); }
    .my-song-cta:active { transform: scale(0.99); }
    .my-song-cta.has-song { background: #fff; }
    .msc-mark {
      width: 38px; height: 38px; border-radius: 999px;
      background: var(--warm); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; flex-shrink: 0;
    }
    .my-song-cta.has-song .msc-mark { background: var(--primary); }
    .msc-body { min-width: 0; flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .msc-title { font-size: 14px; font-weight: 800; color: var(--ink); line-height: 1.35; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .msc-sub { font-size: 11.5px; color: var(--ink-muted); line-height: 1.5; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .msc-arrow { color: var(--ink-faint); font-size: 18px; flex-shrink: 0; }
  </style>
</head>
<body>

<main class="page-shell" id="main-content">
  <div class="tab-segment forest-segment" role="tablist">
    <button type="button" id="seg-content"   class="active" role="tab">콘텐츠</button>
    <button type="button" id="seg-community" role="tab">커뮤니티</button>
  </div>

  <div class="forest-chips" id="forest-chips"></div>

  <!-- 내 마지막 한 곡 진입 (저장 여부에 따라 카피·내용 다름) -->
  <a id="my-song-cta" class="my-song-cta" href="./my-song.html" hidden>
    <span class="msc-mark">♬</span>
    <span class="msc-body">
      <span class="msc-title" id="msc-title">내 마지막 한 곡 골라두기</span>
      <span class="msc-sub" id="msc-sub">'내 장례식에 흐를 한 곡' — 죽음 준비가 아니라, 가장 사랑한 것에 대한 답</span>
    </span>
    <span class="msc-arrow">›</span>
  </a>

  <div id="forest-body">
    <div class="empty-state">
      <div class="empty-icon">🌳</div>
      <div class="empty-title">커뮤니티를 준비 중</div>
      <div class="empty-desc">콘텐츠와 대화가 곧 채워집니다.<br>첫 콘텐츠를 함께 올려보세요.</div>
    </div>
  </div>
</main>

<button class="fab-forest" id="fab-forest" aria-label="새 글">＋</button>

<!-- 형식 선택 시트 (콘텐츠 작성 진입점) -->
<div class="fmt-scrim" id="fmt-scrim" hidden>
  <div class="fmt-sheet" id="fmt-sheet" role="dialog" aria-label="글 형식 선택">
    <div class="fmt-grip"></div>
    <div class="fmt-sheet-title">어떤 글을 남겨볼까요?</div>
    <div class="fmt-sheet-sub">형식을 먼저 골라주세요. 나중에 바꿀 수 있어요.</div>
    <button type="button" class="fmt-opt" data-fmt="article">
      <span class="fmt-opt-ic">📄</span>
      <span><span class="fmt-opt-t">일반 글</span><span class="fmt-opt-d">정보·가이드·생각을 자유롭게 나눠요</span></span>
    </button>
    <button type="button" class="fmt-opt story" data-fmt="story">
      <span class="fmt-opt-ic">📖</span>
      <span><span class="fmt-opt-t">이야기</span><span class="fmt-opt-d">한 단계를 지나온 나의 여정. 표지·체크리스트·도구를 더해 다음 사람에게 길이 됩니다.</span></span>
    </button>
  </div>
</div>
<style>
  .fab-forest {
    position: fixed; right: 20px;
    bottom: calc(72px + env(safe-area-inset-bottom, 0px));
    z-index: 90;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--primary); color: #fff;
    border: none; font-size: 24px;
    box-shadow: 0 4px 16px rgba(47,107,79,0.4);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .fab-forest:hover { background: var(--primary-hover); }
  .fab-forest:active { transform: scale(0.95); }

  /* 형식 선택 시트 */
  .fmt-scrim {
    position: fixed; inset: 0; z-index: 120;
    background: rgba(0,0,0,0.4);
    display: flex; align-items: flex-end; justify-content: center;
  }
  .fmt-scrim[hidden] { display: none; }
  .fmt-sheet {
    width: 100%; max-width: 480px;
    background: #fff;
    border-radius: 22px 22px 0 0;
    padding: 14px 20px calc(26px + env(safe-area-inset-bottom, 0px));
    animation: fmt-up 0.22s ease;
  }
  @keyframes fmt-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .fmt-grip { width: 40px; height: 4px; background: var(--line); border-radius: 99px; margin: 0 auto 18px; }
  .fmt-sheet-title { font-size: 17px; font-weight: 800; color: var(--ink); margin-bottom: 4px; }
  .fmt-sheet-sub { font-size: 13px; color: var(--ink-muted); margin-bottom: 18px; }
  .fmt-opt {
    display: flex; gap: 14px; align-items: flex-start; width: 100%; text-align: left;
    padding: 16px; border: 1.5px solid var(--line); border-radius: 16px;
    margin-bottom: 12px; background: #fff; cursor: pointer; font-family: inherit;
  }
  .fmt-opt.story { border-color: var(--primary); background: var(--primary-soft); }
  .fmt-opt:active { transform: scale(0.99); }
  .fmt-opt-ic { font-size: 28px; line-height: 1; flex-shrink: 0; }
  .fmt-opt-t { display: block; font-size: 15.5px; font-weight: 800; color: var(--ink); }
  .fmt-opt-d { display: block; font-size: 12.5px; color: var(--ink-soft); margin-top: 4px; line-height: 1.5; }
</style>

<script type="module">
  import { supabase } from './auth.js';
  import { renderNav } from './nav.js';
  import { registerPWA } from './js/pwa.js';
  import { getTodaysQuestion, hasAnsweredToday, previewAnswers } from './js/answers.js';
  import { getMyFinalSong } from './js/spotify.js';

  await renderNav({ active: 'forest', infoIcon: false, title: '커뮤니티' });
  registerPWA();

  // 내 마지막 한 곡 진입 카드 — 저장 여부에 따라 카피 변경
  (async () => {
    try {
      const song = await getMyFinalSong();
      const cta = document.getElementById('my-song-cta');
      if (!cta) return;
      const title = document.getElementById('msc-title');
      const sub = document.getElementById('msc-sub');
      if (song) {
        cta.classList.add('has-song');
        title.textContent = `♬ ${song.name}`;
        sub.textContent = `${song.artists} · 내가 골라둔 한 곡 (바꾸기 →)`;
      } else {
        title.textContent = '내 마지막 한 곡 골라두기';
        sub.textContent = "'내 장례식에 흐를 한 곡' — 가장 사랑한 것에 대한 응답";
      }
      cta.hidden = false;
    } catch (_) { /* 로그인 안 됐거나 실패 시 그냥 숨김 유지 */ }
  })();

  const CATEGORIES = [
    { key: 'all',        label: '전체' },
    { key: 'reflection', label: '오늘 잇고' },
    { key: 'family',     label: '가족 케어링' },
    { key: 'health',     label: '건강' },
    { key: 'finance',    label: '재정' },
    { key: 'death_prep', label: '죽음 준비' },
  ];

  const params = new URLSearchParams(location.search);
  let activeSeg = params.get('seg') === 'community' ? 'community' : 'content';
  let activeCat = params.get('category') || 'all';

  // 카테고리 칩 렌더
  const chipsEl = document.getElementById('forest-chips');
  chipsEl.innerHTML = CATEGORIES.map(c =>
    `<button class="forest-chip ${c.key === activeCat ? 'active' : ''}" data-cat="${c.key}">${c.label}</button>`
  ).join('');
  chipsEl.addEventListener('click', (e) => {
    const btn = e.target.closest('.forest-chip');
    if (!btn) return;
    activeCat = btn.dataset.cat;
    chipsEl.querySelectorAll('.forest-chip').forEach(b => b.classList.toggle('active', b.dataset.cat === activeCat));
    loadFeed();
  });

  document.getElementById('seg-content').addEventListener('click',   () => switchSeg('content'));
  document.getElementById('seg-community').addEventListener('click', () => switchSeg('community'));

  function switchSeg(seg) {
    activeSeg = seg;
    document.getElementById('seg-content').classList.toggle('active',   seg === 'content');
    document.getElementById('seg-community').classList.toggle('active', seg === 'community');
    loadFeed();
  }

  // FAB 분기
  document.getElementById('fab-forest').addEventListener('click', () => {
    if (activeSeg === 'community') {
      window.location.href = './post-write.html';
    } else {
      openFmtSheet();
    }
  });

  // 형식 선택 시트
  const fmtScrim = document.getElementById('fmt-scrim');
  function openFmtSheet() { fmtScrim.hidden = false; }
  function closeFmtSheet() { fmtScrim.hidden = true; }
  fmtScrim.addEventListener('click', (e) => { if (e.target === fmtScrim) closeFmtSheet(); });
  fmtScrim.querySelectorAll('.fmt-opt').forEach((btn) => {
    btn.addEventListener('click', () => {
      const params = [];
      if (btn.dataset.fmt === 'story') params.push('format=story');
      if (activeCat !== 'all') params.push(`category=${activeCat}`);
      window.location.href = `./content-write.html${params.length ? '?' + params.join('&') : ''}`;
    });
  });

  async function loadFeed() {
    const body = document.getElementById('forest-body');
    body.innerHTML = `<div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-desc">불러오는 중...</div></div>`;

    try {
      // 오늘의 성찰 질문 카드 (콘텐츠 세그먼트 + 전체/오늘의성찰 카테고리)
      let topHtml = '';
      if (activeSeg === 'content' && (activeCat === 'all' || activeCat === 'reflection')) {
        topHtml = await buildTodaysQuestionCard();
      }

      if (activeSeg === 'content') {
        let q = supabase.from('contents')
          .select('id, category, title, body, format, author_type, creator_id, view_count, like_count, created_at, profiles:creator_id(name, avatar_url)')
          .eq('is_published', true)
          .order('created_at', { ascending: false })
          .limit(20);
        if (activeCat !== 'all') q = q.eq('category', activeCat);
        else q = q.neq('category', 'memorial'); // 추모 보류·숨김 — 전체 피드에서 제외
        const { data, error } = await q;
        if (error) throw error;
        renderContentList(data || [], topHtml);
      } else {
        const { data, error } = await supabase.from('community_posts')
          .select('id, board_id, title, body, view_count, comment_count, reaction_count, created_at')
          .eq('is_deleted', false)
          .order('created_at', { ascending: false })
          .limit(20);
        if (error) throw error;
        renderPostList(data || []);
      }
    } catch (err) {
      body.innerHTML = `<div class="empty-state"><div class="empty-icon">🌱</div><div class="empty-title">아직 비어있어요</div><div class="empty-desc">${err.message || '곧 채워질 예정입니다'}</div></div>`;
    }
  }

  async function buildTodaysQuestionCard() {
    try {
      const q = await getTodaysQuestion();
      if (!q) return '';
      const [mine, others] = await Promise.all([
        hasAnsweredToday(q.id),
        previewAnswers(q.id, 2),
      ]);
      const statusHtml = mine
        ? `<span class="question-card-status">✓ 오늘 답변 완료</span>`
        : `<span class="question-card-status">✏ 답변 남기기 →</span>`;
      const previewHtml = others.length ? `
        <div class="question-card-preview">
          ${others.map((a) => `
            <div>
              <span class="question-card-preview-name">${escapeHtml(a.profiles?.name || '익명')}</span>
              ${escapeHtml((a.content || '').replace(/\s+/g, ' ').slice(0, 70))}
            </div>
          `).join('')}
        </div>
      ` : '';
      return `
        <a class="question-card" href="./ask.html">
          <div class="question-card-eyebrow">🕯 오늘 잇고</div>
          <div class="question-card-text">${escapeHtml(q.question_text)}</div>
          ${statusHtml}
          ${previewHtml}
        </a>
      `;
    } catch (_) {
      return '';
    }
  }

  function renderContentList(items, topHtml = '') {
    const body = document.getElementById('forest-body');
    if (!items.length && !topHtml) {
      body.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🌱</div>
          <div class="empty-title">아직 심긴 콘텐츠가 없어요</div>
          <div class="empty-desc">＋ 버튼으로 첫 콘텐츠를 함께 심어볼까요?</div>
        </div>`;
      return;
    }
    body.innerHTML = topHtml + items.map(c => `
      <a class="content-card" href="./content-detail.html?id=${c.id}">
        ${c.format === 'story' ? `<span class="content-card-badge badge-official">📖 이야기</span>` : ''}
        ${c.author_type === 'official'
          ? `<span class="content-card-badge badge-official">✓ 잇다 에디터</span>`
          : `<span class="content-card-badge badge-user">먼저 겪은 분의 기록</span>`}
        <span style="font-size:11px;color:var(--ink-muted);font-weight:700;">${labelFor(c.category)}</span>
        <div class="content-card-title">${escapeHtml(c.title)}</div>
        <div class="content-card-meta">
          ${c.profiles?.name ? `<span class="content-card-author">${escapeHtml(c.profiles.name)}</span>` : ''}
          <span>조회 ${c.view_count ?? 0}</span>
          <span>${formatDate(c.created_at)}</span>
        </div>
      </a>
    `).join('');
  }

  function renderPostList(items) {
    const body = document.getElementById('forest-body');
    if (!items.length) {
      body.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">💬</div>
          <div class="empty-title">첫 대화를 시작해 보세요</div>
          <div class="empty-desc">＋ 버튼으로 게시글을 작성할 수 있어요.</div>
        </div>`;
      return;
    }
    body.innerHTML = items.map(p => `
      <a class="content-card" href="./post-detail.html?id=${p.id}">
        <div class="content-card-title">${escapeHtml(p.title)}</div>
        <div class="content-card-meta">
          <span>💬 ${p.comment_count ?? 0}</span>
          <span>${formatDate(p.created_at)}</span>
        </div>
      </a>
    `).join('');
  }

  function labelFor(cat) {
    return CATEGORIES.find(c => c.key === cat)?.label || cat;
  }
  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }
  function formatDate(d) {
    if (!d) return '';
    const date = new Date(d);
    const today = new Date();
    const diff = Math.floor((today - date) / (1000 * 60 * 60 * 24));
    if (diff === 0) return '오늘';
    if (diff < 7) return `${diff}일 전`;
    return date.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
  }

  loadFeed();
</script>

</body>
</html>
