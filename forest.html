<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>커뮤니티 · 잇다</title>
  <meta name="description" content="콘텐츠·커뮤니티·추모">
  <link rel="stylesheet" href="./auth-styles.css">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <meta name="theme-color" content="#2F6B4F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="잇다">
  <style>
    .forest-segment { margin-bottom: 14px; }
    .forest-chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 0 12px;
      margin: 0 -4px 16px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .forest-chips::-webkit-scrollbar { display: none; }
    .forest-chip.is-soon { opacity: 0.45; cursor: not-allowed; }
    .forest-chip.is-soon:hover { background: inherit; }
    .forest-chip {
      flex-shrink: 0;
      padding: 7px 14px;
      border-radius: 999px;
      background: var(--bg-alt);
      border: 1px solid var(--line);
      font-size: 12.5px;
      font-weight: 700;
      color: var(--ink-soft);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .forest-chip.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .content-card {
      display: block;
      background: var(--bg-alt);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 12px;
      cursor: pointer;
      text-decoration: none;
      color: var(--ink);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .content-card:hover { border-color: var(--primary-soft); box-shadow: 0 4px 16px rgba(47,107,79,0.08); }
    .content-card-badge {
      display: inline-block;
      font-size: 10.5px;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 999px;
      letter-spacing: 0.04em;
      margin-right: 6px;
    }
    .badge-official { background: var(--primary-soft); color: var(--primary); }
    .badge-user     { background: var(--warm-soft); color: var(--warm); }
    .content-card-title {
      font-family: var(--font-serif);
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.01em;
      line-height: 1.45;
      margin: 8px 0 6px;
    }
    .content-card-meta { font-size: 12px; color: var(--ink-muted); display: flex; flex-wrap: wrap; align-items: center; gap: 6px 10px; }
    .content-card-author { font-weight: 800; color: var(--ink-soft); }

    /* 오늘의 성찰 질문 카드 (보라 강조 — 답변카드 시각 구분) */
    .question-card {
      display: block;
      background: linear-gradient(135deg, #9A6BB8, #B58FCB);
      color: #fff;
      border-radius: var(--radius);
      padding: 20px 22px;
      margin-bottom: 14px;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.05s;
    }
    .question-card:hover  { opacity: 0.94; color: #fff; }
    .question-card:active { transform: scale(0.995); }
    .question-card-eyebrow {
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: 0.06em;
      opacity: 0.9;
      margin-bottom: 6px;
    }
    .question-card-text {
      font-family: var(--font-serif);
      font-size: 17px;
      font-weight: 700;
      line-height: 1.55;
      margin-bottom: 12px;
    }
    .question-card-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12.5px;
      font-weight: 700;
      background: rgba(255,255,255,0.2);
      border-radius: 999px;
      padding: 6px 12px;
    }
    .question-card-preview {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.2);
      font-size: 12.5px;
      opacity: 0.95;
      line-height: 1.55;
    }
    .question-card-preview-name {
      font-weight: 800;
      margin-right: 4px;
    }
    /* entice peek — 답 안 한 사용자에게 다른 답을 흐리게 보여줘 작성 욕구 자극 */
    .question-card-preview .qc-blur {
      filter: blur(4px);
      opacity: 0.55;
      user-select: none;
    }
    .question-card-preview .qc-entice {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed rgba(255,255,255,0.3);
      font-size: 11.5px;
      font-style: italic;
      opacity: 0.92;
    }
    /* 오늘 잇다가 고른 글 — 큐레이션 hero */
    .curation-hero {
      display: block;
      background: linear-gradient(135deg, #FAF6EE, #F2EBDD);
      border: 1px solid var(--warm-soft);
      border-radius: 18px;
      padding: 18px 18px 16px;
      margin: 6px 0 18px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, transform 0.1s;
    }
    .curation-hero:hover  { border-color: var(--warm); }
    .curation-hero:active { transform: scale(0.995); }
    .curation-hero-eyebrow {
      display: block;
      font-size: 11px; font-weight: 800; letter-spacing: 0.08em;
      color: var(--warm); margin-bottom: 8px;
    }
    .curation-hero-title {
      display: block;
      font-family: var(--font-serif);
      font-size: 19px; font-weight: 800;
      line-height: 1.45;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .curation-hero-snippet {
      display: block;
      font-size: 13px; line-height: 1.7; color: var(--ink-soft);
      margin-bottom: 10px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .curation-hero-cta {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 800; color: var(--warm);
    }

    /* 게시판 (잇다 에디터 지난 글) */
    .board {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 4px 14px;
      margin: 6px 0 4px;
    }
    .board-head {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 12px 0 10px;
      border-bottom: 1px solid var(--line);
    }
    .board-head-title { font-size: 13px; font-weight: 800; color: var(--ink); }
    .board-head-count { font-size: 11.5px; color: var(--ink-muted); font-weight: 700; }
    .board-row {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 0;
      border-bottom: 1px solid var(--line);
      text-decoration: none; color: inherit;
    }
    .board-row:last-child { border-bottom: none; }
    .board-row:active { background: var(--bg-alt); }
    .board-cat {
      flex-shrink: 0;
      padding: 2px 8px; border-radius: 999px;
      background: var(--primary-soft); color: var(--primary);
      font-size: 10.5px; font-weight: 800; letter-spacing: 0.02em;
    }
    .board-title {
      flex: 1; min-width: 0;
      font-size: 14px; font-weight: 700; color: var(--ink);
      line-height: 1.5;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .board-row:hover .board-title { color: var(--primary); }
    .board-date {
      flex-shrink: 0;
      font-size: 11.5px; color: var(--ink-muted); font-weight: 700;
    }

    /* 페이지네이션 */
    .pagination {
      display: flex; justify-content: center; gap: 4px;
      margin: 16px 0 8px;
      flex-wrap: wrap;
    }
    .page-num {
      min-width: 32px; height: 32px; padding: 0 8px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      font-size: 13px; font-weight: 700;
      color: var(--ink-soft);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .page-num:hover:not(.active) { border-color: var(--primary-soft); }
    .page-num.active {
      background: var(--primary); color: #fff; border-color: var(--primary);
    }
    .page-arrow { font-size: 15px; }
  </style>
</head>
<body>

<main class="page-shell" id="main-content">
  <div class="tab-segment forest-segment" role="tablist">
    <button type="button" id="seg-content"   class="active" role="tab">콘텐츠</button>
    <button type="button" id="seg-community" role="tab">커뮤니티</button>
  </div>

  <div class="forest-chips" id="forest-chips"></div>

  <!-- 오늘 잇다가 고른 글 (큐레이션 hero — 7일 회전) -->
  <a id="curation-hero" class="curation-hero" href="#" hidden>
    <span class="curation-hero-eyebrow">🌿 오늘 잇다가 고른 글</span>
    <span class="curation-hero-title" id="curation-hero-title"></span>
    <span class="curation-hero-snippet" id="curation-hero-snippet"></span>
    <span class="curation-hero-cta">읽어보기 ›</span>
  </a>

  <div id="forest-body">
    <div class="empty-state">
      <div class="empty-icon">🌳</div>
      <div class="empty-title">커뮤니티를 준비 중</div>
      <div class="empty-desc">콘텐츠와 대화가 곧 채워집니다.<br>첫 콘텐츠를 함께 올려보세요.</div>
    </div>
  </div>
</main>

<button class="fab-forest" id="fab-forest" aria-label="새 글">＋</button>

<!-- 형식 선택 시트 (콘텐츠 작성 진입점) -->
<div class="fmt-scrim" id="fmt-scrim" hidden>
  <div class="fmt-sheet" id="fmt-sheet" role="dialog" aria-label="글 형식 선택">
    <div class="fmt-grip"></div>
    <div class="fmt-sheet-title">어떤 글을 남겨볼까요?</div>
    <div class="fmt-sheet-sub">형식을 먼저 골라주세요. 나중에 바꿀 수 있어요.</div>
    <button type="button" class="fmt-opt" data-fmt="article">
      <span class="fmt-opt-ic">📄</span>
      <span><span class="fmt-opt-t">일반 글</span><span class="fmt-opt-d">정보·가이드·생각을 자유롭게 나눠요</span></span>
    </button>
    <button type="button" class="fmt-opt story" data-fmt="story">
      <span class="fmt-opt-ic">📖</span>
      <span><span class="fmt-opt-t">이야기</span><span class="fmt-opt-d">한 단계를 지나온 나의 여정. 표지·체크리스트·도구를 더해 다음 사람에게 길이 됩니다.</span></span>
    </button>
  </div>
</div>
<style>
  .fab-forest {
    position: fixed; right: 20px;
    bottom: calc(72px + env(safe-area-inset-bottom, 0px));
    z-index: 90;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--primary); color: #fff;
    border: none; font-size: 24px;
    box-shadow: 0 4px 16px rgba(47,107,79,0.4);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .fab-forest:hover { background: var(--primary-hover); }
  .fab-forest:active { transform: scale(0.95); }

  /* 형식 선택 시트 */
  .fmt-scrim {
    position: fixed; inset: 0; z-index: 120;
    background: rgba(0,0,0,0.4);
    display: flex; align-items: flex-end; justify-content: center;
  }
  .fmt-scrim[hidden] { display: none; }
  .fmt-sheet {
    width: 100%; max-width: 480px;
    background: #fff;
    border-radius: 22px 22px 0 0;
    padding: 14px 20px calc(26px + env(safe-area-inset-bottom, 0px));
    animation: fmt-up 0.22s ease;
  }
  @keyframes fmt-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .fmt-grip { width: 40px; height: 4px; background: var(--line); border-radius: 99px; margin: 0 auto 18px; }
  .fmt-sheet-title { font-size: 17px; font-weight: 800; color: var(--ink); margin-bottom: 4px; }
  .fmt-sheet-sub { font-size: 13px; color: var(--ink-muted); margin-bottom: 18px; }
  .fmt-opt {
    display: flex; gap: 14px; align-items: flex-start; width: 100%; text-align: left;
    padding: 16px; border: 1.5px solid var(--line); border-radius: 16px;
    margin-bottom: 12px; background: #fff; cursor: pointer; font-family: inherit;
  }
  .fmt-opt.story { border-color: var(--primary); background: var(--primary-soft); }
  .fmt-opt:active { transform: scale(0.99); }
  .fmt-opt-ic { font-size: 28px; line-height: 1; flex-shrink: 0; }
  .fmt-opt-t { display: block; font-size: 15.5px; font-weight: 800; color: var(--ink); }
  .fmt-opt-d { display: block; font-size: 12.5px; color: var(--ink-soft); margin-top: 4px; line-height: 1.5; }
</style>

<script type="module">
  import { supabase } from './auth.js';
  import { renderNav } from './nav.js';
  import { registerPWA } from './js/pwa.js';
  import { getTodaysQuestion, hasAnsweredToday, previewAnswers } from './js/answers.js';

  // 1) 내비 — 실패해도 본문 로직은 계속 진행
  try { await renderNav({ active: 'forest', infoIcon: false, title: '커뮤니티' }); }
  catch (e) { console.warn('[forest] nav 실패, 본문 계속', e); }
  try { registerPWA(); } catch (_) {}

  // 새 서비스워커가 대기 중이면 즉시 적용 + 활성화되면 한 번만 자동 reload
  // (PWA가 옛 HTML을 잡고 있는 상황을 강제로 풀어준다)
  if ('serviceWorker' in navigator) {
    let reloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (reloaded) return;
      reloaded = true;
      window.location.reload();
    });
    navigator.serviceWorker.getRegistration().then((reg) => {
      if (!reg) return;
      if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        nw?.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) {
            nw.postMessage({ type: 'SKIP_WAITING' });
          }
        });
      });
      // 최신 SW가 올라왔는지 능동 확인
      reg.update().catch(() => {});
    }).catch(() => {});
  }

  // 오늘 잇다가 고른 글 — 7일 회전. 베타 시작일 2026-06-03 기준.
  // SQL 미적용(=hero_day 컬럼 없음) 또는 시드 없음 → 조용히 숨김 유지.
  (async () => {
    const hero = document.getElementById('curation-hero');
    if (!hero) return;
    try {
      const HERO_LAUNCH_MS = Date.UTC(2026, 5, 3, -9, 0, 0); // KST 6/3 00:00
      const dayDiff = Math.floor((Date.now() - HERO_LAUNCH_MS) / 86400000);
      const heroDay = (((dayDiff % 7) + 7) % 7) + 1; // 1..7
      const { data, error } = await supabase
        .from('contents')
        .select('id, title, body')
        .eq('hero_day', heroDay)
        .eq('is_published', true)
        .maybeSingle();
      if (error || !data) return;
      const snippet = (data.body || '')
        .replace(/[#*>_`\[\]]/g, '')
        .replace(/\s+/g, ' ')
        .trim()
        .slice(0, 140);
      const titleEl   = document.getElementById('curation-hero-title');
      const snipEl    = document.getElementById('curation-hero-snippet');
      if (titleEl) titleEl.textContent = data.title || '';
      if (snipEl)  snipEl.textContent  = snippet + '…';
      hero.href = `./content-detail.html?id=${data.id}`;
      hero.hidden = false;
    } catch (e) {
      console.warn('[forest] hero 로드 실패, 숨김 유지', e);
    }
  })();

  // 베타 한정: reflection 1종만 활성. '곧 · ___' placeholder 칩은 사장님 요청으로 제거.
  const CATEGORIES = [
    { key: 'all',        label: '전체' },
    { key: 'reflection', label: '오늘 잇고' },
  ];

  const params = new URLSearchParams(location.search);
  let activeSeg = params.get('seg') === 'community' ? 'community' : 'content';
  let activeCat = params.get('category') || 'all';
  let currentPage = Math.max(1, parseInt(params.get('page') || '1', 10));

  // 초기 탭 상태 동기화
  if (activeSeg === 'community') {
    document.getElementById('seg-content')?.classList.remove('active');
    document.getElementById('seg-community')?.classList.add('active');
    const chipsContainer = document.getElementById('forest-chips');
    if (chipsContainer) chipsContainer.hidden = true;
  }

  // 베타 시작 2026-06-03 KST 00:00.
  // 첫날 3편 → 매일 1편씩 unlock. 한 페이지 3편씩 페이지네이션.
  const PER_PAGE = 10;
  const BETA_LAUNCH_MS = Date.UTC(2026, 5, 2, 15, 0, 0); // KST 6/3 00:00 (UTC -9h)
  function getUnlockedCount() {
    const days = Math.floor((Date.now() - BETA_LAUNCH_MS) / 86400000);
    return Math.max(6, 6 + days); // baseline 6편, +1/day
  }

  // 카테고리 칩 렌더 (null guard — chips 컨테이너 없어도 본문은 계속)
  const chipsEl = document.getElementById('forest-chips');
  if (chipsEl) {
    chipsEl.innerHTML =
      CATEGORIES.map(c =>
        `<button class="forest-chip ${c.key === activeCat ? 'active' : ''}" data-cat="${c.key}">${c.label}</button>`
      ).join('');
    chipsEl.addEventListener('click', (e) => {
      const btn = e.target.closest('button.forest-chip');
      if (!btn) return;
      if (btn.getAttribute('aria-disabled') === 'true') return; // 베타: 준비 중 보드는 클릭 무시
      activeCat = btn.dataset.cat;
      currentPage = 1;
      chipsEl.querySelectorAll('button.forest-chip').forEach(b => b.classList.toggle('active', b.dataset.cat === activeCat));
      loadFeed();
    });
  }

  document.getElementById('seg-content')?.addEventListener('click',   () => switchSeg('content'));
  document.getElementById('seg-community')?.addEventListener('click', () => switchSeg('community'));

  function switchSeg(seg) {
    activeSeg = seg;
    currentPage = 1;
    document.getElementById('seg-content')?.classList.toggle('active',   seg === 'content');
    document.getElementById('seg-community')?.classList.toggle('active', seg === 'community');
    // 콘텐츠 탭 전용 UI 숨김
    const chipsContainer = document.getElementById('forest-chips');
    const hero = document.getElementById('curation-hero');
    if (chipsContainer) chipsContainer.hidden = (seg !== 'content');
    if (hero && seg !== 'content') hero.hidden = true;
    loadFeed();
  }

  // FAB 분기
  document.getElementById('fab-forest')?.addEventListener('click', () => {
    if (activeSeg === 'community') {
      window.location.href = './post-write.html';
    } else {
      openFmtSheet();
    }
  });

  // 형식 선택 시트
  const fmtScrim = document.getElementById('fmt-scrim');
  function openFmtSheet() { fmtScrim.hidden = false; }
  function closeFmtSheet() { fmtScrim.hidden = true; }
  fmtScrim.addEventListener('click', (e) => { if (e.target === fmtScrim) closeFmtSheet(); });
  fmtScrim.querySelectorAll('.fmt-opt').forEach((btn) => {
    btn.addEventListener('click', () => {
      const params = [];
      if (btn.dataset.fmt === 'story') params.push('format=story');
      if (activeCat !== 'all') params.push(`category=${activeCat}`);
      window.location.href = `./content-write.html${params.length ? '?' + params.join('&') : ''}`;
    });
  });

  async function loadFeed() {
    const body = document.getElementById('forest-body');
    if (!body) return;
    body.innerHTML = `<div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-desc">불러오는 중...</div></div>`;

    try {
      // 오늘의 성찰 질문 카드 (콘텐츠 세그먼트 + 전체/오늘의성찰 카테고리)
      let topHtml = '';
      if (activeSeg === 'content' && (activeCat === 'all' || activeCat === 'reflection')) {
        topHtml = await buildTodaysQuestionCard();
      }

      if (activeSeg === 'content') {
        const unlocked = getUnlockedCount();
        const offset = (currentPage - 1) * PER_PAGE;
        const end    = Math.min(offset + PER_PAGE, unlocked) - 1;
        let q = supabase.from('contents')
          .select('id, category, title, body, format, author_type, creator_id, view_count, like_count, created_at, profiles:creator_id(name, avatar_url)')
          .eq('is_published', true)
          .order('created_at', { ascending: false });
        if (activeCat !== 'all') q = q.eq('category', activeCat);
        else q = q.neq('category', 'memorial');
        if (end >= offset) q = q.range(offset, end);
        else q = q.range(0, -1); // 빈 결과
        const { data, error } = await q;
        if (error) throw error;
        const totalPages = Math.max(1, Math.ceil(unlocked / PER_PAGE));
        renderContentList(data || [], topHtml, { page: currentPage, totalPages, totalUnlocked: unlocked });
      } else {
        const { data, error } = await supabase.from('community_posts')
          .select('id, board_id, title, body, view_count, comment_count, reaction_count, created_at')
          .eq('is_deleted', false)
          .order('created_at', { ascending: false })
          .limit(20);
        if (error) throw error;
        renderPostList(data || []);
      }
    } catch (err) {
      body.innerHTML = `<div class="empty-state"><div class="empty-icon">🌱</div><div class="empty-title">아직 비어있어요</div><div class="empty-desc">${err.message || '곧 채워질 예정입니다'}</div></div>`;
    }
  }

  async function buildTodaysQuestionCard() {
    try {
      const q = await getTodaysQuestion();
      if (!q) return '';
      const isSong = q.answer_kind === 'song';
      const [mine, others, songCountRow] = await Promise.all([
        isSong ? Promise.resolve(null) : hasAnsweredToday(q.id),
        previewAnswers(q.id, 4),
        isSong
          ? supabase.from('user_songs').select('id', { count: 'exact', head: true }).eq('kind', 'final')
          : Promise.resolve({ count: 0 }),
      ]);
      const userAnswered = isSong ? ((songCountRow?.count ?? 0) > 0) : !!mine;

      // 시드 답변(페르소나) + 실제 답변 병합
      const seeds = (q.seed_answers && Array.isArray(q.seed_answers.answers)) ? q.seed_answers.answers : [];
      const realAnswers = (others || []).map(a => ({
        persona: a.profiles?.name || '익명',
        content: (a.content || '').replace(/\s+/g, ' ').slice(0, 140),
      }));
      const merged = [...realAnswers, ...seeds];
      const total = merged.length;

      const statusHtml = userAnswered
        ? `<span class="question-card-status">✓ 오늘 답변 완료 · 모두 보기</span>`
        : isSong
          ? `<span class="question-card-status">♬ 한 곡 골라두면 ${total}개의 답이 모두 보여요 →</span>`
          : `<span class="question-card-status">✏ 내 한 줄을 적으면 ${total}개의 답이 모두 보여요 →</span>`;

      // entice peek: 답 안 한 사람에겐 첫 1개만 풀 노출, 나머지 흐림 처리
      let previewHtml = '';
      if (merged.length) {
        if (userAnswered) {
          previewHtml = `
            <div class="question-card-preview">
              ${merged.slice(0, 4).map(a => `
                <div>
                  <span class="question-card-preview-name">${escapeHtml(a.persona)}</span>
                  ${escapeHtml(a.content)}
                </div>
              `).join('')}
            </div>`;
        } else {
          const first = merged[0];
          const rest  = merged.slice(1, 4);
          previewHtml = `
            <div class="question-card-preview">
              <div>
                <span class="question-card-preview-name">${escapeHtml(first.persona)}</span>
                ${escapeHtml(first.content)}
              </div>
              ${rest.map(a => `
                <div class="qc-blur">
                  <span class="question-card-preview-name">${escapeHtml(a.persona)}</span>
                  ${escapeHtml((a.content || '').slice(0, 30))}…
                </div>
              `).join('')}
            </div>`;
        }
      }
      return `
        <a class="question-card" href="./ask.html">
          <div class="question-card-eyebrow">🕯 오늘 잇고</div>
          <div class="question-card-text">${escapeHtml(q.question_text)}</div>
          ${statusHtml}
          ${previewHtml}
        </a>
      `;
    } catch (_) {
      return '';
    }
  }

  function renderContentList(items, topHtml = '', pager = null) {
    const body = document.getElementById('forest-body');
    if (!items.length && !topHtml) {
      body.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🌱</div>
          <div class="empty-title">아직 심긴 콘텐츠가 없어요</div>
          <div class="empty-desc">＋ 버튼으로 첫 콘텐츠를 함께 심어볼까요?</div>
        </div>`;
      return;
    }
    const startIdx = pager ? (pager.page - 1) * PER_PAGE : 0;
    const rowsHtml = items.length ? `
      <div class="board">
        <div class="board-head">
          <span class="board-head-title">지난 잇다 에디터 글</span>
          <span class="board-head-count">${pager ? `${pager.totalUnlocked}편 · ${pager.totalPages}쪽` : ''}</span>
        </div>
        ${items.map((c, i) => `
          <a class="board-row" href="./content-detail.html?id=${c.id}">
            <span class="board-cat">${labelFor(c.category)}</span>
            <span class="board-title">${escapeHtml(c.title)}</span>
            <span class="board-date">${unlockDateLabel(startIdx + i)}</span>
          </a>
        `).join('')}
      </div>` : '';
    body.innerHTML = topHtml + rowsHtml + paginationHtml(pager);
    wirePagination();
  }

  // 게시판 발행 날짜 — 글 인덱스(0=가장 최신) 기준 N일 전.
  function unlockDateLabel(idx) {
    if (idx === 0) return '오늘';
    if (idx === 1) return '어제';
    if (idx === 2) return '그제';
    return `${idx}일 전`;
  }

  function paginationHtml(pager) {
    if (!pager || pager.totalPages <= 1) return '';
    const { page, totalPages } = pager;
    const WINDOW = 5;
    let start = Math.max(1, page - Math.floor(WINDOW / 2));
    let end   = Math.min(totalPages, start + WINDOW - 1);
    start = Math.max(1, end - WINDOW + 1);
    const btns = [];
    if (page > 1) btns.push(`<button class="page-num page-arrow" data-page="${page - 1}" aria-label="이전">‹</button>`);
    for (let i = start; i <= end; i++) {
      btns.push(`<button class="page-num ${i === page ? 'active' : ''}" data-page="${i}">${i}</button>`);
    }
    if (page < totalPages) btns.push(`<button class="page-num page-arrow" data-page="${page + 1}" aria-label="다음">›</button>`);
    return `<nav class="pagination" aria-label="페이지">${btns.join('')}</nav>`;
  }

  function wirePagination() {
    document.querySelectorAll('.pagination .page-num').forEach((btn) => {
      btn.addEventListener('click', () => {
        const p = parseInt(btn.dataset.page, 10);
        if (!p || p === currentPage) return;
        currentPage = p;
        loadFeed();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  function renderPostList(items) {
    const body = document.getElementById('forest-body');

    const nursingBanner = `
      <a href="./info/nursing-home.html" style="
        display:flex;align-items:center;gap:12px;
        padding:14px 16px;
        background:var(--primary-soft);
        border:1.5px solid rgba(47,107,79,0.18);
        border-radius:var(--radius);
        text-decoration:none;
        color:inherit;
        margin-bottom:16px;
        transition:border-color 0.15s;
      ">
        <span style="font-size:26px;flex-shrink:0;">🏥</span>
        <span style="flex:1;min-width:0;">
          <span style="display:block;font-size:14px;font-weight:800;color:var(--primary);">요양시설 찾기</span>
          <span style="display:block;font-size:12.5px;color:var(--ink-soft);margin-top:2px;line-height:1.5;">공단 평가등급 A~E 기반 · 지역·유형·치매전담실 필터</span>
        </span>
        <span style="color:var(--primary);font-size:18px;">›</span>
      </a>
    `;

    if (!items.length) {
      body.innerHTML = nursingBanner + `
        <div class="empty-state">
          <div class="empty-icon">💬</div>
          <div class="empty-title">첫 대화를 시작해 보세요</div>
          <div class="empty-desc">＋ 버튼으로 게시글을 작성할 수 있어요.</div>
        </div>`;
      return;
    }
    body.innerHTML = nursingBanner + items.map(p => `
      <a class="content-card" href="./post-detail.html?id=${p.id}">
        <div class="content-card-title">${escapeHtml(p.title)}</div>
        <div class="content-card-meta">
          <span>💬 ${p.comment_count ?? 0}</span>
          <span>${formatDate(p.created_at)}</span>
        </div>
      </a>
    `).join('');
  }

  function labelFor(cat) {
    return CATEGORIES.find(c => c.key === cat)?.label || cat;
  }
  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }
  function formatDate(d) {
    if (!d) return '';
    const date = new Date(d);
    const today = new Date();
    const diff = Math.floor((today - date) / (1000 * 60 * 60 * 24));
    if (diff === 0) return '오늘';
    if (diff < 7) return `${diff}일 전`;
    return date.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
  }

  loadFeed();
</script>

</body>
</html>
