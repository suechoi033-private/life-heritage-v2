<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 · 잇다</title>
  <link rel="stylesheet" href="./auth-styles.css">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
  <meta name="theme-color" content="#2F6B4F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="잇다">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="./index.html" class="logo"><span class="logo-mark">●</span> 잇다</a>
  </div>
</nav>

<main class="auth-container">
  <span class="auth-kicker">LOGIN</span>
  <h1>다시 오신 것을<br>환영합니다</h1>
  <p class="auth-lead">
    이메일과 비밀번호로 로그인해주세요.
  </p>

  <div id="alert" class="hidden"></div>

  <form id="login-form" class="auth-form">
    <div class="field">
      <label for="email">이메일</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
    </div>

    <div class="field">
      <label for="password">비밀번호</label>
      <input type="password" id="password" name="password" placeholder="비밀번호" required autocomplete="current-password">
    </div>

    <button type="submit" class="auth-submit">로그인</button>
  </form>

  <div id="social-auth"></div>

  <div class="auth-links">
    <a href="./forgot.html">비밀번호를 잊으셨나요?</a>
  </div>

  <div class="auth-bottom">
    아직 가입하지 않으셨다면 <a href="./signup.html">가입하기</a>
  </div>
</main>

<footer class="auth-footer">
  © 2026 라이프헤리티지 · 잇다
</footer>

<script type="module">
  import { signIn, redirectIfAuthed, friendlyError } from './auth.js';
  import { renderSocialAuthButtons } from './js/social-auth.js';

  // ── 초대 코드 캡처 (케어링 초대 + 친구 초대 둘 다) ────────────────────────
  const params = new URLSearchParams(location.search);

  // ── 탈퇴 완료 안내 (담담하게) ────────────────────────
  if (params.get('goodbye') === '1') {
    const lead = document.querySelector('.auth-lead');
    const h1 = document.querySelector('h1');
    if (h1) h1.innerHTML = '탈퇴가 완료되었습니다';
    if (lead) lead.innerHTML = '그동안 잇다와 함께해 주셔서 감사합니다. 계정과 기록은 모두 삭제되었습니다. 언제든 다시 시작하고 싶으시면 새로 가입하실 수 있습니다.';
  }

  const careInvite   = (params.get('invite') || localStorage.getItem('itda:pending_invite') || '').toUpperCase();
  const friendInvite = (params.get('friend') || localStorage.getItem('itda:pending_friend_invite') || '').toUpperCase();

  let redirectAfterLogin = './index.html';

  if (friendInvite) {
    localStorage.setItem('itda:pending_friend_invite', friendInvite);
    redirectAfterLogin = `./invite.html?code=${encodeURIComponent(friendInvite)}`;
    await redirectIfAuthed(redirectAfterLogin);
    const lead = document.querySelector('.auth-lead');
    if (lead) lead.innerHTML = `<strong style="color: var(--primary);">친구 초대</strong>를 받으셨네요. 로그인 후 자동으로 연결됩니다.`;
  } else if (careInvite) {
    localStorage.setItem('itda:pending_invite', careInvite);
    redirectAfterLogin = `./care.html?accept=${encodeURIComponent(careInvite)}`;
    await redirectIfAuthed(redirectAfterLogin);
    const lead = document.querySelector('.auth-lead');
    if (lead) lead.innerHTML = `<strong style="color: var(--primary);">초대 코드 ${careInvite}</strong>를 받으셨네요. 로그인하시면 자동으로 합류됩니다.`;
    const signupLinks = document.querySelectorAll('a[href="./signup.html"]');
    signupLinks.forEach(a => { a.href = `./signup.html?invite=${careInvite}`; });
  } else {
    await redirectIfAuthed('./index.html');
  }

  // ── 소셜 로그인 버튼 렌더 ────────────────────────
  renderSocialAuthButtons(document.getElementById('social-auth'), {
    redirectAfter: redirectAfterLogin,
    inviteCode: friendInvite || careInvite,
  });

  const form = document.getElementById('login-form');
  const alertBox = document.getElementById('alert');
  const submitBtn = form.querySelector('.auth-submit');

  function showAlert(message, type = 'error') {
    alertBox.className = `alert alert-${type}`;
    alertBox.textContent = message;
    alertBox.classList.remove('hidden');
  }

  function hideAlert() {
    alertBox.classList.add('hidden');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert();
    submitBtn.disabled = true;
    submitBtn.textContent = '로그인 중...';

    const email = form.email.value.trim();
    const password = form.password.value;

    const { data, error } = await signIn(email, password);

    if (error) {
      showAlert(friendlyError(error), 'error');
      submitBtn.disabled = false;
      submitBtn.textContent = '로그인';
      return;
    }

    window.location.href = redirectAfterLogin;
  });
</script>

</body>
</html>
