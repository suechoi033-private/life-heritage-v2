<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>가족과 함께 보기 · 잇다</title>
  <meta name="description" content="잇다에서 기록을 가족과 함께 봅니다">
  <link rel="stylesheet" href="./auth-styles.css">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <meta name="theme-color" content="#2F6B4F">
  <meta property="og:title" content="잇다 · 함께 기록을 봐요">
  <meta property="og:description" content="그동안 남긴 기록을 같은 곳에서 함께 볼 수 있어요">
  <style>
    .invite-card {
      background: var(--bg-alt);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
    }
    .invite-card-title {
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .invite-card-desc {
      font-size: 13.5px;
      color: var(--ink-soft);
      line-height: 1.65;
      margin-bottom: 14px;
    }
    .invite-message {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #fff;
      padding: 11px 13px;
      font-family: inherit;
      font-size: 14px;
      color: var(--ink);
      line-height: 1.5;
      resize: none;
      margin-bottom: 14px;
    }
    .invite-message::placeholder { color: var(--ink-faint); }
    .invite-message:focus { outline: none; border-color: var(--primary); }
    .invite-status {
      margin-top: 4px;
    }
    .invite-status-line {
      font-size: 13.5px;
      color: var(--ink-soft);
      line-height: 1.6;
      padding: 2px 2px;
    }
    .invite-share-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .share-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 16px 12px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--line);
      background: #fff;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s, background 0.15s;
    }
    .share-btn:hover { border-color: var(--primary); background: var(--primary-soft); }
    .share-btn-icon { font-size: 26px; }
    .share-btn-label { font-size: 13px; font-weight: 700; }

    .invite-link-box {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px 14px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      font-family: 'SF Mono', Menlo, monospace;
      font-size: 12px;
      color: var(--ink-soft);
      margin-top: 12px;
      overflow: hidden;
    }
    .invite-link-url { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .invite-link-copy {
      flex-shrink: 0;
      padding: 6px 12px;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      border: none;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }

    .invite-inviter {
      text-align: center;
      padding: 32px 20px 20px;
    }
    .invite-inviter-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--primary-soft);
      color: var(--primary);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 14px;
    }
    .invite-inviter-name {
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .invite-inviter-sub { font-size: 13.5px; color: var(--ink-soft); }

    .invite-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .invite-actions button {
      flex: 1;
      padding: 13px 16px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 14.5px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-accept { background: var(--primary); color: #fff; }
    .btn-accept:hover { background: var(--primary-hover); }
    .btn-reject { background: var(--bg-alt); color: var(--ink-soft); border: 1px solid var(--line); }
  </style>
</head>
<body>

<main class="page-shell" id="main-content">
  <div id="invite-body">
    <div class="empty-state">
      <div class="empty-icon">⏳</div>
      <div class="empty-desc">불러오는 중...</div>
    </div>
  </div>
</main>

<script type="module">
  import { supabase } from './auth.js';
  import { renderNav } from './nav.js';
  import { createFriendInvite, shareViaKakao, fetchInviteByCode, acceptFriendInvite, listFriends, listMyPendingInvites, previewFriendInvite } from './js/friends.js';

  await renderNav({ active: 'root', infoIcon: false, title: '가족과 함께 보기' });

  const params = new URLSearchParams(location.search);
  const code = (params.get('code') || '').toUpperCase();

  // 코드가 있으면 수락 모드, 없으면 발급 모드
  if (code) {
    await renderAcceptMode(code);
  } else {
    await renderInviteMode();
  }

  // ===== 수락 모드 =====
  async function renderAcceptMode(code) {
    const body = document.getElementById('invite-body');
    const { data: { session } } = await supabase.auth.getSession();

    if (!session) {
      localStorage.setItem('itda:pending_friend_invite', code);
      // 보기 먼저(P6): 가입 전에 보낸 사람 이름 + 한마디를 보여준다.
      // preview_friend_invite RPC가 적용돼 있으면 이름이 뜨고, 미적용이면 일반 화면으로 폴백.
      let preview = null;
      try { preview = await previewFriendInvite(code); } catch {}
      const who = preview?.inviter_name ? escapeHtml(preview.inviter_name) : '';
      const avatar = who ? who[0] : '♡';
      const msg = preview?.message ? escapeHtml(preview.message) : '';
      body.innerHTML = `
        <div class="invite-inviter">
          <div class="invite-inviter-avatar">${avatar}</div>
          <div class="invite-inviter-name">${who ? who + '님이 ' : '가족이 '}함께 보자고 해요</div>
          <div class="invite-inviter-sub">잇다에 들어오면 같은 화면에서 기록을 함께 봐요</div>
        </div>
        ${msg ? `<div class="invite-card"><div class="invite-card-desc" style="margin:0;">"${msg}"</div></div>` : ''}
        <div class="invite-card">
          <div class="invite-card-desc" style="margin:0 0 14px;">잠깐 들어오시면 지금까지 남긴 기록을 함께 보고, 이어 적을 수 있어요.</div>
          <div style="display:flex;gap:10px;">
            <a href="./signup.html?friend=${encodeURIComponent(code)}" style="flex:1;padding:13px;background:var(--primary);color:#fff;text-align:center;border-radius:12px;font-weight:700;text-decoration:none;">들어가기</a>
            <a href="./login.html?friend=${encodeURIComponent(code)}" style="flex:1;padding:13px;background:#fff;color:var(--primary);text-align:center;border-radius:12px;font-weight:700;border:1.5px solid var(--primary);text-decoration:none;">로그인</a>
          </div>
        </div>`;
      return;
    }

    let invite;
    try {
      invite = await fetchInviteByCode(code);
    } catch (err) {
      body.innerHTML = errorCard(err.message || '초대를 불러올 수 없어요');
      return;
    }

    if (!invite) {
      body.innerHTML = errorCard('유효하지 않거나 만료된 초대입니다.');
      return;
    }

    // 본인이 만든 초대를 본인이 열었을 때
    if (invite.inviter_id === session.user.id) {
      body.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🙂</div>
          <div class="empty-title">내가 보낸 링크예요</div>
          <div class="empty-desc">이 링크를 가족에게 보내주세요.</div>
          <div class="cta-block"><a href="./invite.html">링크 다시 보기</a></div>
        </div>`;
      return;
    }

    const inviter = invite.inviter || {};
    const initial = (inviter.name?.[0] || '·').toUpperCase();

    body.innerHTML = `
      <div class="invite-inviter">
        <div class="invite-inviter-avatar">${initial}</div>
        <div class="invite-inviter-name">${escapeHtml(inviter.name || '잇다 사용자')}</div>
        <div class="invite-inviter-sub">님이 함께 보자고 해요</div>
      </div>
      ${invite.message
        ? `<div class="invite-card"><div class="invite-card-desc" style="margin:0;">"${escapeHtml(invite.message)}"</div></div>`
        : `<div class="invite-card"><div class="invite-card-desc" style="margin:0;">그동안 혼자 적어온 기록이에요. 함께 보면 다음 면회 전에 "그때 뭐라고 했더라"를 안 헤매도 돼요.</div></div>`}
      <div class="invite-actions">
        <button class="btn-reject" id="btn-reject">나중에</button>
        <button class="btn-accept" id="btn-accept">같이 보기</button>
      </div>
    `;

    document.getElementById('btn-accept').addEventListener('click', async () => {
      try {
        await acceptFriendInvite(code);
        localStorage.removeItem('itda:pending_friend_invite');
        body.innerHTML = `
          <div class="invite-inviter">
            <div class="invite-inviter-avatar" style="background:var(--success-soft);color:var(--success);">✓</div>
            <div class="invite-inviter-name">이제 같이 봐요</div>
            <div class="invite-inviter-sub">${escapeHtml(inviter.name || '가족')}님의 기록을 함께 볼 수 있어요. 면회 후 한 줄 남기면 서로 바로 알 수 있어요.</div>
            <div class="cta-block"><a href="./index.html">기록 보러 가기</a></div>
          </div>`;
      } catch (err) {
        alert(err.message || '수락 실패');
      }
    });
    document.getElementById('btn-reject').addEventListener('click', () => {
      window.location.href = './index.html';
    });
  }

  // ===== 발급 모드 =====
  async function renderInviteMode() {
    const body = document.getElementById('invite-body');
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) { window.location.href = './login.html'; return; }

    const kakaoConfigured = !!window.__KAKAO_JS_KEY__;

    body.innerHTML = `
      <div class="invite-card">
        <div class="invite-card-title">이 기록, 가족과 같이 봐요</div>
        <div class="invite-card-desc">링크 하나면 됩니다. 가족이 열어보면, 지금까지 남긴 기록을 같은 화면에서 함께 봐요.</div>
        <textarea id="invite-message" class="invite-message" rows="2" maxlength="200" placeholder="한마디 적어 보낼 수 있어요 (예: 엄마 일 우리 같이 보자)"></textarea>
        <div class="invite-share-grid">
          ${kakaoConfigured ? `
            <button class="share-btn" id="share-kakao">
              <span class="share-btn-icon">💬</span>
              <span class="share-btn-label">카카오톡으로</span>
            </button>
          ` : ''}
          <button class="share-btn" id="share-link">
            <span class="share-btn-icon">🔗</span>
            <span class="share-btn-label">링크로 보내기</span>
          </button>
        </div>
        <div class="invite-link-box" id="link-box" style="display:none;">
          <span class="invite-link-url" id="invite-url"></span>
          <button class="invite-link-copy" id="copy-btn">복사</button>
        </div>
      </div>
      <div class="invite-status" id="invite-status"></div>
    `;

    // 발급 후 데드엔드 방지 + 관계 가시화(P5): 함께하는 가족 / 보낸 링크 대기 상태
    renderStatus();
    async function renderStatus(justSent) {
      const el = document.getElementById('invite-status');
      if (!el) return;
      let friends = [], pending = [];
      try { [friends, pending] = await Promise.all([listFriends(), listMyPendingInvites()]); } catch {}
      const parts = [];
      if (justSent) {
        parts.push(`
          <div class="invite-card" style="padding:18px 20px;">
            <div class="invite-card-title" style="font-size:16px;margin-bottom:6px;">보낸 링크, 잘 가 있어요</div>
            <div class="invite-card-desc" style="margin:0;">가족이 열어보면 여기서 함께 보게 돼요. 그동안은 평소처럼 기록을 이어가면 돼요.</div>
          </div>`);
      }
      if (friends.length) {
        const names = friends.map((f) => escapeHtml(f.name || '가족')).join(', ');
        parts.push(`<div class="invite-status-line">함께하는 가족 ${friends.length}명 · ${names}</div>`);
      }
      if (pending.length) {
        parts.push(`<div class="invite-status-line">아직 열어보지 않은 링크 ${pending.length}건 · 천천히 기다려요</div>`);
      }
      el.innerHTML = parts.join('');
    }

    let currentInvite = null;

    function readMessage() {
      return (document.getElementById('invite-message')?.value || '').trim();
    }

    async function ensureInvite(channel) {
      if (currentInvite) return currentInvite;
      currentInvite = await createFriendInvite({ channel, message: readMessage() });
      const box = document.getElementById('link-box');
      box.style.display = 'flex';
      document.getElementById('invite-url').textContent = currentInvite.url;
      return currentInvite;
    }

    document.getElementById('share-kakao')?.addEventListener('click', async () => {
      try {
        const invite = await ensureInvite('kakao');
        const name = session.user.user_metadata?.name || '';
        await shareViaKakao({ url: invite.url, inviterName: name, message: readMessage() });
        renderStatus(true);
      } catch (err) {
        alert(err.message || '카카오톡 공유에 실패했어요. 링크로 보내기를 이용해 주세요.');
      }
    });

    document.getElementById('share-link').addEventListener('click', async () => {
      const invite = await ensureInvite('link');
      try {
        await navigator.clipboard.writeText(invite.url);
        const btn = document.getElementById('share-link');
        const labelEl = btn.querySelector('.share-btn-label');
        const orig = labelEl.textContent;
        labelEl.textContent = '✓ 복사됨';
        setTimeout(() => { labelEl.textContent = orig; }, 1500);
        renderStatus(true);
      } catch {
        // 클립보드 실패 시 링크만 노출 (수동 복사)
        alert('아래 링크를 길게 눌러 복사해 주세요.');
      }
    });

    document.getElementById('copy-btn').addEventListener('click', async () => {
      const invite = await ensureInvite('link');
      try {
        await navigator.clipboard.writeText(invite.url);
        const btn = document.getElementById('copy-btn');
        const orig = btn.textContent;
        btn.textContent = '복사됨!';
        setTimeout(() => { btn.textContent = orig; }, 1500);
        renderStatus(true);
      } catch {
        alert('복사 실패');
      }
    });
  }

  function errorCard(msg) {
    const expired = /만료|유효하지/.test(msg || '');
    return `
      <div class="empty-state">
        <div class="empty-icon">🙏</div>
        <div class="empty-title">${expired ? '링크가 만료됐어요' : '링크를 열 수 없어요'}</div>
        <div class="empty-desc">${expired
          ? '시간이 지나 더 이상 열 수 없어요. 보내준 분에게 새 링크를 받아 다시 열어보세요.'
          : escapeHtml(msg)}</div>
        <div class="cta-block"><a href="./index.html">잇다 둘러보기</a></div>
      </div>`;
  }

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }
</script>

</body>
</html>
