<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>책자 만들기 · 잇다</title>
  <meta name="description" content="일기·답변을 PDF 책자로 내려받아 인쇄할 수 있어요">
  <link rel="stylesheet" href="./auth-styles.css">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <meta name="theme-color" content="#5C8A6F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="잇다">
  <style>
    /* ── 설정 UI ─────────────────────────── */
    .book-setup {
      background: var(--bg-alt);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 16px;
    }
    .setup-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
    .setup-row:last-child { margin-bottom: 0; }
    .setup-label {
      font-size: 12.5px; font-weight: 800;
      letter-spacing: 0.02em;
      color: var(--ink-soft);
      flex: 0 0 80px;
    }
    .setup-input, .setup-select {
      padding: 9px 12px;
      border: 1.5px solid var(--line);
      border-radius: var(--radius-sm);
      font-size: 13.5px;
      font-family: inherit;
      background: #fff;
      flex: 1;
      min-width: 130px;
    }
    .setup-chip {
      padding: 8px 14px;
      border-radius: 999px;
      border: 1.5px solid var(--line);
      background: #fff;
      font-size: 13px;
      font-weight: 700;
      color: var(--ink-soft);
      cursor: pointer;
      font-family: inherit;
    }
    .setup-chip.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .setup-actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }
    .btn-build, .btn-print, .btn-back {
      padding: 11px 18px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      border: none;
    }
    .btn-build { background: var(--primary); color: #fff; }
    .btn-build:hover { background: var(--primary-hover); }
    .btn-build:disabled { opacity: 0.5; cursor: wait; }
    .btn-print { background: var(--ink); color: #fff; }
    .btn-print:hover { background: #000; }
    .btn-back { background: var(--bg-alt); color: var(--ink-soft); border: 1px solid var(--line); }
    .btn-back:hover { border-color: var(--primary); color: var(--primary); }

    .preview-empty {
      padding: 60px 20px;
      text-align: center;
      color: var(--ink-muted);
      background: var(--bg-alt);
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
    }
    .preview-empty .icon { font-size: 40px; margin-bottom: 14px; }

    .meta-row {
      font-size: 12.5px;
      color: var(--ink-muted);
      padding: 12px 14px;
      background: #FFF6CC;
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
    }

    /* ── 책자 본문 (화면 미리보기) ───────── */
    #book {
      background: #fff;
      border: 1px solid var(--line);
      padding: 0;
      border-radius: var(--radius);
      overflow: hidden;
    }
    .book-page {
      padding: 48px 44px;
      min-height: 600px;
      border-bottom: 1px dashed var(--line);
      page-break-after: always;
      break-after: page;
      background: #fff;
    }
    .book-page:last-child { border-bottom: none; }

    .book-cover {
      text-align: center;
      display: flex; flex-direction: column;
      justify-content: center;
      min-height: 720px;
      background: linear-gradient(180deg, #F3F8F5, #fff);
    }
    .book-cover-eyebrow {
      font-size: 13px;
      letter-spacing: 0.2em;
      color: var(--primary);
      font-weight: 700;
      margin-bottom: 22px;
    }
    .book-cover-title {
      font-family: var(--font-serif);
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.25;
      margin-bottom: 18px;
    }
    .book-cover-sub {
      font-size: 15px;
      color: var(--ink-soft);
      margin-bottom: 40px;
    }
    .book-cover-author {
      font-size: 14px;
      color: var(--ink-soft);
      margin-bottom: 6px;
    }
    .book-cover-author strong {
      font-weight: 800;
      color: var(--ink);
    }
    .book-cover-date {
      font-size: 13px;
      color: var(--ink-muted);
    }
    .book-cover-mark {
      margin-top: 60px;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--primary);
      font-weight: 700;
    }

    .book-toc-title {
      font-family: var(--font-serif);
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--ink);
    }
    .book-toc-list { list-style: none; padding: 0; margin: 0; }
    .book-toc-item {
      padding: 0;
      font-size: 13.5px;
      border-bottom: 1px dotted var(--line);
    }
    .book-toc-link {
      display: flex; justify-content: space-between; gap: 12px;
      padding: 9px 6px;
      color: var(--ink);
      text-decoration: none;
      border-radius: 4px;
      transition: background 0.1s;
    }
    .book-toc-link:hover { background: var(--primary-soft); color: var(--primary); }
    .book-toc-item .toc-title { color: inherit; flex: 1; min-width: 0; }
    .book-toc-item .toc-date { color: var(--ink-muted); flex-shrink: 0; font-size: 12.5px; }
    .book-toc-link:hover .toc-date { color: var(--primary); }

    /* 목차로 복귀 링크 (각 본문 페이지 우상단) */
    .book-back-toc {
      float: right;
      font-size: 11px;
      color: var(--primary);
      text-decoration: none;
      padding: 4px 10px;
      border: 1px solid var(--primary-soft);
      border-radius: 999px;
      font-weight: 700;
      margin-top: -8px;
    }
    .book-back-toc:hover { background: var(--primary-soft); }
    @media print {
      .book-back-toc { display: none; }
    }

    .book-entry {
      font-size: 14.5px;
      line-height: 1.85;
      color: var(--ink);
    }
    .book-entry-head {
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }
    .book-entry-date {
      font-size: 12.5px;
      letter-spacing: 0.1em;
      color: var(--primary);
      font-weight: 700;
      margin-bottom: 8px;
    }
    .book-entry-title {
      font-family: var(--font-serif);
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.3;
      margin-bottom: 6px;
    }
    .book-entry-meta {
      font-size: 12px;
      color: var(--ink-muted);
    }
    .book-entry-body {
      white-space: pre-wrap;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }
    .book-entry-tags {
      margin-top: 14px;
      font-size: 12px;
      color: var(--ink-muted);
    }
    .book-entry-tags span {
      display: inline-block;
      margin-right: 6px;
      padding: 2px 8px;
      background: var(--primary-soft);
      color: var(--primary);
      border-radius: 999px;
      font-weight: 700;
    }
    .book-entry-q {
      font-size: 16px;
      font-family: var(--font-serif);
      color: var(--primary);
      padding: 12px 14px;
      background: #F3F8F5;
      border-left: 4px solid var(--primary);
      border-radius: 4px;
      margin-bottom: 14px;
    }
    .book-end {
      text-align: center;
      padding: 60px 0;
      font-family: var(--font-serif);
      color: var(--ink-muted);
      font-size: 14px;
      letter-spacing: 0.1em;
    }

    /* ── 인쇄용 CSS ─────────────────────── */
    @media print {
      @page {
        size: A4;
        margin: 18mm 16mm;
      }
      body { background: #fff !important; }
      .no-print, nav, .itda-bottom-nav,
      .book-setup, .meta-row, .setup-actions { display: none !important; }
      #book {
        border: none; border-radius: 0;
      }
      .book-page {
        padding: 0;
        min-height: auto;
        border-bottom: none;
      }
      .book-cover { min-height: 240mm; }
    }
  </style>
</head>
<body>

<main class="page-shell" id="main-content">

  <h1 style="font-size:24px;font-weight:800;letter-spacing:-0.02em;margin-bottom:6px;">📖 책자 만들기</h1>
  <p style="font-size:13.5px;color:var(--ink-soft);line-height:1.6;margin-bottom:18px;">
    내 일기와 답변을 PDF 책자로 만들어 저장하거나 인쇄할 수 있어요.
    브라우저의 인쇄 대화상자에서 <strong>"PDF로 저장"</strong>을 선택하면 파일로 받을 수 있습니다.
  </p>

  <!-- 설정 -->
  <div class="book-setup no-print">
    <div class="setup-row">
      <div class="setup-label">담을 글</div>
      <button type="button" class="setup-chip active" data-source="diary">📝 일기</button>
      <button type="button" class="setup-chip" data-source="answers">💜 오늘의 답변</button>
      <button type="button" class="setup-chip" data-source="all">전부</button>
    </div>
    <div class="setup-row">
      <div class="setup-label">기간</div>
      <input type="date" class="setup-input" id="date-from" style="max-width:160px;">
      <span style="color:var(--ink-muted);">~</span>
      <input type="date" class="setup-input" id="date-to" style="max-width:160px;">
      <button type="button" class="setup-chip" data-range="30d">최근 30일</button>
      <button type="button" class="setup-chip" data-range="90d">최근 3개월</button>
      <button type="button" class="setup-chip" data-range="year">올해</button>
      <button type="button" class="setup-chip" data-range="all">전체</button>
    </div>
    <div class="setup-row">
      <div class="setup-label">제목</div>
      <input type="text" class="setup-input" id="book-title" placeholder="예: 나의 2026년 일기" maxlength="40">
    </div>
    <div class="setup-row">
      <div class="setup-label">정렬</div>
      <button type="button" class="setup-chip active" data-order="asc">오래된 순 (책자 흐름)</button>
      <button type="button" class="setup-chip" data-order="desc">최신 순</button>
    </div>
    <div class="setup-actions">
      <button type="button" class="btn-build" id="btn-build">📚 책자 만들기</button>
      <button type="button" class="btn-back" onclick="window.location.href='./root.html'">← 마이</button>
    </div>
  </div>

  <div class="meta-row no-print" id="build-info" style="display:none;"></div>

  <!-- 책자 -->
  <div id="book">
    <div class="preview-empty">
      <div class="icon">📖</div>
      위에서 옵션을 정한 뒤 <strong>"책자 만들기"</strong>를 눌러주세요.
    </div>
  </div>

  <div class="setup-actions no-print" id="post-actions" style="display:none;margin-top:18px;">
    <button type="button" class="btn-print" id="btn-print">🖨 인쇄 / PDF 저장</button>
    <button type="button" class="btn-back" onclick="document.getElementById('book').scrollIntoView({behavior:'smooth'});">미리보기로 이동</button>
  </div>

</main>

<script type="module">
  import { supabase, requireAuth } from './auth.js';
  import { renderNav } from './nav.js';
  import { TEMPLATES } from './js/diary.js';

  await renderNav({ active: 'root', infoIcon: false, title: '책자 만들기' });

  const session = await requireAuth('./login.html');
  if (!session) { /* redirected */ }
  const user = session.user;
  const userName = user.user_metadata?.name || user.email?.split('@')[0] || '잇다 사용자';

  // ── 옵션 상태 ───────────────────────────
  const opts = {
    source: 'diary',
    order:  'asc',
    from:   null,
    to:     null,
  };

  // 기본 제목·기간
  const today = new Date();
  document.getElementById('book-title').value = `나의 ${today.getFullYear()}년 기록`;
  // 기본 = 최근 90일
  setRange('90d');

  document.querySelectorAll('[data-source]').forEach((b) => {
    b.addEventListener('click', () => {
      document.querySelectorAll('[data-source]').forEach((x) => x.classList.toggle('active', x === b));
      opts.source = b.dataset.source;
    });
  });
  document.querySelectorAll('[data-order]').forEach((b) => {
    b.addEventListener('click', () => {
      document.querySelectorAll('[data-order]').forEach((x) => x.classList.toggle('active', x === b));
      opts.order = b.dataset.order;
    });
  });
  document.querySelectorAll('[data-range]').forEach((b) => {
    b.addEventListener('click', () => setRange(b.dataset.range));
  });
  document.getElementById('date-from').addEventListener('change', (e) => opts.from = e.target.value || null);
  document.getElementById('date-to').addEventListener('change', (e) => opts.to = e.target.value || null);

  function setRange(key) {
    const now = new Date();
    let from = null;
    if (key === '30d') from = new Date(now.getTime() - 30 * 24 * 3600 * 1000);
    else if (key === '90d') from = new Date(now.getTime() - 90 * 24 * 3600 * 1000);
    else if (key === 'year') from = new Date(now.getFullYear(), 0, 1);
    // 'all' → 그대로 둠
    opts.from = from ? toDateStr(from) : null;
    opts.to   = toDateStr(now);
    document.getElementById('date-from').value = opts.from || '';
    document.getElementById('date-to').value   = opts.to   || '';
  }

  function toDateStr(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  // ── 빌드 ────────────────────────────────
  document.getElementById('btn-build').addEventListener('click', buildBook);
  document.getElementById('btn-print').addEventListener('click', () => window.print());

  async function buildBook() {
    const btn = document.getElementById('btn-build');
    btn.disabled = true; btn.textContent = '글 모으는 중…';
    const bookEl = document.getElementById('book');
    const infoEl = document.getElementById('build-info');
    infoEl.style.display = 'none';

    try {
      const [diary, answers] = await Promise.all([
        (opts.source === 'diary' || opts.source === 'all') ? fetchDiary() : Promise.resolve([]),
        (opts.source === 'answers' || opts.source === 'all') ? fetchAnswers() : Promise.resolve([]),
      ]);

      // 통합: { kind: 'diary'|'answer', dateKey: 'YYYY-MM-DD', data }
      const combined = [
        ...diary.map((d) => ({ kind: 'diary', dateKey: d.entry_date, data: d })),
        ...answers.map((a) => ({ kind: 'answer', dateKey: a.created_at.slice(0, 10), data: a })),
      ];
      combined.sort((x, y) => opts.order === 'asc'
        ? x.dateKey.localeCompare(y.dateKey)
        : y.dateKey.localeCompare(x.dateKey));

      if (!combined.length) {
        bookEl.innerHTML = `
          <div class="preview-empty">
            <div class="icon">🕯️</div>
            선택한 조건에 맞는 글이 없어요.<br>
            <span style="font-size:12.5px;color:var(--ink-muted);">기간이나 종류를 바꿔보세요.</span>
          </div>`;
        document.getElementById('post-actions').style.display = 'none';
        infoEl.style.display = 'block';
        infoEl.textContent = `포함된 글 0개`;
        btn.disabled = false; btn.textContent = '📚 책자 만들기';
        return;
      }

      // 다이어리 본문에 필요한 태그도 미리 조회
      const diaryIds = diary.map((d) => d.id);
      let tagMap = {};
      if (diaryIds.length) {
        const { data: links } = await supabase
          .from('diary_entry_tags')
          .select('entry_id, tags(name, tag_type)')
          .in('entry_id', diaryIds);
        (links || []).forEach((l) => {
          if (!tagMap[l.entry_id]) tagMap[l.entry_id] = [];
          if (l.tags) tagMap[l.entry_id].push(l.tags);
        });
      }

      // 빈 본문 필터: 답변/일기 내용이 진짜 있는 것만
      const filtered = combined.filter((c) => {
        const txt = (c.data?.content || '').trim();
        if (c.kind === 'diary') return !!(txt || (c.data?.title || '').trim());
        return !!txt;
      });
      const skipped = combined.length - filtered.length;

      if (!filtered.length) {
        bookEl.innerHTML = `
          <div class="preview-empty">
            <div class="icon">🕯️</div>
            기간 안에는 ${combined.length}개 글이 있지만<br>
            <strong>실제 내용이 적힌 글은 없어요.</strong><br>
            <span style="font-size:12.5px;color:var(--ink-muted);">기록을 남기신 뒤 다시 시도해보세요.</span>
          </div>`;
        document.getElementById('post-actions').style.display = 'none';
        infoEl.style.display = 'block';
        infoEl.textContent = `포함된 글 0개 (빈 답변 ${skipped}개 제외)`;
        btn.disabled = false; btn.textContent = '📚 책자 만들기';
        return;
      }

      // 책자 렌더
      bookEl.innerHTML = renderBook(filtered, tagMap);
      document.getElementById('post-actions').style.display = '';
      infoEl.style.display = 'block';
      const diaryN = filtered.filter((c) => c.kind === 'diary').length;
      const ansN   = filtered.filter((c) => c.kind === 'answer').length;
      const skipNote = skipped > 0 ? ` <span style="color:var(--ink-muted);">· 빈 답변 ${skipped}개 제외</span>` : '';
      infoEl.innerHTML = `📚 총 <strong>${filtered.length}개</strong> 글 (일기 ${diaryN} · 답변 ${ansN})${skipNote} — 미리보기 아래에서 <strong>🖨 인쇄 / PDF 저장</strong> 버튼을 누르세요.`;

      btn.disabled = false; btn.textContent = '📚 다시 만들기';
    } catch (err) {
      alert('빌드 실패: ' + (err.message || err));
      btn.disabled = false; btn.textContent = '📚 책자 만들기';
    }
  }

  async function fetchDiary() {
    let q = supabase
      .from('diary_entries')
      .select('id, entry_date, template_type, title, content, visibility, created_at')
      .eq('user_id', user.id)
      .order('entry_date', { ascending: true });
    if (opts.from) q = q.gte('entry_date', opts.from);
    if (opts.to)   q = q.lte('entry_date', opts.to);
    const { data, error } = await q;
    if (error) throw error;
    return data || [];
  }

  async function fetchAnswers() {
    // daily_answers + daily_questions 조인
    let q = supabase
      .from('daily_answers')
      .select('id, content, visibility, created_at, question_id, daily_questions(question_text)')
      .eq('user_id', user.id)
      .order('created_at', { ascending: true });
    if (opts.from) q = q.gte('created_at', `${opts.from}T00:00:00`);
    if (opts.to)   q = q.lte('created_at', `${opts.to}T23:59:59`);
    const { data, error } = await q;
    if (error) throw error;
    return data || [];
  }

  // ── 렌더링 ──────────────────────────────
  function renderBook(rawItems, tagMap) {
    // 외부에서 이미 빈 본문 필터링됨 — 여기서는 ID·번호만 부여
    const items = (rawItems || []).map((c, idx) => ({ ...c, _id: `entry-${idx + 1}`, _num: idx + 1 }));

    const title = (document.getElementById('book-title').value || '나의 기록 책자').trim();
    const fromLbl = opts.from ? formatLong(opts.from) : '시작';
    const toLbl   = opts.to   ? formatLong(opts.to)   : '오늘';

    // 표지
    const cover = `
      <div class="book-page book-cover">
        <div class="book-cover-eyebrow">— LIFE HERITAGE · 잇다 —</div>
        <div class="book-cover-title">${escapeHtml(title)}</div>
        <div class="book-cover-sub">${fromLbl} ~ ${toLbl}</div>
        <div class="book-cover-author">기록한 사람 · <strong>${escapeHtml(userName)}</strong></div>
        <div class="book-cover-date">${formatLong(toDateStr(new Date()))} 발행</div>
        <div class="book-cover-mark">잇다와 함께</div>
      </div>`;

    // 목차 — 각 항목 → 본문 #entry-N로 점프
    const tocItems = items.map((c) => {
      const t = c.kind === 'diary'
        ? (c.data.title || TEMPLATES[c.data.template_type]?.label || '일기')
        : (c.data.daily_questions?.question_text || '오늘의 질문');
      const display = t.length > 60 ? `${t.slice(0, 60)}…` : t;
      const icon = c.kind === 'answer' ? '💜' : '📝';
      return `
        <li class="book-toc-item">
          <a class="book-toc-link" href="#${c._id}">
            <span class="toc-title">${icon} ${escapeHtml(display)}</span>
            <span class="toc-date">${formatShort(c.dateKey)}</span>
          </a>
        </li>`;
    }).join('');
    const toc = items.length <= 300 ? `
      <div class="book-page" id="toc">
        <div class="book-toc-title">목차 — ${items.length}개</div>
        <ul class="book-toc-list">${tocItems}</ul>
      </div>` : '';  // 300개 넘으면 목차 생략 (성능)

    // 본문 — 각 페이지마다 우상단에 ↑ 목차로 링크
    const pages = items.map((c) => {
      if (c.kind === 'diary') return renderDiary(c.data, tagMap[c.data.id] || [], c._id, c._num);
      return renderAnswer(c.data, c._id, c._num);
    }).join('');

    const end = `
      <div class="book-page">
        <div class="book-end">
          —— 책의 끝 ——<br><br>
          ${escapeHtml(userName)} 님의 ${items.length}개 기록이 담겼습니다.
        </div>
      </div>`;

    return cover + toc + pages + end;
  }

  function renderDiary(d, tags, anchorId, num) {
    const tplLabel = TEMPLATES[d.template_type]?.label || '';
    const visIcon = d.visibility === 'public' ? '🌍' : d.visibility === 'friends' ? '👥' : '🔒';
    const tagsHtml = tags.length ? `
      <div class="book-entry-tags">
        ${tags.map((t) => `<span>${t.tag_type === 'emotion' ? '· ' : '#'}${escapeHtml(t.name)}</span>`).join('')}
      </div>` : '';
    return `
      <div class="book-page" id="${anchorId}">
        <a class="book-back-toc" href="#toc">↑ 목차로</a>
        <div class="book-entry-head">
          <div class="book-entry-date">${formatLong(d.entry_date)} · #${num}</div>
          <div class="book-entry-title">${escapeHtml(d.title || tplLabel || '일기')}</div>
          <div class="book-entry-meta">${tplLabel} · ${visIcon} ${visText(d.visibility)}</div>
        </div>
        <div class="book-entry">
          <div class="book-entry-body">${escapeHtml(d.content || '(내용 없음)')}</div>
          ${tagsHtml}
        </div>
      </div>`;
  }

  function renderAnswer(a, anchorId, num) {
    const qText = a.daily_questions?.question_text || '오늘의 질문';
    const body  = a.content || '';
    return `
      <div class="book-page" id="${anchorId}">
        <a class="book-back-toc" href="#toc">↑ 목차로</a>
        <div class="book-entry-head">
          <div class="book-entry-date">${formatLong(a.created_at.slice(0, 10))} · #${num}</div>
          <div class="book-entry-title">오늘의 답변</div>
        </div>
        <div class="book-entry">
          <div class="book-entry-q">Q. ${escapeHtml(qText)}</div>
          <div class="book-entry-body">${escapeHtml(body)}</div>
        </div>
      </div>`;
  }

  function formatLong(d) {
    if (!d) return '';
    const dt = new Date(d);
    return dt.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
  }
  function formatShort(d) {
    if (!d) return '';
    const dt = new Date(d);
    return dt.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
  }
  function visText(v) {
    if (v === 'public')  return '전체 공개';
    if (v === 'friends') return '친구 공개';
    return '비공개';
  }
  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }
</script>

</body>
</html>
